<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#198754">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Dirigente">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { background:#f0f2f5; padding-bottom:80px; }
    #mapa-container { position:relative; height:38vh; width:100%; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
    #mapa { height:100%; width:100%; z-index:1; }
    .label-quadra { background:transparent; border:none; box-shadow:none; font-weight:bold; color:#0d6efd; font-size:14px;
      text-shadow: 2px 0 #fff, -2px 0 #fff, 0 2px #fff, 0 -2px #fff, 1px 1px #fff, -1px -1px #fff, 1px -1px #fff, -1px 1px #fff; }
    .quadra-card { background:white; border-radius:14px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin:12px; overflow:hidden; }
    .quadra-header { padding:14px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f1f1f1; }
    .quadra-header .quadra-id { font-size:1.3rem; font-weight:700; color:#0d6efd; }
    .quadra-header .territorio { font-size:.85rem; color:#666; }
    .status-pill { padding:3px 10px; border-radius:20px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .status-pendente { background:#e9ecef; color:#6c757d; }
    .status-iniciado { background:#fff3cd; color:#856404; }
    .status-concluido { background:#d4edda; color:#155724; }
    .quadra-body { padding:12px 16px; }
    .quadra-meta { display:flex; gap:18px; font-size:.85rem; color:#555; margin-bottom:10px; }
    .quadra-meta b { color:#222; }
    .acoes { display:flex; gap:8px; }
    .acoes .btn { flex:1; font-weight:600; }
    .header-top { background:#198754; color:white; padding:18px 16px; box-shadow:0 2px 6px rgba(0,0,0,0.15); }
    .header-top h4 { margin:0; font-weight:700; }
    .header-top small { opacity:.85; }
  </style>
</head>

<body>

  <div id="loader" class="d-flex flex-column align-items-center justify-content-center vh-100 bg-white"
    style="position:fixed; top:0; left:0; width:100%; z-index:9999;">
    <div class="spinner-border text-success" role="status"></div>
    <div class="mt-3 text-secondary">Carregando quadras designadas...</div>
  </div>

  <div id="app" class="d-none">
    <div class="header-top">
      <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
        <div>
          <h4><i class="fa-solid fa-user-tie me-2"></i>Painel do Dirigente</h4>
          <small><span id="lblTotalQuadras">0</span> quadra(s) designada(s)</small>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-light btn-sm fw-bold" onclick="abrirLinkPublicador()">
            <i class="fa-solid fa-share-nodes"></i> Publicador
          </button>
          <button class="btn btn-warning btn-sm fw-bold text-dark" onclick="exportarMapaImagem()" title="Salva o mapa como imagem para enviar no WhatsApp">
            <i class="fa-solid fa-image"></i> Exportar mapa
          </button>
        </div>
      </div>
    </div>

    <div id="mapa-container">
      <div id="mapa"></div>
    </div>

    <div id="lista"></div>
  </div>

  <div class="modal fade" id="modalLinkPub" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fa-solid fa-share-nodes me-2"></i>Link para Publicador</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="small text-muted">Copie e envie ao publicador para ele acessar os endereços destas quadras:</p>
          <div class="input-group">
            <input type="text" class="form-control" id="inputLinkPub" readonly>
            <button class="btn btn-outline-secondary" onclick="copiarLinkPub()"><i class="fa-regular fa-copy"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalConfirma" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Confirmar Conclusão</h5>
        </div>
        <div class="modal-body">
          <p>Marcar quadra <b id="lblQuadraConfirma"></b> como <b>Concluída</b>?</p>
          <label class="form-label small fw-bold mb-1">Data da conclusão</label>
          <input type="date" class="form-control" id="inputDataConclusao">
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" onclick="confirmarConclusao()"><i class="fa-solid fa-check"></i> Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var dados = [];
    var contexto = [];
    var map;
    var tileLayer;
    var layerContexto;
    var layerQuadras;
    var quadraEmConfirmacao = null;
    var modalConfirma;
    var quadrasSelecionadas = new Set();

    var IDS = "<?= ids ?>";

    window.onload = function() {
      modalConfirma = new bootstrap.Modal(document.getElementById('modalConfirma'));
      document.getElementById('inputDataConclusao').valueAsDate = new Date();
      carregar();
    };

    function carregar() {
      if (!IDS) { alert("Link inválido — sem IDs."); return; }
      google.script.run
        .withSuccessHandler(function(r) {
          var designadas = (r && r.designadas) || [];
          if (designadas.length === 0) { alert("Nenhuma quadra encontrada."); return; }
          dados = designadas;
          contexto = (r && r.contexto) || [];
          document.getElementById('loader').classList.add('d-none');
          document.getElementById('app').classList.remove('d-none');
          document.getElementById('lblTotalQuadras').innerText = dados.length;
          iniciarMapa();
          renderizarLista();
        })
        .withFailureHandler(function(e){ alert("Erro: " + (e && e.message ? e.message : e)); })
        .getDadosComContexto(IDS);
    }

    function parsePoly(s) {
      return s.split('|').map(function(p){
        var c = p.trim().split(',');
        return [parseFloat(c[0]), parseFloat(c[1])];
      }).filter(function(pt){ return !isNaN(pt[0]) && !isNaN(pt[1]); });
    }

    function iniciarMapa() {
      if (map) { map.remove(); }
      map = L.map('mapa').setView([-7.115, -34.863], 15);
      // crossOrigin: anonymous deixa html2canvas conseguir ler os tiles na hora
      // de exportar o cartão como PNG (caso contrário o canvas vira tainted)
      tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        crossOrigin: 'anonymous'
      }).addTo(map);

      // Camada de CONTEXTO: outras quadras do mesmo território, esmaecidas.
      // Adicionada PRIMEIRO pra ficar atrás das designadas.
      layerContexto = L.featureGroup().addTo(map);
      contexto.forEach(function(q) {
        if (!q.polyString) return;
        var pts = parsePoly(q.polyString);
        if (pts.length < 3) return;

        var estilo = q.concluidaRecente
          ? { color:'#28a745', weight:1, fillColor:'#28a745', fillOpacity:0.22 }
          : { color:'#9ca3af', weight:1, fillColor:'#9ca3af', fillOpacity:0.10 };

        L.polygon(pts, estilo).addTo(layerContexto);
      });

      // Camada de DESIGNADAS: as quadras desse cartão, azul forte, com label.
      layerQuadras = L.featureGroup().addTo(map);
      dados.forEach(function(q) {
        if (!q.polyString) return;
        var pts = parsePoly(q.polyString);
        if (pts.length < 3) return;

        var poly = L.polygon(pts, {
          color: '#0d47a1', weight: 2,
          fillColor: '#1976d2', fillOpacity: 0.55
        });
        poly.bindTooltip(q.id, { permanent:true, direction:'center', className:'label-quadra' });
        poly.on('click', function() {
          var el = document.getElementById('card-' + q.id);
          if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
        });
        layerQuadras.addLayer(poly);
      });

      if (layerQuadras.getBounds().isValid()) {
        map.fitBounds(layerQuadras.getBounds(), { padding:[20,20] });
      }
    }

    // Considera "concluída recente" só quando há data de conclusão < 30 dias.
    // Passado 1 mês, o dirigente pode marcar como concluída de novo sem precisar reabrir.
    function statusVisual(q) {
      var s = (q.status || '').toLowerCase();
      var ultimaConc = parseUltimaDataConc(q.ultimaData);
      var recente = ultimaConc && (Date.now() - ultimaConc.getTime()) < 30 * 24 * 60 * 60 * 1000;

      if (s.indexOf('conclu') > -1 && recente) return { cls:'status-concluido', label:'Concluída', recente: true };
      return { cls:'status-pendente', label:'Pendente', recente: false };
    }

    function parseUltimaDataConc(dataStr) {
      if (!dataStr || dataStr === 'Nunca') return null;
      // formato dd/mm/yyyy vindo do backend
      var p = dataStr.split('/');
      if (p.length !== 3) return null;
      var d = new Date(parseInt(p[2], 10), parseInt(p[1], 10) - 1, parseInt(p[0], 10));
      return isNaN(d.getTime()) ? null : d;
    }

    function renderizarLista() {
      var c = document.getElementById('lista');
      var html = '';

      // Cabeçalho com ações em lote sobre a seleção
      html += '<div class="d-flex justify-content-between align-items-center px-3 py-2 mb-2 flex-wrap gap-2" style="background:#f1f3f5; border-bottom:1px solid #e5e7eb">' +
                '<small class="text-muted"><span id="lblQuadrasSelecionadas">0</span> quadra(s) selecionada(s)</small>' +
                '<div class="d-flex gap-2">' +
                  '<button class="btn btn-sm btn-success" onclick="concluirSelecaoEmLote()" title="Marcar as selecionadas como concluídas">' +
                    '<i class="fa-solid fa-check-double me-1"></i>Concluir' +
                  '</button>' +
                  '<button class="btn btn-sm btn-primary" onclick="enviarSelecaoParaPublicador()">' +
                    '<i class="fa-solid fa-share-nodes me-1"></i>Enviar' +
                  '</button>' +
                '</div>' +
              '</div>';

      dados.forEach(function(q) {
        var sv = statusVisual(q);
        var totalEnderecos = q.itens ? q.itens.length : 0;
        var territorio = q.territory || '—';
        var ultima = q.ultimaData || 'Nunca';

        var btnAcao = '';
        if (sv.recente) {
          // Concluída há menos de 30 dias — pode reabrir se quiser refazer
          btnAcao = '<button class="btn btn-outline-secondary" onclick="reabrirQuadra(\'' + q.id + '\')">' +
                      '<i class="fa-solid fa-rotate-left"></i> Reabrir' +
                    '</button>';
        } else {
          // Pendente ou já passou 1 mês — pode marcar como concluída
          btnAcao = '<button class="btn btn-success" onclick="abrirModalConcluir(\'' + q.id + '\')">' +
                      '<i class="fa-solid fa-check"></i> Marcar Concluída' +
                    '</button>';
        }

        var checked = quadrasSelecionadas.has(q.id) ? 'checked' : '';

        html += '<div class="quadra-card" id="card-' + q.id + '">' +
                  '<div class="quadra-header">' +
                    '<div class="d-flex align-items-center gap-2">' +
                      '<input type="checkbox" class="form-check-input" ' + checked +
                        ' onchange="window.toggleSelecaoQuadra(\'' + q.id + '\', this.checked)" style="cursor:pointer">' +
                      '<div>' +
                        '<div class="quadra-id">Quadra ' + q.id + '</div>' +
                        '<div class="territorio">' + territorio + '</div>' +
                      '</div>' +
                    '</div>' +
                    '<span class="status-pill ' + sv.cls + '">' + sv.label + '</span>' +
                  '</div>' +
                  '<div class="quadra-body">' +
                    '<div class="quadra-meta">' +
                      '<div><i class="fa-regular fa-calendar"></i> Última: <b>' + ultima + '</b></div>' +
                      '<div><i class="fa-solid fa-hashtag"></i> <b>' + totalEnderecos + '</b> end.</div>' +
                    '</div>' +
                    '<div class="acoes">' + btnAcao + '</div>' +
                  '</div>' +
                '</div>';
      });

      c.innerHTML = html;
      atualizarLabelSelecionadas();
    }

    function atualizarLabelSelecionadas() {
      var el = document.getElementById('lblQuadrasSelecionadas');
      if (el) el.innerText = quadrasSelecionadas.size;
    }

    window.toggleSelecaoQuadra = function(id, checked) {
      if (checked) quadrasSelecionadas.add(id);
      else quadrasSelecionadas.delete(id);
      atualizarLabelSelecionadas();
    };

    function concluirSelecaoEmLote() {
      var ids = Array.from(quadrasSelecionadas);
      if (ids.length === 0) { alert('Selecione ao menos uma quadra.'); return; }
      if (!confirm('Marcar ' + ids.length + ' quadra(s) como concluída(s) hoje?')) return;
      var hoje = new Date().toISOString().split('T')[0];
      processarSalvamento(ids, 'Concluído', hoje);
      quadrasSelecionadas.clear();
    }

    function enviarSelecaoParaPublicador() {
      var idsEnvio = quadrasSelecionadas.size > 0
        ? Array.from(quadrasSelecionadas)
        : dados.map(function(q){ return q.id; });

      if (idsEnvio.length === 0) return alert("Sem quadras para enviar.");

      google.script.run
        .withSuccessHandler(function(url){
           var baseUrl = url || window.location.href.split('?')[0];
           var finalUrl = baseUrl + "?v=publico&ids=" + idsEnvio.join(",");
           document.getElementById('inputLinkPub').value = finalUrl;
           var m = new bootstrap.Modal(document.getElementById('modalLinkPub'));
           m.show();
        })
        .withFailureHandler(function(e){ alert("Erro: " + (e && e.message ? e.message : e)); })
        .getScriptUrl();
    }

    function abrirModalConcluir(id) {
      quadraEmConfirmacao = id;
      document.getElementById('lblQuadraConfirma').innerText = id;
      modalConfirma.show();
    }

    function confirmarConclusao() {
      var data = document.getElementById('inputDataConclusao').value;
      if (!data) return alert('Selecione a data.');
      modalConfirma.hide();
      processarSalvamento([quadraEmConfirmacao], 'Concluído', data);
    }

    function reabrirQuadra(id) {
      if (!confirm('Reabrir quadra ' + id + ' (voltar para Pendente)?')) return;
      processarSalvamento([id], 'Pendente', null);
    }

    function processarSalvamento(ids, status, data) {
      var btns = document.querySelectorAll('.acoes .btn');
      btns.forEach(function(b){ b.disabled = true; });

      google.script.run
        .withSuccessHandler(function(r) {
          if (!r || r.status !== 'SUCESSO') {
            alert('Não foi possível salvar agora. Tente novamente.');
            btns.forEach(function(b){ b.disabled = false; });
            return;
          }
          // Atualiza estado local
          dados.forEach(function(q) {
            if (ids.indexOf(q.id) > -1) {
              q.status = status;
              if (status === 'Concluído') q.ultimaData = formatarBR(data);
              else if (status === 'Pendente') q.ultimaData = q.ultimaData; // mantém histórico
            }
          });
          iniciarMapa();
          renderizarLista();
        })
        .withFailureHandler(function(e){
          alert('Erro: ' + (e && e.message ? e.message : e));
          btns.forEach(function(b){ b.disabled = false; });
        })
        .dirigenteMarcarStatus(ids, status, data);
    }

    function formatarBR(ymd) {
      if (!ymd) return '';
      var p = ymd.split('-');
      if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0];
      return ymd;
    }

    function abrirLinkPublicador() {
      google.script.run
        .withSuccessHandler(function(url){
           var baseUrl = url || window.location.href.split('?')[0];
           var finalUrl = baseUrl + "?v=publico&ids=" + IDS;
           document.getElementById('inputLinkPub').value = finalUrl;
           var m = new bootstrap.Modal(document.getElementById('modalLinkPub'));
           m.show();
        })
        .withFailureHandler(function(e){ alert("Erro: " + (e && e.message ? e.message : e)); })
        .getScriptUrl();
    }

    function copiarLinkPub() {
      var inp = document.getElementById('inputLinkPub');
      inp.select();
      navigator.clipboard.writeText(inp.value).then(function(){
         alert('Link copiado!');
      }).catch(function(){
         document.execCommand('copy');
         alert('Link copiado!');
      });
    }

    // Exporta o mapa como "Cartão de Mapa de Território" no estilo
    // tradicional impresso (cabeçalho centralizado, Localidade/Terr.Nº,
    // borda preta, rodapé de instrução). Mobile: abre share nativo;
    // desktop: baixa.
    function exportarMapaImagem() {
      var mapaEl = document.getElementById('mapa');
      if (!mapaEl) return;

      var btn = event && event.currentTarget;
      var textoOriginal = btn ? btn.innerHTML : null;
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Gerando...'; }

      // Garante que o mapa esteja enquadrado nas quadras designadas antes
      // de capturar (corrige o problema de quadras ficarem fora do mapa)
      if (layerQuadras && layerQuadras.getBounds().isValid()) {
        map.invalidateSize();
        map.fitBounds(layerQuadras.getBounds(), { padding: [50, 50], animate: false });
      }

      // Aguarda TODOS os tiles do basemap carregarem antes do html2canvas
      // capturar. Sem isso, o canvas pega o estado intermediário e os
      // polígonos saem deslocados em relação às ruas. Fallback de 3s
      // protege contra rede lenta / tiles que nunca completam.
      aguardarTiles(tileLayer, 3000, function() {
        html2canvas(mapaEl, {
          useCORS: true,
          allowTaint: false,
          backgroundColor: '#ffffff',
          logging: false,
          scale: 2
        }).then(function(mapaCanvas) {
          var W = mapaCanvas.width;
          var headerH = Math.round(W * 0.13);
          var footerH = Math.round(W * 0.09);
          var bordaIn = Math.round(W * 0.012);

          var totalH = headerH + mapaCanvas.height + footerH;
          var final = document.createElement('canvas');
          final.width = W;
          final.height = totalH;
          var ctx = final.getContext('2d');

          // Fundo branco
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, W, totalH);

          // ========== CABEÇALHO ==========
          var fSize = Math.round(W * 0.045);
          ctx.fillStyle = '#000';
          ctx.font = 'bold ' + fSize + 'px Georgia, "Times New Roman", serif';
          ctx.textAlign = 'center';
          ctx.fillText('Cartão de Mapa de Território', W / 2, Math.round(headerH * 0.40));

          // Rua/nome principal (se houver) — usa o nome do território da 1ª quadra
          var subtitulo = '';
          if (dados.length > 0) {
            var territoriosUnicos = {};
            dados.forEach(function(q){ if (q.territorio) territoriosUnicos[q.territorio] = true; });
            var nomes = Object.keys(territoriosUnicos);
            if (nomes.length === 1) subtitulo = nomes[0];
            else if (nomes.length > 1) subtitulo = nomes.length + ' territórios';
          }
          if (subtitulo) {
            ctx.font = 'italic ' + Math.round(fSize * 0.78) + 'px Georgia, serif';
            ctx.fillText(subtitulo, W / 2, Math.round(headerH * 0.72));
          }

          // "Localidade" à esquerda, "Terr. Nº" à direita
          var labelSize = Math.round(W * 0.026);
          ctx.font = labelSize + 'px Georgia, serif';
          ctx.textAlign = 'left';
          ctx.fillText('Localidade', Math.round(W * 0.04), Math.round(headerH * 0.92));
          // linha sob "Localidade"
          ctx.beginPath();
          ctx.moveTo(Math.round(W * 0.13), Math.round(headerH * 0.95));
          ctx.lineTo(Math.round(W * 0.40), Math.round(headerH * 0.95));
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1.5;
          ctx.stroke();

          ctx.textAlign = 'right';
          var dataHoje = new Date().toLocaleDateString('pt-BR');
          ctx.fillText('Terr. Nº  ' + (dados.length + ' quadra(s)'), Math.round(W * 0.96), Math.round(headerH * 0.92));

          // ========== MAPA ==========
          ctx.drawImage(mapaCanvas, 0, headerH);

          // ========== RODAPÉ ==========
          ctx.fillStyle = '#000';
          ctx.textAlign = 'center';
          var rodapeY = headerH + mapaCanvas.height + Math.round(footerH * 0.35);
          ctx.font = 'italic ' + Math.round(W * 0.022) + 'px Georgia, serif';
          ctx.fillText('Guarde este cartão no envelope. Tome cuidado para não manchar ou marcar.',
                       W / 2, rodapeY);
          ctx.fillText('Ao devolver, queira informar disso o irmão que cuida do arquivo de territórios.',
                       W / 2, rodapeY + Math.round(W * 0.030));

          // Rodapé: data à esquerda, "Impresso no Brasil" à direita
          ctx.font = Math.round(W * 0.020) + 'px Georgia, serif';
          ctx.textAlign = 'left';
          ctx.fillText(dataHoje, Math.round(W * 0.04), headerH + mapaCanvas.height + Math.round(footerH * 0.88));
          ctx.textAlign = 'right';
          ctx.fillText('Gerado por Territory Helper', Math.round(W * 0.96), headerH + mapaCanvas.height + Math.round(footerH * 0.88));

          // ========== BORDA PRETA DUPLA ==========
          ctx.strokeStyle = '#000';
          ctx.lineWidth = Math.round(W * 0.005);
          ctx.strokeRect(0, 0, W, totalH);
          ctx.lineWidth = 1;
          ctx.strokeRect(bordaIn, bordaIn, W - 2 * bordaIn, totalH - 2 * bordaIn);

          final.toBlob(function(blob) {
            var nomeArq = 'cartao-territorio-' + new Date().toISOString().split('T')[0] + '.png';
            var file = new File([blob], nomeArq, { type: 'image/png' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              navigator.share({
                files: [file],
                title: 'Cartão de Território',
                text: dados.length + ' quadra(s) designada(s) — ' + dataHoje
              }).catch(function(){ })
                .finally(restaurar);
            } else {
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = url; a.download = nomeArq;
              document.body.appendChild(a); a.click();
              setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 500);
              restaurar();
            }
          }, 'image/png');
        }).catch(function(err) {
          alert('Falha ao gerar imagem: ' + (err && err.message ? err.message : err));
          restaurar();
        });
      });

      function restaurar() {
        if (btn && textoOriginal != null) { btn.disabled = false; btn.innerHTML = textoOriginal; }
      }
    }

    // Aguarda o tileLayer terminar de carregar OU expirar o timeout.
    // Necessário antes do html2canvas pra evitar polígonos deslocados
    // em relação aos tiles do basemap no PNG exportado.
    function aguardarTiles(tile, timeoutMs, cb) {
      var disparado = false;
      function disparar() {
        if (disparado) return;
        disparado = true;
        // pequeno buffer pra o canvas dos tiles assentar antes do snapshot
        setTimeout(cb, 200);
      }
      if (tile) tile.once('load', disparar);
      setTimeout(disparar, timeoutMs);
    }
  </script>
</body>
