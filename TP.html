<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Testemunho Público</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
  <?!= include('JS_ToastPublico') ?>
  <style>
    body { background:#f0f2f5; padding-bottom:80px; }
    .hero { background:linear-gradient(135deg,#1976d2 0%,#0d47a1 100%); color:#fff; padding:24px 20px 20px; }
    .hero h1 { font-size:1.4rem; font-weight:800; margin:0 0 4px; }
    .hero .sub { font-size:.85rem; opacity:.85; }
    .ponto-card { background:#fff; border-radius:12px; padding:14px; margin:12px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .ponto-titulo { font-weight:800; font-size:1.05rem; color:#0d47a1; }
    .horario-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 12px; border-top:1px solid #eee;
    }
    .horario-row:first-child { border-top:0; }
    .horario-row.lotado { opacity:.5; background:#fff5f5; }
    .agendar-btn { min-height:44px; min-width:96px; font-weight:600; }
    .ja-agendado { background:#dcfce7; color:#166534; border:1px solid #16a34a; }
    body.tema-escuro { background-color:#1a1d20; color:#e8eef5; }
    body.tema-escuro .ponto-card { background:#2a2f33; color:#e8eef5; }
    body.tema-escuro .horario-row { border-color:#3a4047; }
  </style>
</head>
<body>
  <div id="loader" class="d-flex flex-column align-items-center justify-content-center vh-100">
    <div class="spinner-border text-primary"></div>
    <div class="mt-3 text-secondary">Carregando...</div>
  </div>

  <div id="app" class="d-none">
    <div class="hero">
      <h1><i class="fa-solid fa-cart-shopping me-2"></i>Testemunho Público</h1>
      <div class="sub">Escolha um horário pra agendar.</div>
    </div>
    <div class="px-3 py-2 bg-white shadow-sm sticky-top" style="top:0; z-index:500">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-md-6">
          <input type="text" class="form-control form-control-sm" id="inputNome" placeholder="Seu nome (obrigatório)">
        </div>
        <div class="col-6 col-md-3">
          <input type="date" class="form-control form-control-sm" id="inputData">
        </div>
        <div class="col-6 col-md-3">
          <select class="form-select form-select-sm" id="selectCarrinho">
            <option value="">Sem carrinho específico</option>
          </select>
        </div>
      </div>
      <div class="small text-muted mt-1">Selecione data e digite seu nome. Só horários do dia escolhido aparecem.</div>
    </div>

    <div id="listaPontos"></div>
  </div>

  <script>
    var DADOS = { pontos: [], horarios: [], carrinhos: [], agendamentos: [] };

    window.onload = function() {
      try {
        if (localStorage.getItem('th_tema') === 'escuro') document.body.classList.add('tema-escuro');
        var nomeSalvo = localStorage.getItem('tp_publicador');
        if (nomeSalvo) document.getElementById('inputNome').value = nomeSalvo;
      } catch(e) {}
      var hoje = new Date();
      // Default: próximo sábado
      var dias = (6 - hoje.getDay() + 7) % 7;
      if (dias === 0) dias = 7;
      var prox = new Date(hoje.getTime() + dias*24*60*60*1000);
      document.getElementById('inputData').value = prox.toISOString().slice(0, 10);
      document.getElementById('inputData').addEventListener('change', render);
      document.getElementById('inputNome').addEventListener('input', function(){
        try { localStorage.setItem('tp_publicador', this.value); } catch(e) {}
      });
      carregar();
    };

    function carregar() {
      google.script.run
        .withSuccessHandler(function(r){
          DADOS = r || DADOS;
          // Popula carrinhos no select
          var sel = document.getElementById('selectCarrinho');
          (DADOS.carrinhos || []).forEach(function(c){
            var opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.nome + (c.localGuarda ? ' (' + c.localGuarda + ')' : '');
            sel.appendChild(opt);
          });
          document.getElementById('loader').classList.add('d-none');
          document.getElementById('app').classList.remove('d-none');
          render();
        })
        .withFailureHandler(function(e){
          document.getElementById('loader').innerHTML =
            '<div class="text-danger px-3 text-center">Erro: ' + (e && e.message || e) + '</div>';
        })
        .getDadosTPPublico();
    }

    function esc(s) { return String(s||'').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    }); }

    function render() {
      var lista = document.getElementById('listaPontos');
      var dataStr = document.getElementById('inputData').value;
      if (!dataStr) { lista.innerHTML = '<div class="text-center text-muted py-4">Escolha uma data.</div>'; return; }
      var diaSem = new Date(dataStr + 'T00:00:00').getDay();

      var pontos = DADOS.pontos.filter(function(p){ return p.ativo; });
      // Horários do dia da semana selecionado
      var horariosDoDia = DADOS.horarios.filter(function(h){ return h.diaSemana === diaSem; });
      if (pontos.length === 0) {
        lista.innerHTML = '<div class="text-center text-muted py-4">Nenhum ponto cadastrado ainda.</div>';
        return;
      }
      if (horariosDoDia.length === 0) {
        var diasNomes = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
        lista.innerHTML = '<div class="text-center text-muted py-4">Nenhum horário disponível ' + diasNomes[diaSem] + '.</div>';
        return;
      }

      // Indexa agendamentos do dia por horarioId
      var agDia = {};
      DADOS.agendamentos.forEach(function(a){
        if (a.data !== dataStr) return;
        if (!agDia[a.horarioId]) agDia[a.horarioId] = [];
        agDia[a.horarioId].push(a);
      });

      var nomeAtual = (document.getElementById('inputNome').value || '').trim().toLowerCase();

      var html = '';
      pontos.forEach(function(p){
        var horariosPonto = horariosDoDia.filter(function(h){ return h.pontoId === p.id; });
        if (horariosPonto.length === 0) return;
        html += '<div class="ponto-card">' +
                  '<div class="ponto-titulo">' + esc(p.nome) + '</div>' +
                  '<div class="small text-muted mb-2">' + esc(p.endereco || '') + '</div>';
        horariosPonto.sort(function(a,b){ return a.horaInicio.localeCompare(b.horaInicio); });
        horariosPonto.forEach(function(h){
          var inscritos = agDia[h.id] || [];
          var jaEuAgendei = nomeAtual && inscritos.some(function(a){
            return a.publicador.toLowerCase() === nomeAtual && a.status !== 'cancelado';
          });
          var lotado = inscritos.length >= h.capacidade;
          var classes = ['horario-row'];
          if (lotado && !jaEuAgendei) classes.push('lotado');
          html += '<div class="' + classes.join(' ') + '">' +
                    '<div>' +
                      '<b>' + esc(h.horaInicio) + ' – ' + esc(h.horaFim) + '</b>' +
                      ' <small class="text-muted">(' + inscritos.length + '/' + h.capacidade + ')</small>' +
                      (inscritos.length > 0
                        ? '<div class="small text-muted">' + inscritos.map(function(a){ return esc(a.publicador); }).join(', ') + '</div>'
                        : '') +
                    '</div>';
          if (jaEuAgendei) {
            var meu = inscritos.find(function(a){ return a.publicador.toLowerCase() === nomeAtual; });
            html += '<button class="btn btn-sm agendar-btn ja-agendado" onclick="cancelar(\'' + meu.id + '\')">' +
                    '<i class="fa-solid fa-check me-1"></i>Você</button>';
          } else if (lotado) {
            html += '<button class="btn btn-sm btn-outline-secondary agendar-btn" disabled>Lotado</button>';
          } else {
            html += '<button class="btn btn-sm btn-primary agendar-btn" onclick="agendar(\'' + h.id + '\')">' +
                    '<i class="fa-solid fa-calendar-check me-1"></i>Agendar</button>';
          }
          html += '</div>';
        });
        html += '</div>';
      });
      lista.innerHTML = html;
    }

    window.agendar = function(horarioId) {
      var nome = (document.getElementById('inputNome').value || '').trim();
      if (!nome) { window.toast && window.toast('Digite seu nome antes de agendar.', 'warn'); return; }
      var data = document.getElementById('inputData').value;
      var carrinhoId = document.getElementById('selectCarrinho').value || '';
      google.script.run
        .withSuccessHandler(function(r){
          if (!r || !r.ok) { window.toast && window.toast('Erro: ' + (r && r.erro || '?'), 'error'); return; }
          window.toast && window.toast('Agendamento criado!', 'success');
          carregar();
        })
        .withFailureHandler(function(e){ window.toast && window.toast('Erro: ' + (e && e.message || e), 'error'); })
        .agendarTP({ horarioId: horarioId, data: data, publicador: nome, carrinhoId: carrinhoId });
    };

    window.cancelar = function(agendamentoId) {
      if (!confirm('Cancelar seu agendamento?')) return;
      google.script.run
        .withSuccessHandler(function(r){
          if (!r || !r.ok) { window.toast && window.toast('Erro: ' + (r && r.erro || '?'), 'error'); return; }
          window.toast && window.toast('Cancelado.', 'info');
          carregar();
        })
        .withFailureHandler(function(e){ window.toast && window.toast('Erro: ' + (e && e.message || e), 'error'); })
        .cancelarAgendamentoTP(agendamentoId);
    };
  </script>
  <div style="position:fixed; bottom:4px; right:8px; font-size:.6rem; opacity:.4; color:#888; pointer-events:none">v: <?= getVersaoApp() ?></div>
</body>
</html>
