<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1929">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Campanha">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a1929;
      color: #e8eef5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding-bottom: 40px;
      min-height: 100vh;
    }
    .container-app { max-width: 720px; margin: 0 auto; }

    .hero {
      padding: 32px 24px 18px;
      text-align: center;
    }
    .hero .tag {
      letter-spacing: 4px;
      opacity: 0.55;
      font-size: 0.7rem;
      margin: 0;
      text-transform: uppercase;
    }
    .hero h1 {
      font-weight: 800;
      font-size: 1.9rem;
      margin: 8px 0 6px;
      letter-spacing: -0.5px;
    }
    .hero .periodo {
      opacity: 0.65;
      font-size: 0.85rem;
    }

    .card-app {
      background: #122638;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 22px 22px;
      margin: 12px 18px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }

    .progresso .topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 14px;
    }
    .progresso .pct {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2.5px;
      color: #22c55e;
    }
    .progresso .legenda {
      text-align: right;
      opacity: 0.7;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .progresso .legenda b { color: #fff; font-size: 1rem; }
    .barra {
      height: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .barra > div {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border-radius: 999px;
      transition: width 1s cubic-bezier(.2,.8,.2,1);
    }
    .infoExtra {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      opacity: 0.75;
    }
    .infoExtra b { color: #fff; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 0 18px 18px;
    }
    .stat {
      background: #122638;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px 14px;
      text-align: center;
    }
    .stat .num {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat .lbl {
      font-size: 0.7rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    .stat.completas .num { color: #4ade80; }
    .stat.restantes .num { color: #cbd5e1; }

    .secao-titulo {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.55;
      margin: 0 0 10px;
      padding: 0 24px;
    }
    #listaObjGerais, #listaObjSemana { padding: 0 24px 6px; }

    /* Countdown no header */
    .countdown { display:inline-block; margin-top:8px; padding:6px 14px;
      border-radius:999px; background:rgba(255,255,255,0.10);
      font-size:.85rem; font-weight:600; letter-spacing:.5px; }
    .countdown.urgente { background:#dc2626; color:#fff; animation: pulsoCd 1.6s infinite; }
    @keyframes pulsoCd { 0%,100% { transform:scale(1) } 50% { transform:scale(1.05) } }

    /* Objetivo da SEMANA — card grande, destaque máximo */
    .obj-semana { background:linear-gradient(135deg,#16a34a 0%, #15803d 100%);
      color:#fff; padding:18px 20px; border-radius:18px; margin-bottom:12px;
      box-shadow:0 6px 18px rgba(22,163,74,0.35); }
    .obj-semana .head { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-weight:700; font-size:1rem; }
    .obj-semana .head i { font-size:1.2rem; }
    .obj-semana .titulo { font-size:1.15rem; font-weight:700; line-height:1.3; }
    .obj-semana .desc { font-size:.92rem; opacity:0.92; margin-top:6px; }
    .obj-semana .anexos { margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; }
    .obj-semana .anexos a { display:inline-flex; align-items:center; gap:5px;
      background:rgba(255,255,255,0.18); color:#fff; padding:5px 12px;
      border-radius:999px; font-size:.85rem; text-decoration:none; }
    .obj-semana .anexos a:hover { background:rgba(255,255,255,0.30); }

    /* Objetivo GERAL — linha enxuta, ícone + título inline */
    .obj-geral { display:flex; align-items:center; gap:10px;
      padding:10px 14px; margin-bottom:6px; border-radius:10px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); }
    .obj-geral i.modalidade { color:#22c55e; font-size:1rem; flex-shrink:0; width:18px; text-align:center; }
    .obj-geral .titulo { flex-grow:1; font-weight:500; font-size:.95rem; color:#fff; }
    .obj-geral .links { display:flex; gap:8px; flex-shrink:0; }
    .obj-geral .links a { color:#93c5fd; font-size:.9rem; text-decoration:none; }

    .objetivo-card {
      background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(14,165,233,0.08));
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 18px;
      padding: 18px 20px;
      margin: 0 18px 18px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 0.95rem;
    }
    .objetivo-card .icone {
      font-size: 1.4rem;
      color: #4ade80;
      margin-bottom: 8px;
    }
    .estrategia-card {
      background: #122638;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 18px 20px;
      margin: 0 18px 18px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 0.95rem;
    }
    .estrategia-card .titulo {
      font-size: 0.85rem;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .meta-semanal {
      background: linear-gradient(135deg, #16a34a, #0d9488);
      border-radius: 20px;
      padding: 20px 22px;
      margin: 0 18px 18px;
      color: white;
    }
    .meta-semanal .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .meta-semanal .lbl {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.85;
    }
    .meta-semanal .num-grande {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }
    .meta-semanal .barra-meta {
      height: 8px;
      background: rgba(255,255,255,0.25);
      border-radius: 99px;
      overflow: hidden;
    }
    .meta-semanal .barra-meta > div {
      height: 100%;
      background: white;
      border-radius: 99px;
      transition: width 1s ease;
    }
    .meta-semanal .ritmo {
      margin-top: 10px;
      font-size: 0.85rem;
      opacity: 0.95;
    }

    .mapa-wrapper {
      margin: 0 18px 12px;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      min-height: 280px;
      max-height: 60vh;
      border: 1px solid rgba(255,255,255,0.06);
    }
    #mapa { width: 100%; height: 100%; background: #0a1929; }

    .legenda-mapa {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin: 0 18px 14px;
      font-size: 0.78rem;
      opacity: 0.85;
    }
    .legenda-mapa span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .dot.verde { background: #22c55e; }
    .dot.cinza { background: #6c757d; }

    .frase {
      text-align: center;
      padding: 16px 30px 26px;
      font-size: 0.95rem;
      opacity: 0.75;
      line-height: 1.4;
    }
    .frase b { color: #4ade80; }

    .loader-wrap {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0a1929; z-index: 9999;
    }
  </style>
</head>

<body>

  <div id="loader" class="loader-wrap">
    <div class="text-center">
      <div class="spinner-border text-success" role="status"></div>
      <div class="mt-3 small" style="opacity:.7">Carregando campanha...</div>
    </div>
  </div>

  <div id="app" class="container-app d-none">

    <div class="hero">
      <div class="tag">CAMPANHA</div>
      <h1 id="nomeCampanha">—</h1>
      <div class="periodo" id="periodoCampanha">—</div>
      <div id="countdown" class="countdown d-none"></div>
    </div>

    <div class="card-app progresso">
      <div class="topo">
        <div class="pct" id="pct">0%</div>
        <div class="legenda">
          <div><b id="numCompletas">0</b> de <b id="numTotal">0</b></div>
          <div>quadras concluídas</div>
        </div>
      </div>
      <div class="barra"><div id="barraFill" style="width:0%"></div></div>
      <div class="infoExtra">
        <span id="infoDias"></span>
        <span id="infoRitmo"></span>
      </div>
    </div>

    <div class="stats">
      <div class="stat completas">
        <div class="num" id="statCompletas">0</div>
        <div class="lbl">Concluídas</div>
      </div>
      <div class="stat restantes">
        <div class="num" id="statRestantes">0</div>
        <div class="lbl">Restantes</div>
      </div>
    </div>

    <div class="meta-semanal" id="boxMeta">
      <div class="header">
        <div>
          <div class="lbl">Meta da semana</div>
          <div class="num-grande"><span id="numFeitasSemana">0</span> / <span id="numMetaSemana">—</span></div>
        </div>
        <div style="text-align:right">
          <i class="fa-solid fa-bolt" style="font-size:1.8rem; opacity:.7"></i>
        </div>
      </div>
      <div class="barra-meta"><div id="barraSemana" style="width:0%"></div></div>
      <div class="ritmo" id="ritmoSemana"></div>
    </div>

    <!-- Objetivos da semana: protagonistas, cards grandes -->
    <div id="secaoObjSemana" class="d-none">
      <h6 class="secao-titulo">Esta semana</h6>
      <div id="listaObjSemana"></div>
    </div>

    <!-- Objetivos gerais: lista enxuta, ícone + título inline -->
    <div id="secaoObjGerais" class="d-none">
      <h6 class="secao-titulo">Objetivos gerais</h6>
      <div id="listaObjGerais"></div>
    </div>

    <h6 class="secao-titulo">Mapa do território</h6>
    <div class="mapa-wrapper">
      <div id="mapa"></div>
    </div>

    <div class="legenda-mapa">
      <span><span class="dot verde"></span> Concluída</span>
      <span><span class="dot cinza"></span> Restante</span>
    </div>

    <div class="frase" id="fraseMotivacional">
      Cada quadra conta. <b>Vamos juntos!</b>
    </div>
  </div>

  <script>
    var dados = null;
    var map, layerQuadras;

    window.onload = function() { carregar(); };

    function carregar() {
      google.script.run
        .withSuccessHandler(function(r) {
          if (!r) { document.getElementById('loader').innerHTML = '<div style="opacity:.7">Sem dados disponíveis.</div>'; return; }
          dados = r;
          if (r.ativa === false) {
            // Tela "sem campanha ativa" — não confundir publicador
            document.getElementById('loader').innerHTML =
              '<div style="text-align:center;padding:40px 24px;max-width:480px;margin:0 auto">' +
              '<div style="font-size:48px;margin-bottom:12px">🌱</div>' +
              '<h2 style="font-size:1.4rem;margin-bottom:8px">Sem campanha ativa</h2>' +
              '<p style="opacity:.7;font-size:.95rem">' +
              'No momento não estamos numa campanha. O trabalho do território segue normal — ' +
              'o cartão de quadras desinada vai chegar como sempre.</p>' +
              '</div>';
            return;
          }
          document.getElementById('loader').classList.add('d-none');
          document.getElementById('app').classList.remove('d-none');
          renderizar();
          desenharMapa();
          carregarObjetivosPublicos();
        })
        .withFailureHandler(function(e){
          document.getElementById('loader').innerHTML = '<div style="color:#f87171">Erro: ' + (e && e.message ? e.message : e) + '</div>';
        })
        .getDadosCampanhaPublico();
    }

    function renderizar() {
      document.getElementById('nomeCampanha').innerText = dados.nome || 'Campanha';

      // Período
      var per = [];
      if (dados.dataInicio) per.push(formatarBR(dados.dataInicio));
      if (dados.dataFim) per.push('até ' + formatarBR(dados.dataFim));
      document.getElementById('periodoCampanha').innerText = per.join(' ') || '—';

      // Countdown — dias até o fim
      if (dados.dataFim) {
        var fim = new Date(dados.dataFim + 'T23:59:59');
        var diff = Math.ceil((fim - new Date()) / (1000*60*60*24));
        var cd = document.getElementById('countdown');
        cd.classList.remove('d-none');
        if (diff < 0) {
          cd.innerHTML = '<i class="fa-solid fa-flag-checkered me-1"></i>Campanha encerrada';
        } else if (diff === 0) {
          cd.classList.add('urgente');
          cd.innerHTML = '<i class="fa-solid fa-bolt me-1"></i>Último dia!';
        } else {
          if (diff <= 7) cd.classList.add('urgente');
          cd.innerHTML = '<i class="fa-solid fa-hourglass-half me-1"></i>Faltam ' + diff + ' dia' + (diff === 1 ? '' : 's');
        }
        window._diasRestantes = diff;
      }

      // Numbers principais
      document.getElementById('numCompletas').innerText = dados.completas;
      document.getElementById('numTotal').innerText = dados.totalQuadras;
      document.getElementById('statCompletas').innerText = dados.completas;
      document.getElementById('statRestantes').innerText = dados.restantes;

      // Pct animado uma vez só
      animarPorcentagem(dados.porcentagem);

      // Info dias e ritmo
      var infoDias = '';
      var infoRitmo = '';
      if (dados.dataInicio) {
        var ini = new Date(dados.dataInicio + 'T00:00:00');
        var hoje = new Date();
        var diasDeCampanha = Math.max(0, Math.ceil((hoje - ini) / (1000*60*60*24)));
        infoDias = '<b>' + diasDeCampanha + '</b> dias de campanha';
      }
      if (dados.ritmoNecessario != null) {
        infoRitmo = 'Precisamos de <b>' + dados.ritmoNecessario + '</b> qd/semana';
      }
      document.getElementById('infoDias').innerHTML = infoDias;
      document.getElementById('infoRitmo').innerHTML = infoRitmo;

      // (Os campos objetivo/estrategia em texto livre foram substituídos
      // pela seção Objetivos estruturada — ver carregarObjetivosPublicos)

      // Meta da semana
      var meta = dados.metaSemanal || 0;
      var feitas = dados.completasSemana || 0;
      document.getElementById('numFeitasSemana').innerText = feitas;
      document.getElementById('numMetaSemana').innerText = meta > 0 ? meta : '—';
      var pctMeta = meta > 0 ? Math.min(100, (feitas / meta) * 100) : 0;
      document.getElementById('barraSemana').style.width = pctMeta + '%';
      if (meta > 0) {
        if (feitas >= meta) document.getElementById('ritmoSemana').innerText = '🎯 Meta da semana batida!';
        else document.getElementById('ritmoSemana').innerText = 'Faltam ' + (meta - feitas) + ' para a meta da semana.';
      } else {
        document.getElementById('boxMeta').style.display = 'none';
      }

      document.getElementById('fraseMotivacional').innerHTML = fraseMotivacional(dados.porcentagem);
    }

    function animarPorcentagem(alvo) {
      var pctEl = document.getElementById('pct');
      var barra = document.getElementById('barraFill');
      barra.style.width = alvo + '%';

      var atual = 0;
      var passo = Math.max(1, Math.ceil(alvo / 40));
      var t = setInterval(function() {
        atual += passo;
        if (atual >= alvo) { atual = alvo; clearInterval(t); }
        pctEl.innerText = atual + '%';
      }, 22);
    }

    function fraseMotivacional(pct) {
      if (pct >= 100) return '🎉 <b>Campanha concluída!</b> Obrigado a todos!';
      if (pct >= 75) return 'Reta final! <b>Falta pouco.</b>';
      if (pct >= 50) return 'Já passamos da metade! <b>Bora continuar.</b>';
      if (pct >= 25) return 'O trabalho está crescendo. <b>Cada quadra conta!</b>';
      return 'Começando com tudo. <b>Vamos juntos!</b>';
    }

    function desenharMapa() {
      if (map) map.remove();
      map = L.map('mapa', { zoomControl: false, attributionControl: false })
              .setView([-7.115, -34.863], 14);

      // OSM padrão — mais confiável que CDNs alternativos. Cores claras
      // mas funcional em qualquer rede.
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
      }).addTo(map);
      L.control.zoom({ position: 'topright' }).addTo(map);

      layerQuadras = L.featureGroup().addTo(map);

      (dados.quadras || []).forEach(function(q) {
        var pts = parsePoly(q.polyString);
        if (pts.length < 3) return;
        var cor = (q.estado === 'completa') ? '#22c55e' : '#94a3b8';

        L.polygon(pts, {
          color: '#0a1929',
          weight: 1,
          fillColor: cor,
          fillOpacity: 0.55
        }).addTo(layerQuadras);
      });

      if (layerQuadras.getBounds().isValid()) {
        map.fitBounds(layerQuadras.getBounds(), { padding: [10, 10] });
      }
      // Força recálculo após o container ficar visível
      setTimeout(function(){ if (map) map.invalidateSize(); }, 250);
    }

    function parsePoly(str) {
      if (!str) return [];
      return str.replace(/\r\n|\n|\r/g, '|').split('|').map(function(p) {
        var c = p.trim().split(',');
        if (c.length < 2) return null;
        var lat = parseFloat(c[0]); var lng = parseFloat(c[1]);
        if (isNaN(lat) || isNaN(lng)) return null;
        return [lat, lng];
      }).filter(function(x){ return x !== null; });
    }

    function formatarBR(ymd) {
      if (!ymd) return '';
      var p = ymd.split('-');
      if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0];
      return ymd;
    }

    var MODALIDADES_PUB = [
      { key:'casa',      label:'Casa em casa',       icone:'fa-house' },
      { key:'comercial', label:'Comercial',          icone:'fa-briefcase' },
      { key:'rural',     label:'Rural',              icone:'fa-tractor' },
      { key:'cartas',    label:'Cartas',             icone:'fa-envelope' },
      { key:'telefone',  label:'Telefone',           icone:'fa-phone' },
      { key:'publico',   label:'Testemunho público', icone:'fa-bullhorn' }
    ];

    function escapeHtmlPub(s){
      return String(s||'').replace(/[&<>"']/g, function(c){
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }
    // Bloqueia esquemas perigosos em URLs (javascript:, data:, etc).
    function safeUrlPub(s){
      var u = String(s||'').trim();
      if (!u) return '';
      return (/^https?:\/\//i.test(u) || /^mailto:/i.test(u)) ? u : '';
    }

    function modalidadeMeta(key) {
      var m = MODALIDADES_PUB.find(function(x){ return x.key === key; });
      return m || { label: 'Outros', icone: 'fa-list' };
    }

    function carregarObjetivosPublicos() {
      google.script.run
        .withSuccessHandler(function(lista){
          window._listaObjPub = lista || [];
          if (!lista || lista.length === 0) return;

          var gerais = lista.filter(function(o){ return (o.tipo||'geral') === 'geral'; });
          var semana = lista.filter(function(o){ return o.tipo === 'semana'; });

          if (semana.length > 0) {
            document.getElementById('secaoObjSemana').classList.remove('d-none');
            document.getElementById('listaObjSemana').innerHTML = renderSemana(semana);
          }
          if (gerais.length > 0) {
            document.getElementById('secaoObjGerais').classList.remove('d-none');
            document.getElementById('listaObjGerais').innerHTML = renderGerais(gerais);
          }
        })
        .withFailureHandler(function(e){
          console.error('Erro objetivos:', e);
        })
        .listarObjetivosCampanhaPublicos();
    }

    function renderSemana(lista) {
      return lista.map(function(o){
        var meta = modalidadeMeta(o.modalidade);
        var anexos = '';
        var lnk = safeUrlPub(o.link);
        var anx = safeUrlPub(o.anexoUrl);
        if (lnk) anexos += '<a href="' + escapeHtmlPub(lnk) + '" target="_blank" rel="noopener"><i class="fa-solid fa-link"></i> Link</a>';
        if (anx) anexos += '<a href="' + escapeHtmlPub(anx) + '" target="_blank" rel="noopener"><i class="fa-solid fa-paperclip"></i> ' + escapeHtmlPub(o.anexoNome || 'Anexo') + '</a>';
        return '<div class="obj-semana">' +
                 '<div class="head"><i class="fa-solid ' + meta.icone + '"></i>' + escapeHtmlPub(meta.label) + '</div>' +
                 '<div class="titulo">' + escapeHtmlPub(o.titulo) + '</div>' +
                 (o.descricao ? '<div class="desc">' + escapeHtmlPub(o.descricao) + '</div>' : '') +
                 (anexos ? '<div class="anexos">' + anexos + '</div>' : '') +
               '</div>';
      }).join('');
    }

    function renderGerais(lista) {
      return lista.map(function(o){
        var meta = modalidadeMeta(o.modalidade);
        var links = '';
        var lnk2 = safeUrlPub(o.link);
        var anx2 = safeUrlPub(o.anexoUrl);
        if (lnk2) links += '<a href="' + escapeHtmlPub(lnk2) + '" target="_blank" rel="noopener" title="Link"><i class="fa-solid fa-link"></i></a>';
        if (anx2) links += '<a href="' + escapeHtmlPub(anx2) + '" target="_blank" rel="noopener" title="' + escapeHtmlPub(o.anexoNome || 'Anexo') + '"><i class="fa-solid fa-paperclip"></i></a>';
        return '<div class="obj-geral" title="' + escapeHtmlPub(meta.label) + '">' +
                 '<i class="fa-solid ' + meta.icone + ' modalidade"></i>' +
                 '<div class="titulo">' + escapeHtmlPub(o.titulo) + '</div>' +
                 (links ? '<div class="links">' + links + '</div>' : '') +
               '</div>';
      }).join('');
    }
  </script>
</body>

</html>
