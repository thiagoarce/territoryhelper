<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1929">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Campanha">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a1929;
      color: #e8eef5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding-bottom: 40px;
      min-height: 100vh;
    }
    .container-app { max-width: 720px; margin: 0 auto; }

    .hero {
      padding: 32px 24px 18px;
      text-align: center;
    }
    .hero .tag {
      letter-spacing: 4px;
      opacity: 0.55;
      font-size: 0.7rem;
      margin: 0;
      text-transform: uppercase;
    }
    .hero h1 {
      font-weight: 800;
      font-size: 1.9rem;
      margin: 8px 0 6px;
      letter-spacing: -0.5px;
    }
    .hero .periodo {
      opacity: 0.65;
      font-size: 0.85rem;
    }

    .card-app {
      background: #122638;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 22px 22px;
      margin: 12px 18px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }

    .progresso .topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 14px;
    }
    .progresso .pct {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2.5px;
      color: #22c55e;
    }
    .progresso .legenda {
      text-align: right;
      opacity: 0.7;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .progresso .legenda b { color: #fff; font-size: 1rem; }
    .barra {
      height: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .barra > div {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border-radius: 999px;
      transition: width 1s cubic-bezier(.2,.8,.2,1);
    }
    .infoExtra {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      opacity: 0.75;
    }
    .infoExtra b { color: #fff; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 0 18px 18px;
    }
    .stat {
      background: #122638;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px 14px;
      text-align: center;
    }
    .stat .num {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat .lbl {
      font-size: 0.7rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    .stat.completas .num { color: #4ade80; }
    .stat.restantes .num { color: #cbd5e1; }

    .secao-titulo {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.55;
      margin: 0 0 10px;
      padding: 0 24px;
    }

    .objetivo-card {
      background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(14,165,233,0.08));
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 18px;
      padding: 18px 20px;
      margin: 0 18px 18px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 0.95rem;
    }
    .objetivo-card .icone {
      font-size: 1.4rem;
      color: #4ade80;
      margin-bottom: 8px;
    }
    .estrategia-card {
      background: #122638;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 18px 20px;
      margin: 0 18px 18px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 0.95rem;
    }
    .estrategia-card .titulo {
      font-size: 0.85rem;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .meta-semanal {
      background: linear-gradient(135deg, #16a34a, #0d9488);
      border-radius: 20px;
      padding: 20px 22px;
      margin: 0 18px 18px;
      color: white;
    }
    .meta-semanal .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .meta-semanal .lbl {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.85;
    }
    .meta-semanal .num-grande {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }
    .meta-semanal .barra-meta {
      height: 8px;
      background: rgba(255,255,255,0.25);
      border-radius: 99px;
      overflow: hidden;
    }
    .meta-semanal .barra-meta > div {
      height: 100%;
      background: white;
      border-radius: 99px;
      transition: width 1s ease;
    }
    .meta-semanal .ritmo {
      margin-top: 10px;
      font-size: 0.85rem;
      opacity: 0.95;
    }

    .mapa-wrapper {
      margin: 0 18px 12px;
      border-radius: 20px;
      overflow: hidden;
      height: 42vh;
      min-height: 280px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    #mapa { width: 100%; height: 100%; background: #0a1929; }

    .legenda-mapa {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin: 0 18px 14px;
      font-size: 0.78rem;
      opacity: 0.85;
    }
    .legenda-mapa span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .dot.verde { background: #22c55e; }
    .dot.cinza { background: #6c757d; }

    .frase {
      text-align: center;
      padding: 16px 30px 26px;
      font-size: 0.95rem;
      opacity: 0.75;
      line-height: 1.4;
    }
    .frase b { color: #4ade80; }

    .loader-wrap {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0a1929; z-index: 9999;
    }
  </style>
</head>

<body>

  <div id="loader" class="loader-wrap">
    <div class="text-center">
      <div class="spinner-border text-success" role="status"></div>
      <div class="mt-3 small" style="opacity:.7">Carregando campanha...</div>
    </div>
  </div>

  <div id="app" class="container-app d-none">

    <div class="hero">
      <div class="tag">CAMPANHA</div>
      <h1 id="nomeCampanha">—</h1>
      <div class="periodo" id="periodoCampanha">—</div>
    </div>

    <div class="card-app progresso">
      <div class="topo">
        <div class="pct" id="pct">0%</div>
        <div class="legenda">
          <div><b id="numCompletas">0</b> de <b id="numTotal">0</b></div>
          <div>quadras concluídas</div>
        </div>
      </div>
      <div class="barra"><div id="barraFill" style="width:0%"></div></div>
      <div class="infoExtra">
        <span id="infoDias"></span>
        <span id="infoRitmo"></span>
      </div>
    </div>

    <div class="stats">
      <div class="stat completas">
        <div class="num" id="statCompletas">0</div>
        <div class="lbl">Concluídas</div>
      </div>
      <div class="stat restantes">
        <div class="num" id="statRestantes">0</div>
        <div class="lbl">Restantes</div>
      </div>
    </div>

    <div class="meta-semanal" id="boxMeta">
      <div class="header">
        <div>
          <div class="lbl">Meta da semana</div>
          <div class="num-grande"><span id="numFeitasSemana">0</span> / <span id="numMetaSemana">—</span></div>
        </div>
        <div style="text-align:right">
          <i class="fa-solid fa-bolt" style="font-size:1.8rem; opacity:.7"></i>
        </div>
      </div>
      <div class="barra-meta"><div id="barraSemana" style="width:0%"></div></div>
      <div class="ritmo" id="ritmoSemana"></div>
    </div>

    <div id="secaoObjetivo" class="d-none">
      <h6 class="secao-titulo">Nosso objetivo</h6>
      <div class="objetivo-card">
        <div class="icone"><i class="fa-solid fa-bullseye"></i></div>
        <div id="textoObjetivo"></div>
      </div>
    </div>

    <div id="secaoEstrategia" class="d-none">
      <div class="estrategia-card">
        <div class="titulo"><i class="fa-solid fa-route me-2"></i>Como vamos trabalhar</div>
        <div id="textoEstrategia"></div>
      </div>
    </div>

    <h6 class="secao-titulo">Mapa do território</h6>
    <div class="mapa-wrapper">
      <div id="mapa"></div>
    </div>

    <div class="legenda-mapa">
      <span><span class="dot verde"></span> Concluída</span>
      <span><span class="dot cinza"></span> Restante</span>
    </div>

    <div class="frase" id="fraseMotivacional">
      Cada quadra conta. <b>Vamos juntos!</b>
    </div>
  </div>

  <script>
    var dados = null;
    var map, layerQuadras;

    window.onload = function() { carregar(); };

    function carregar() {
      google.script.run
        .withSuccessHandler(function(r) {
          if (!r) { document.getElementById('loader').innerHTML = '<div style="opacity:.7">Sem dados disponíveis.</div>'; return; }
          dados = r;
          document.getElementById('loader').classList.add('d-none');
          document.getElementById('app').classList.remove('d-none');
          renderizar();
          desenharMapa();
        })
        .withFailureHandler(function(e){
          document.getElementById('loader').innerHTML = '<div style="color:#f87171">Erro: ' + (e && e.message ? e.message : e) + '</div>';
        })
        .getDadosCampanhaPublico();
    }

    function renderizar() {
      document.getElementById('nomeCampanha').innerText = dados.nome || 'Campanha';

      // Período
      var per = [];
      if (dados.dataInicio) per.push(formatarBR(dados.dataInicio));
      if (dados.dataFim) per.push('até ' + formatarBR(dados.dataFim));
      document.getElementById('periodoCampanha').innerText = per.join(' ') || '—';

      // Numbers principais
      document.getElementById('numCompletas').innerText = dados.completas;
      document.getElementById('numTotal').innerText = dados.totalQuadras;
      document.getElementById('statCompletas').innerText = dados.completas;
      document.getElementById('statRestantes').innerText = dados.restantes;

      // Pct animado uma vez só
      animarPorcentagem(dados.porcentagem);

      // Info dias e ritmo
      var infoDias = '';
      var infoRitmo = '';
      if (dados.dataInicio) {
        var ini = new Date(dados.dataInicio + 'T00:00:00');
        var hoje = new Date();
        var diasDeCampanha = Math.max(0, Math.ceil((hoje - ini) / (1000*60*60*24)));
        infoDias = '<b>' + diasDeCampanha + '</b> dias de campanha';
      }
      if (dados.ritmoNecessario != null) {
        infoRitmo = 'Precisamos de <b>' + dados.ritmoNecessario + '</b> qd/semana';
      }
      document.getElementById('infoDias').innerHTML = infoDias;
      document.getElementById('infoRitmo').innerHTML = infoRitmo;

      // Objetivo
      if (dados.objetivo && dados.objetivo.trim()) {
        document.getElementById('textoObjetivo').innerText = dados.objetivo;
        document.getElementById('secaoObjetivo').classList.remove('d-none');
      }

      // Estratégia
      if (dados.estrategia && dados.estrategia.trim()) {
        document.getElementById('textoEstrategia').innerText = dados.estrategia;
        document.getElementById('secaoEstrategia').classList.remove('d-none');
      }

      // Meta da semana
      var meta = dados.metaSemanal || 0;
      var feitas = dados.completasSemana || 0;
      document.getElementById('numFeitasSemana').innerText = feitas;
      document.getElementById('numMetaSemana').innerText = meta > 0 ? meta : '—';
      var pctMeta = meta > 0 ? Math.min(100, (feitas / meta) * 100) : 0;
      document.getElementById('barraSemana').style.width = pctMeta + '%';
      if (meta > 0) {
        if (feitas >= meta) document.getElementById('ritmoSemana').innerText = '🎯 Meta da semana batida!';
        else document.getElementById('ritmoSemana').innerText = 'Faltam ' + (meta - feitas) + ' para a meta da semana.';
      } else {
        document.getElementById('boxMeta').style.display = 'none';
      }

      document.getElementById('fraseMotivacional').innerHTML = fraseMotivacional(dados.porcentagem);
    }

    function animarPorcentagem(alvo) {
      var pctEl = document.getElementById('pct');
      var barra = document.getElementById('barraFill');
      barra.style.width = alvo + '%';

      var atual = 0;
      var passo = Math.max(1, Math.ceil(alvo / 40));
      var t = setInterval(function() {
        atual += passo;
        if (atual >= alvo) { atual = alvo; clearInterval(t); }
        pctEl.innerText = atual + '%';
      }, 22);
    }

    function fraseMotivacional(pct) {
      if (pct >= 100) return '🎉 <b>Campanha concluída!</b> Obrigado a todos!';
      if (pct >= 75) return 'Reta final! <b>Falta pouco.</b>';
      if (pct >= 50) return 'Já passamos da metade! <b>Bora continuar.</b>';
      if (pct >= 25) return 'O trabalho está crescendo. <b>Cada quadra conta!</b>';
      return 'Começando com tudo. <b>Vamos juntos!</b>';
    }

    function desenharMapa() {
      if (map) map.remove();
      map = L.map('mapa', { zoomControl: false, attributionControl: false })
              .setView([-7.115, -34.863], 14);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 19
      }).addTo(map);
      L.control.zoom({ position: 'topright' }).addTo(map);

      layerQuadras = L.featureGroup().addTo(map);

      (dados.quadras || []).forEach(function(q) {
        var pts = parsePoly(q.polyString);
        if (pts.length < 3) return;
        var cor = (q.estado === 'completa') ? '#22c55e' : '#475569';

        L.polygon(pts, {
          color: '#0a1929',
          weight: 1,
          fillColor: cor,
          fillOpacity: 0.85
        }).addTo(layerQuadras);
      });

      if (layerQuadras.getBounds().isValid()) {
        map.fitBounds(layerQuadras.getBounds(), { padding: [10, 10] });
      }
    }

    function parsePoly(str) {
      if (!str) return [];
      return str.replace(/\r\n|\n|\r/g, '|').split('|').map(function(p) {
        var c = p.trim().split(',');
        if (c.length < 2) return null;
        var lat = parseFloat(c[0]); var lng = parseFloat(c[1]);
        if (isNaN(lat) || isNaN(lng)) return null;
        return [lat, lng];
      }).filter(function(x){ return x !== null; });
    }

    function formatarBR(ymd) {
      if (!ymd) return '';
      var p = ymd.split('-');
      if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0];
      return ymd;
    }
  </script>
</body>

</html>
