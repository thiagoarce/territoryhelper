  <!-- Sortable só é usado quando o publicador entra em modo "reordenar".
       Lazy-load via JS quando precisar (carregarSortableSeNecessario). -->
  <script>
    window._sortableLoadPromise = null;
    window.carregarSortableSeNecessario = function() {
      if (window.Sortable) return Promise.resolve();
      if (window._sortableLoadPromise) return window._sortableLoadPromise;
      window._sortableLoadPromise = new Promise(function(resolve, reject){
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js';
        s.onload = function(){ resolve(); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
      return window._sortableLoadPromise;
    };
  </script>

  <script>
    // Aplica tema escuro salvo (compartilhado com Index via localStorage)
    try {
      var temaSalvo = localStorage.getItem('th_tema');
      if (temaSalvo === 'escuro') document.body.classList.add('tema-escuro');
      // Acessibilidade: aplica texto grande se persistido
      if (localStorage.getItem('pub_texto_grande') === 'true') {
        document.body.classList.add('texto-grande');
      }
    } catch(e) {}

    // Salva cache do publicador com retry: se QuotaExceededError, limpa
    // caches v3 antigos (de outras designações) e tenta de novo.
    function salvarCachePublico(chave, payload) {
      var str = JSON.stringify(payload);
      try { localStorage.setItem(chave, str); return true; }
      catch(e) {
        try {
          // Remove outros caches publico_dados_v3_* (mantém só o atual)
          var aDeletar = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('publico_dados_v3_') === 0 && k !== chave) aDeletar.push(k);
          }
          aDeletar.forEach(function(k){ localStorage.removeItem(k); });
          localStorage.setItem(chave, str);
          return true;
        } catch(e2) {
          if (window.toast) window.toast('Storage do navegador cheio — cache desativado.', 'warn', 5000);
          return false;
        }
      }
    }

    window.alternarTextoGrande = function() {
      var on = document.body.classList.toggle('texto-grande');
      try { localStorage.setItem('pub_texto_grande', on ? 'true' : 'false'); } catch(e) {}
    };

    var dadosGerais = [];
    var contextoPolys = [];
    var infoTCE = null; // se ?te=ID, recebe { id, nome, publicador, total, polyString }
    var map, userMarker, layerQuadra, layerPontos, layerContexto;
    var modalEdicao;
    var isReorder = false;
    var isPickingLocation = false;
    var sortables = [];

    // Parâmetro `te` injetado pelo doGet — ID do Território Comercial
    // Especial. Se presente, o publicador vê SÓ os endereços do TCE
    // em vez da estrutura por quadra.
    var TE_ID = "<?= te ?>";
    // IDs via template server-side (não google.script.url.getLocation que
    // falha silenciosamente em iOS Safari por postMessage de origem errada)
    var IDS_PUB = "<?= ids ?>";

    // Lógica de Cores e Ícones
    function getVisualPorTipo(tipo) {
        if(!tipo) return { cls: 'c-outros', color: '#6c757d', icon: 'fa-map-pin' };
        var t = tipo.toLowerCase();
        
        // Comerciais/Inst
        if(t.includes('comercial') || t.includes('estabelecimento') || t.includes('religiosa') || t.includes('ensino') || t.includes('saúde') || t.includes('agro')) 
            return { cls: 'c-comercio', color: '#fd7e14', icon: 'fa-store' };
        
        // Residenciais
        if(t.includes('apartamento')) 
            return { cls: 'c-apto', color: '#0d6efd', icon: 'fa-building' };
        
        if(t.includes('casa') || t.includes('domicílio') || t.includes('alojamento')) 
            return { cls: 'c-casa', color: '#198754', icon: 'fa-house' };
            
        return { cls: 'c-outros', color: '#6c757d', icon: 'fa-location-dot' };
    }

    window.onload = function() {
       modalEdicao = new bootstrap.Modal(document.getElementById('modalEdicao'));
       carregarDados();

       // Indicador de conexão
       var atualizarOnline = function() {
         var el = document.getElementById('indicadorOffline');
         if (!el) return;
         if (navigator.onLine) el.classList.add('d-none');
         else el.classList.remove('d-none');
       };
       window.addEventListener('online', atualizarOnline);
       window.addEventListener('offline', atualizarOnline);
       atualizarOnline();

       // Voltar ao topo
       window.addEventListener('scroll', function() {
         var btn = document.getElementById('btnVoltarTopo');
         if (!btn) return;
         if (window.scrollY > 600) btn.classList.remove('d-none');
         else btn.classList.add('d-none');
       });
    };

    // Cache POR QUADRA — chave: publico_quadra_v1_<ID>. TTL 48h.
    // Vantagem vs cache por designação inteira:
    //   - Cada quadra que o publicador já viu fica salva pra sempre
    //   - Próximo link com IDs DIFERENTES reusa as quadras já vistas
    //   - 1ª carga visualmente instantânea pras quadras já cacheadas
    var TTL_QUADRA_MS = 48 * 60 * 60 * 1000;
    function _keyQuadra(id) { return 'publico_quadra_v1_' + id; }
    function lerCacheQuadra(id) {
      try {
        var raw = localStorage.getItem(_keyQuadra(id));
        if (!raw) return null;
        var env = JSON.parse(raw);
        if (env && env.t && env.d && (Date.now() - env.t) < TTL_QUADRA_MS) return env.d;
      } catch(e) {}
      return null;
    }
    function salvarCacheQuadra(quadra) {
      if (!quadra || !quadra.id) return;
      var env = { t: Date.now(), d: quadra };
      try { localStorage.setItem(_keyQuadra(quadra.id), JSON.stringify(env)); return; }
      catch(e) {
        // Quota cheia: limpa quadras cacheadas mais antigas e tenta de novo
        _limparQuadrasAntigas();
        try { localStorage.setItem(_keyQuadra(quadra.id), JSON.stringify(env)); }
        catch(e2) { /* desisto silenciosamente */ }
      }
    }
    function _limparQuadrasAntigas() {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf('publico_quadra_v1_') === 0) {
          try {
            var env = JSON.parse(localStorage.getItem(k));
            keys.push({ k: k, t: env && env.t || 0 });
          } catch(e) {}
        }
      }
      keys.sort(function(a, b){ return a.t - b.t; });
      // Remove a metade mais antiga
      var rem = Math.floor(keys.length / 2);
      for (var j = 0; j < rem; j++) {
        try { localStorage.removeItem(keys[j].k); } catch(e) {}
      }
    }

    function carregarDados() {
        // Caso TCE: usa fluxo separado (lista de endereços, sem quadras)
        if (TE_ID) { carregarTCE(); return; }

        var ids = IDS_PUB;
        if (!ids) { window.toast && window.toast("Link inválido (sem IDs).", "warn"); return; }
        var idsArr = ids.split(',').map(function(s){ return s.trim(); }).filter(Boolean);

        function aplicar(payload) {
          dadosGerais = payload.designadas || [];
          contextoPolys = payload.contexto || [];
          // Sincroniza estado de carta vindo do servidor com localStorage.
          dadosGerais.forEach(function(q){
            (q.itens || []).forEach(function(it){
              if (it.cartaEntregue && localStorage.getItem('carta_' + it.row) !== 'true') {
                try { localStorage.setItem('carta_' + it.row, 'true'); } catch(e) {}
              }
            });
          });
          mostrarApp();
        }

        // PASSO 1: monta dadosGerais imediato com cache por quadra (se houver)
        var cachedDesignadas = [];
        idsArr.forEach(function(id){
          var c = lerCacheQuadra(id);
          if (c) cachedDesignadas.push(c);
        });
        var temCache = cachedDesignadas.length > 0;
        if (temCache) {
          aplicar({ designadas: cachedDesignadas, contexto: [] });
        }

        // PASSO 2: busca tudo do servidor (designadas + contexto) e atualiza
        google.script.run
            .withSuccessHandler(function(data) {
                if (!data || !data.designadas || data.designadas.length === 0) {
                  if (!temCache) window.toast && window.toast("Nenhum dado encontrado.", "warn");
                  return;
                }
                // Atualiza cache POR QUADRA com os dados frescos
                data.designadas.forEach(salvarCacheQuadra);
                aplicar(data);
            })
            .withFailureHandler(function(e) {
                if (!temCache) {
                  document.getElementById('loader').innerHTML =
                    '<div class="text-danger px-3 text-center">' +
                      '<i class="fa-solid fa-circle-xmark fa-2x mb-3"></i>' +
                      '<div>Sem conexão e sem dados salvos.</div>' +
                      '<button class="btn btn-sm btn-outline-primary mt-3" onclick="location.reload()">Tentar de novo</button>' +
                    '</div>';
                }
            })
            .getDadosComContexto(ids);
    }

    // Modo TCE: trata endereços como uma "pseudo-quadra" pra reusar
    // toda a infra de renderização (lista, mapa, marcações de desfecho).
    function carregarTCE() {
      google.script.run
        .withSuccessHandler(function(r){
          if (!r || !r.ok) {
            document.getElementById('loader').innerHTML =
              '<div class="text-danger px-3">' + (r && r.erro || 'Erro') + '</div>';
            return;
          }
          infoTCE = r.tce;
          window._tceReadonly = !!(r.tce && r.tce.readonly);
          // Monta dadosGerais com 1 "quadra virtual" contendo os endereços
          // do TCE. ID começa com TCE_ pra distinguir em logs.
          var itens = (r.enderecos || []).map(function(e){
            return {
              row: e.row, quadra: 'TCE_' + r.tce.id,
              face: '', logradouro: e.logradouro, numero: e.numero,
              complemento: e.complemento, lat: e.lat, lng: e.lng,
              tipo: e.tipo, nome: e.nome, nota: e.nota,
              naoVisitar: false, ordem: null,
              ultimaVisita: '',
              ultimoTipo: e.ultimoTipo, ultimoDataStr: e.ultimoDataStr
            };
          });
          dadosGerais = [{
            id: r.tce.nome, polyString: r.tce.polyString || '',
            ultimaData: 'TCE', itens: itens
          }];
          contextoPolys = [];
          mostrarApp();
        })
        .withFailureHandler(function(e){
          document.getElementById('loader').innerHTML =
            '<div class="text-danger px-3">Erro: ' + (e && e.message ? e.message : e) + '</div>';
        })
        .getDadosTCE(TE_ID);
    }

    function mostrarApp() {
      // Banner read-only se TCE concluído/cancelado: usuário consegue
      // visualizar histórico mas botões de marcar ficam inertes.
      if (window._tceReadonly && infoTCE) {
        var banner = document.createElement('div');
        banner.style.cssText = 'background:#fef3c7; border-left:4px solid #f59e0b; color:#92400e; padding:10px 14px; margin:8px 12px; border-radius:8px; font-size:.9rem;';
        banner.innerHTML = '<i class="fa-solid fa-lock"></i> Território comercial <b>' + (infoTCE.status === 'concluido' ? 'concluído' : 'fechado') + '</b>' +
                           (infoTCE.dataConcStr ? ' em ' + infoTCE.dataConcStr : '') +
                           '. Marcações desabilitadas — só visualização.';
        var appContent = document.getElementById('app-content');
        appContent.parentNode.insertBefore(banner, appContent);
      }
      document.getElementById('loader').classList.add('d-none');
      // Mostra switch de modo (sempre)
      document.getElementById('switchModo').classList.remove('d-none');
      // Padrão: modo simples na 1ª visita (sem chave salva).
      // Quem já usou continua no que escolheu.
      var modoSalvo = null;
      try { modoSalvo = localStorage.getItem('modo_pub'); } catch(e) {}
      aplicarModo(modoSalvo || 'simples');
    }

    function aplicarModo(modo) {
      try { localStorage.setItem('modo_pub', modo); } catch(e) {}
      var simples = document.getElementById('appSimples');
      var avc = document.getElementById('app-content');
      var mapa = document.getElementById('mapa-container');
      var lbl = document.getElementById('lblModo');
      var ico = document.getElementById('iconModo');
      var btnReorder = document.getElementById('btnReorder');
      var btnAdd = document.getElementById('btnAddEndereco');
      if (modo === 'simples') {
        simples.classList.remove('d-none');
        avc.classList.add('d-none');
        mapa.classList.add('d-none');
        // Reordenar/adicionar não fazem sentido no fluxo do publicador
        // no campo — escondidos pra não confundir.
        if (btnReorder) btnReorder.classList.add('d-none');
        if (btnAdd) btnAdd.classList.add('d-none');
        if (lbl) lbl.textContent = 'Modo avançado';
        if (ico) ico.className = 'fa-solid fa-table';
        renderizarSimples();
      } else {
        simples.classList.add('d-none');
        avc.classList.remove('d-none');
        mapa.classList.remove('d-none');
        if (btnReorder) btnReorder.classList.remove('d-none');
        if (btnAdd) btnAdd.classList.remove('d-none');
        if (lbl) lbl.textContent = 'Modo simples';
        if (ico) ico.className = 'fa-solid fa-list';
        iniciarMapa();
        renderizarLista();
        if (window.atualizarCobertura) window.atualizarCobertura();
      }
    }

    window.alternarModoPublicador = function() {
      var atual;
      try { atual = localStorage.getItem('modo_pub') || 'avancado'; } catch(e) { atual = 'avancado'; }
      aplicarModo(atual === 'simples' ? 'avancado' : 'simples');
    };

    // ====== MODO SIMPLES: hub (quadras) → faces → paradas ======
    // Estrutura: trabalha-se UMA quadra de cada vez, UMA face de cada vez.
    // O publicador escolhe a quadra no hub, depois a face, depois marca paradas.
    var _simplesView = 'hub'; // 'hub' | 'faces' | 'paradas'
    var _simplesQuadra = null;
    var _simplesFace = null;
    var _simplesMiniMap = null;
    var _simplesUserPos = null;
    var _simplesUserMarker = null;
    var _ultimoSync = null;
    var _autoRefreshInt = null;
    var _geoWatchId = null;

    try {
      _simplesQuadra = localStorage.getItem('simples_quadra') || null;
      _simplesFace = localStorage.getItem('simples_face') || null;
      if (_simplesFace) _simplesView = 'paradas';
      else if (_simplesQuadra) _simplesView = 'faces';
    } catch(e) {}

    function escapeHtmlPub(s){ return String(s||'').replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

    function renderizarSimples() {
      var box = document.getElementById('appSimples');
      if (!dadosGerais || dadosGerais.length === 0) {
        box.innerHTML = '<div class="text-center text-muted py-5">Sem endereços.</div>';
        return;
      }
      // Sanity: se a quadra salva sumiu da designação atual, volta pro hub
      if (_simplesQuadra && !dadosGerais.find(function(q){ return q.id === _simplesQuadra; })) {
        _simplesQuadra = null; _simplesFace = null; _simplesView = 'hub';
        try { localStorage.removeItem('simples_quadra'); localStorage.removeItem('simples_face'); } catch(e) {}
      }
      if (_simplesView === 'paradas') renderParadas();
      else if (_simplesView === 'faces') renderFaces();
      else renderHub();
      iniciarAutoRefreshSimples();
    }

    function _statusQuadraSimples(q) {
      var total = 0, feitos = 0;
      (q.itens || []).forEach(function(it){
        if (it.naoVisitar) return;
        total++;
        if (localStorage.getItem('desf_' + it.row)) feitos++;
      });
      return { total: total, feitos: feitos,
               pct: total > 0 ? Math.round(feitos/total*100) : 0 };
    }

    // Paleta de cores por face IBGE (sentido horário F1→F4). Quinta+ face
    // = pega o índice mod 4. F vazio fica cinza neutro.
    var FACE_COLORS = ['#1976d2', '#dc2626', '#16a34a', '#f59e0b', '#7c3aed', '#0891b2'];
    function _corDeFace(face) {
      if (!face || face === '—') return '#6b7280';
      var n = parseInt(String(face).replace(/\D/g, ''), 10);
      if (isNaN(n) || n < 1) return '#6b7280';
      return FACE_COLORS[(n - 1) % FACE_COLORS.length];
    }
    function _faceKey(it) { return String(it.faceIBGE || '').trim() || '—'; }

    function _facesDeQuadra(q) {
      var faces = {}; var todasKeys = {};
      (q.itens || []).forEach(function(it){
        if (it.naoVisitar) return;
        var f = _faceKey(it);
        if (!faces[f]) { faces[f] = []; todasKeys[f] = true; }
        faces[f].push(it);
      });
      // Ordena ascendente: F1, F2, F3, F4. "—" (sem face) por último.
      var ordem = Object.keys(todasKeys).sort(function(a, b){
        if (a === '—') return 1;
        if (b === '—') return -1;
        var na = parseInt(a.replace(/\D/g, ''), 10);
        var nb = parseInt(b.replace(/\D/g, ''), 10);
        if (isNaN(na) && isNaN(nb)) return a.localeCompare(b);
        if (isNaN(na)) return 1;
        if (isNaN(nb)) return -1;
        return na - nb;
      });
      return ordem.map(function(f){
        var itens = faces[f];
        var feitos = itens.filter(function(it){ return localStorage.getItem('desf_' + it.row); }).length;
        return { face: f, itens: itens, total: itens.length, feitos: feitos, cor: _corDeFace(f) };
      });
    }

    // Ordena aptos dentro de um prédio por complemento alfanumérico
    // crescente: 101, 102, 201, 202... ou "Apto 1", "Apto 2"...
    function _ordenarAptos(aptos) {
      return aptos.slice().sort(function(a, b){
        return String(a.complemento || '').localeCompare(
          String(b.complemento || ''),
          'pt-BR', { numeric: true, sensitivity: 'base' }
        );
      });
    }

    function _paradasDeFace(q, face) {
      var itens = (q.itens || []).filter(function(it){
        if (it.naoVisitar) return false;
        return _faceKey(it) === face;
      });
      var inverter = false;
      try { inverter = localStorage.getItem('simples_inverso') === 'true'; } catch(e) {}
      if (inverter) itens = itens.slice().reverse();
      var grupos = {}; var ordem = [];
      itens.forEach(function(it){
        var k = (it.logradouro || '') + '|' + (it.numero || '');
        if (!grupos[k]) { grupos[k] = { logradouro: it.logradouro, numero: it.numero, aptos: [] }; ordem.push(k); }
        grupos[k].aptos.push(it);
      });
      return ordem.map(function(k){
        var g = grupos[k];
        return g.aptos.length === 1
          ? { tipo:'item', item: g.aptos[0] }
          : { tipo:'predio', logradouro: g.logradouro, numero: g.numero, aptos: _ordenarAptos(g.aptos) };
      });
    }

    function renderHub() {
      var box = document.getElementById('appSimples');
      var cards = dadosGerais.map(function(q){
        var s = _statusQuadraSimples(q);
        var cls = s.total > 0 && s.feitos === s.total ? 'completa' :
                  s.feitos > 0 ? 'parcial' : '';
        var ic = s.total > 0 && s.feitos === s.total ? '✓' : s.feitos > 0 ? '◐' : '';
        var idEsc = q.id.replace(/'/g, "\\'");
        return '<div class="hub-card ' + cls + '" onclick="window.simplesEscolherQuadra(\'' + idEsc + '\')">' +
                 '<div style="flex:1">' +
                   '<div class="hub-card-titulo">Quadra ' + escapeHtmlPub(q.id) + '</div>' +
                   '<div class="hub-card-sub">' + s.feitos + ' de ' + s.total + ' tocados</div>' +
                   '<div class="barra-mini"><div style="width:' + s.pct + '%"></div></div>' +
                 '</div>' +
                 '<div class="hub-card-status">' + ic + '</div>' +
               '</div>';
      }).join('');
      box.innerHTML =
        '<div class="topbar-simples">' +
          '<button onclick="window.simplesRefresh()" title="Buscar atualizações de outros publicadores"><i class="fa-solid fa-rotate"></i> Atualizar</button>' +
          '<div class="brisa" id="simplesUltimoSync"></div>' +
        '</div>' +
        '<div class="hub-mapa" id="simplesMapaMini"></div>' +
        '<div class="hub-titulo">' + (dadosGerais.length === 1 ? 'Sua designação' : 'Escolha a quadra que vai trabalhar') + '</div>' +
        cards;
      _atualizarBrisaSync();
      iniciarMapaSimples();
    }

    function renderFaces() {
      var q = dadosGerais.find(function(qq){ return qq.id === _simplesQuadra; });
      if (!q) { _simplesView = 'hub'; return renderHub(); }
      var faces = _facesDeQuadra(q);
      // Se só tem 1 face (ou nenhuma face cadastrada), pula direto pra paradas
      if (faces.length <= 1) {
        _simplesFace = faces.length === 1 ? faces[0].face : '—';
        _simplesView = 'paradas';
        try { localStorage.setItem('simples_face', _simplesFace); } catch(e) {}
        return renderParadas();
      }
      var box = document.getElementById('appSimples');
      var cards = faces.map(function(f){
        var pct = f.total > 0 ? Math.round(f.feitos/f.total*100) : 0;
        var cls = f.feitos === f.total ? 'completa' : f.feitos > 0 ? 'parcial' : '';
        var ic = f.feitos === f.total ? '✓' : f.feitos > 0 ? '◐' : '';
        var nome = f.face === '—' ? 'Sem face cadastrada' : 'Face ' + f.face;
        var fEsc = f.face.replace(/'/g, "\\'");
        return '<div class="hub-card ' + cls + '" onclick="window.simplesEscolherFace(\'' + fEsc + '\')" style="border-left:6px solid ' + f.cor + '">' +
                 '<div style="flex:1">' +
                   '<div class="hub-card-titulo">' +
                     '<span style="display:inline-block; width:14px; height:14px; border-radius:4px; background:' + f.cor + '; margin-right:8px; vertical-align:middle"></span>' +
                     escapeHtmlPub(nome) +
                   '</div>' +
                   '<div class="hub-card-sub">' + f.feitos + ' de ' + f.total + ' tocados</div>' +
                   '<div class="barra-mini"><div style="width:' + pct + '%; background:' + f.cor + '"></div></div>' +
                 '</div>' +
                 '<div class="hub-card-status">' + ic + '</div>' +
               '</div>';
      }).join('');
      box.innerHTML =
        '<div class="topbar-simples">' +
          '<button onclick="window.simplesVoltarHub()"><i class="fa-solid fa-arrow-left"></i> Quadras</button>' +
          '<button onclick="window.simplesRefresh()" title="Atualizar"><i class="fa-solid fa-rotate"></i></button>' +
          '<div class="brisa" id="simplesUltimoSync"></div>' +
        '</div>' +
        '<div class="hub-mapa" id="simplesMapaMini"></div>' +
        '<div class="hub-titulo">Quadra ' + escapeHtmlPub(q.id) + ' · escolha a face</div>' +
        cards;
      _atualizarBrisaSync();
      iniciarMapaSimples();
    }

    function renderParadas() {
      var q = dadosGerais.find(function(qq){ return qq.id === _simplesQuadra; });
      if (!q) { _simplesView = 'hub'; return renderHub(); }
      var paradas = _paradasDeFace(q, _simplesFace);
      var box = document.getElementById('appSimples');
      var inverso = false;
      try { inverso = localStorage.getItem('simples_inverso') === 'true'; } catch(e) {}
      var iconeInv = inverso ? 'fa-rotate-left' : 'fa-rotate-right';
      // Mostra "Faces" só se a quadra tem mais de uma. Senão, volta direto pra hub.
      var temFaces = _facesDeQuadra(q).length > 1;
      var voltarBtn = temFaces
        ? '<button onclick="window.simplesVoltarFaces()"><i class="fa-solid fa-arrow-left"></i> Faces</button>'
        : '<button onclick="window.simplesVoltarHub()"><i class="fa-solid fa-arrow-left"></i> Quadras</button>';
      var nomeFace = _simplesFace === '—' ? '' : ' · Face ' + _simplesFace;

      if (paradas.length === 0) {
        box.innerHTML =
          '<div class="topbar-simples">' + voltarBtn + '</div>' +
          '<div class="text-center text-muted py-5">Sem endereços nesta face.</div>';
        return;
      }
      var feitos = paradas.filter(function(p){
        if (p.tipo === 'item') return localStorage.getItem('desf_' + p.item.row);
        return p.aptos.every(function(a){ return localStorage.getItem('desf_' + a.row); });
      }).length;
      var cards = paradas.map(renderCardParada).join('');
      var corFace = _corDeFace(_simplesFace);
      box.innerHTML =
        '<div class="topbar-simples">' +
          voltarBtn +
          '<button onclick="window.simplesInverter()" title="Inverter sentido"><i class="fa-solid ' + iconeInv + '"></i></button>' +
          '<button onclick="window.simplesRefresh()" title="Atualizar"><i class="fa-solid fa-rotate"></i></button>' +
        '</div>' +
        '<div class="hub-mapa" id="simplesMapaMini"></div>' +
        '<div class="cabecalho" style="background:' + corFace + '">' +
          '<div class="progresso">' + feitos + ' de ' + paradas.length + ' paradas feitas</div>' +
          '<div class="quadra">Quadra ' + escapeHtmlPub(q.id) + escapeHtmlPub(nomeFace) + '</div>' +
        '</div>' +
        cards;
      iniciarMapaSimples();
    }

    function renderCardParada(p) {
      if (p.tipo === 'predio') {
        var titPredio = p.logradouro + ', ' + p.numero;
        var subPredio = p.aptos.length + ' apartamento(s)';
        // Pega lat/lng do primeiro apto com coordenada — todos do mesmo
        // prédio compartilham (ou estão a poucos metros)
        var aptoComCoord = p.aptos.find(function(a){ return a.lat && a.lng; });
        var mapsHref = aptoComCoord
          ? 'https://www.google.com/maps/dir/?api=1&destination=' + aptoComCoord.lat + ',' + aptoComCoord.lng
          : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(titPredio + ' Brasil');
        var aptosHtml = p.aptos.map(function(a){
          var d = localStorage.getItem('desf_' + a.row) || '';
          var c = localStorage.getItem('carta_' + a.row) === 'true';
          var nome = a.complemento || a.tipo || 'Apto';
          return '<div class="apto-mini">' +
                   '<div class="apto-mini-nome">' + escapeHtmlPub(nome) + '</div>' +
                   '<div class="apto-mini-acoes">' +
                     btnMini('naoAtendeu', '🚪', d === 'naoAtendeu', a.row) +
                     btnMini('semConversa', '📞', d === 'semConversa', a.row) +
                     btnMini('conversou', '✓', d === 'conversou', a.row) +
                     '<button class="mini-acao carta' + (c ? ' ativo' : '') + '" onclick="window.simplesCarta(' + a.row + ')">✉</button>' +
                   '</div>' +
                 '</div>';
        }).join('');
        // Chave do prédio (mesma do backend): logradouro|numero em lowercase
        var chavePr = (p.logradouro || '').trim().toLowerCase() + '|' + (p.numero || '').trim().toLowerCase();
        // Street View: usa lat/lng do primeiro apto com coordenada
        var svHref = aptoComCoord
          ? 'https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=' + aptoComCoord.lat + ',' + aptoComCoord.lng
          : '';
        return '<div class="card-end">' +
                 '<div class="endereco-titulo"><i class="fa-solid fa-building me-2"></i>' + escapeHtmlPub(titPredio) + '</div>' +
                 '<div class="endereco-sub">' + subPredio + '</div>' +
                 '<div class="d-flex gap-3 mb-2 flex-wrap" style="font-size:.85rem">' +
                   '<a href="' + mapsHref + '" target="_blank" rel="noopener" style="color:#1976d2"><i class="fa-solid fa-map-location-dot me-1"></i>Como chegar</a>' +
                   (svHref ? '<a href="' + svHref + '" target="_blank" rel="noopener" style="color:#16a34a"><i class="fa-solid fa-street-view me-1"></i>Street View</a>' : '') +
                   '<a href="#" onclick="event.preventDefault(); window.abrirEdicaoPredio(\'' + chavePr.replace(/'/g, "\\'") + '\')" style="color:#7c3aed"><i class="fa-solid fa-pen-to-square me-1"></i>Editar prédio</a>' +
                 '</div>' +
                 '<div class="aptos-grid">' + aptosHtml + '</div>' +
               '</div>';
      }
      var it = p.item;
      var desfecho = localStorage.getItem('desf_' + it.row) || '';
      var carta = localStorage.getItem('carta_' + it.row) === 'true';
      var titulo = it.nome ? it.nome : (it.complemento ? it.complemento : (it.logradouro + ', ' + it.numero));
      var sub = it.nome ? (it.logradouro + ', ' + it.numero + (it.complemento ? ' — ' + it.complemento : ''))
                        : (it.complemento ? (it.logradouro + ', ' + it.numero) : it.tipo);
      var mapsHref = (it.lat && it.lng)
        ? 'https://www.google.com/maps/dir/?api=1&destination=' + it.lat + ',' + it.lng
        : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(it.logradouro + ', ' + it.numero);
      return '<div class="card-end">' +
               '<div class="endereco-titulo">' + escapeHtmlPub(titulo) + '</div>' +
               '<div class="endereco-sub">' + escapeHtmlPub(sub) + '</div>' +
               (it.nota ? '<div class="nota-pessoal"><i class="fa-solid fa-note-sticky me-1"></i>' + escapeHtmlPub(it.nota) + '</div>' : '') +
               '<div class="mb-2"><a href="' + mapsHref + '" target="_blank" rel="noopener" style="color:#1976d2"><i class="fa-solid fa-map-location-dot me-1"></i>Como chegar</a></div>' +
               '<div class="acoes-simples">' +
                 botaoSimples('naoAtendeu', 'fa-door-closed', 'Não atendeu', desfecho === 'naoAtendeu', it.row) +
                 botaoSimples('semConversa', 'fa-comment-slash', 'Falou, sem palestra', desfecho === 'semConversa', it.row) +
                 botaoSimples('conversou', 'fa-check', 'Conversou', desfecho === 'conversou', it.row) +
                 '<button class="botao-acao carta ' + (carta ? 'ativo' : '') + '" onclick="window.simplesCarta(' + it.row + ')">' +
                   '<i class="fa-regular fa-envelope"></i> <span>Deixei carta</span>' +
                 '</button>' +
               '</div>' +
             '</div>';
    }

    function btnMini(tipo, icone, ativo, row) {
      var labels = { naoAtendeu: 'Não atendeu', semConversa: 'Falou sem palestra', conversou: 'Conversou' };
      var lbl = labels[tipo] || tipo;
      return '<button class="mini-acao ' + tipo + (ativo ? ' ativo' : '') +
             '" aria-label="' + lbl + '" title="' + lbl + '"' +
             ' onclick="window.simplesMarcar(' + row + ', \'' + tipo + '\')">' + icone + '</button>';
    }
    function botaoSimples(tipo, icone, label, ativo, row) {
      return '<button class="botao-acao ' + tipo + (ativo ? ' ativo' : '') + '" onclick="window.simplesMarcar(' + row + ', \'' + tipo + '\')">' +
               '<i class="fa-solid ' + icone + '"></i> <span>' + label + '</span>' +
             '</button>';
    }

    // Mini-mapa: quadras designadas + pin do publicador (geolocation).
    // Quando há quadra ativa (faces view ou paradas view), desenha cada
    // aresta colorida pela face IBGE — mapeia a aresta à face cujo
    // centroide de endereços é mais próximo do meio da aresta.
    function iniciarMapaSimples() {
      var el = document.getElementById('simplesMapaMini');
      if (!el) return;
      if (_simplesMiniMap) {
        try { _simplesMiniMap.remove(); } catch(e) {}
        _simplesMiniMap = null;
        _simplesUserMarker = null;
      }
      _simplesMiniMap = L.map(el, { zoomControl: false, attributionControl: false })
        .setView([-7.115, -34.863], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_simplesMiniMap);
      var bounds = null;
      dadosGerais.forEach(function(q){
        if (!q.polyString) return;
        var pts = parsePolyPub(q.polyString);
        if (pts.length < 3) return;
        var isAtual = q.id === _simplesQuadra;
        var poly = L.polygon(pts, {
          color: isAtual ? '#374151' : '#1976d2',
          weight: isAtual ? 1 : 2,
          fillColor: isAtual ? '#e5e7eb' : '#1976d2',
          fillOpacity: isAtual ? 0.25 : 0.3
        }).bindTooltip(q.id, { permanent: true, direction: "center", className: "label-quadra" })
          .addTo(_simplesMiniMap);
        bounds = bounds ? bounds.extend(poly.getBounds()) : poly.getBounds();
        if (isAtual) _desenharArestasPorFace(q, pts);
      });
      if (bounds) _simplesMiniMap.fitBounds(bounds, { padding: [10, 10], maxZoom: 17 });
      if (_simplesUserPos) _renderUserPin();
      iniciarGeolocation();
      _simplesMiniMap.on('click', function(){
        if (_simplesUserPos) {
          window.open('https://www.google.com/maps/?q=' + _simplesUserPos.lat + ',' + _simplesUserPos.lng, '_blank');
        }
      });
    }

    function _desenharArestasPorFace(q, pts) {
      // Agrupa endereços com lat/lng por face e calcula centroide
      var centros = {};
      (q.itens || []).forEach(function(it){
        if (it.naoVisitar || !it.lat || !it.lng) return;
        var f = _faceKey(it);
        if (f === '—') return;
        if (!centros[f]) centros[f] = { sLat: 0, sLng: 0, n: 0 };
        centros[f].sLat += parseFloat(it.lat);
        centros[f].sLng += parseFloat(it.lng);
        centros[f].n++;
      });
      Object.keys(centros).forEach(function(f){
        var c = centros[f];
        centros[f] = { lat: c.sLat / c.n, lng: c.sLng / c.n };
      });
      if (Object.keys(centros).length === 0) return;
      // Pra cada aresta i→i+1, descobre face cujo centroide está mais perto
      // do midpoint da aresta. Destaca face selecionada com traço mais grosso.
      for (var i = 0; i < pts.length; i++) {
        var a = pts[i], b = pts[(i + 1) % pts.length];
        var midLat = (a[0] + b[0]) / 2, midLng = (a[1] + b[1]) / 2;
        var melhor = null, distMin = Infinity;
        Object.keys(centros).forEach(function(f){
          var dy = centros[f].lat - midLat;
          var dx = centros[f].lng - midLng;
          var d = dy * dy + dx * dx;
          if (d < distMin) { distMin = d; melhor = f; }
        });
        if (!melhor) continue;
        var cor = _corDeFace(melhor);
        var ativa = (_simplesFace === melhor);
        L.polyline([a, b], {
          color: cor,
          weight: ativa ? 8 : 5,
          opacity: ativa ? 1 : 0.85
        }).bindTooltip('Face ' + melhor, { sticky: true }).addTo(_simplesMiniMap);
      }
    }

    function _renderUserPin() {
      if (!_simplesMiniMap || !_simplesUserPos) return;
      if (_simplesUserMarker) {
        _simplesUserMarker.setLatLng([_simplesUserPos.lat, _simplesUserPos.lng]);
        return;
      }
      _simplesUserMarker = L.circleMarker([_simplesUserPos.lat, _simplesUserPos.lng], {
        radius: 7, color: '#fff', weight: 2, fillColor: '#2563eb', fillOpacity: 1
      }).bindTooltip('Você está aqui').addTo(_simplesMiniMap);
    }

    function iniciarGeolocation() {
      if (_geoWatchId != null || !navigator.geolocation) return;
      _geoWatchId = navigator.geolocation.watchPosition(
        function(pos) {
          _simplesUserPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          _renderUserPin();
        },
        function(err){ /* ignora — sem GPS continua mostrando só o território */ },
        { enableHighAccuracy: true, maximumAge: 30000, timeout: 20000 }
      );
    }

    window.simplesEscolherQuadra = function(id) {
      _simplesQuadra = id; _simplesFace = null; _simplesView = 'faces';
      try { localStorage.setItem('simples_quadra', id); localStorage.removeItem('simples_face'); } catch(e) {}
      renderizarSimples();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    window.simplesEscolherFace = function(face) {
      _simplesFace = face; _simplesView = 'paradas';
      try { localStorage.setItem('simples_face', face); } catch(e) {}
      renderizarSimples();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    window.simplesVoltarHub = function() {

    // Sync com servidor: puxa marcações de outros publicadores trabalhando
    // junto. Atualiza dadosGerais sem perder marcações locais (localStorage
    // continua sendo a verdade do app — o servidor só preenche metadados).
    window.simplesRefresh = function() {
      var btns = document.querySelectorAll('#appSimples .topbar-simples button');
      btns.forEach(function(b){ b.disabled = true; });
      function finalizar() { btns.forEach(function(b){ b.disabled = false; }); }
      function aplicar(designadas, contexto) {
        if (designadas) dadosGerais = designadas;
        if (contexto) contextoPolys = contexto;
        _ultimoSync = Date.now();
        renderizarSimples();
        finalizar();
      }
      if (TE_ID) {
        google.script.run
          .withSuccessHandler(function(r){
            if (r && r.ok) {
              var itens = (r.enderecos || []).map(function(e){
                return { row: e.row, quadra: 'TCE_' + r.tce.id, face: '',
                  logradouro: e.logradouro, numero: e.numero, complemento: e.complemento,
                  lat: e.lat, lng: e.lng, tipo: e.tipo, nome: e.nome, nota: e.nota,
                  naoVisitar: false, ordem: null, ultimaVisita: '',
                  ultimoTipo: e.ultimoTipo, ultimoDataStr: e.ultimoDataStr };
              });
              aplicar([{ id: r.tce.nome, polyString: r.tce.polyString || '', ultimaData: 'TCE', itens: itens }], []);
            } else { finalizar(); }
          })
          .withFailureHandler(finalizar)
          .getDadosTCE(TE_ID);
        return;
      }
      var ids = IDS_PUB;
      if (!ids) { finalizar(); return; }
      google.script.run
        .withSuccessHandler(function(data){
          if (data && data.designadas) {
            data.designadas.forEach(salvarCacheQuadra);
            aplicar(data.designadas, data.contexto || []);
          } else { finalizar(); }
        })
        .withFailureHandler(finalizar)
        .getDadosComContexto(ids);
    };

    function iniciarMapa() {
        if (map) { renderizarMapa(); return; }
        map = L.map('mapa-topo').setView([-7.115, -34.863], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        // Ordem importa: contexto fica ATRÁS das designadas e dos pontos
        layerContexto = L.featureGroup().addTo(map);
        layerQuadra = L.featureGroup().addTo(map);
        layerPontos = L.featureGroup().addTo(map);
        map.on('click', function(e) { if (isPickingLocation) concluirAdicaoPeloMapa(e.latlng.lat, e.latlng.lng); });
        renderizarMapa();
    }

    function parsePolyPub(s) {
        return s.split('|').map(function(p) {
            var c = p.trim().split(',');
            return [parseFloat(c[0]), parseFloat(c[1])];
        }).filter(function(pt){ return !isNaN(pt[0]) && !isNaN(pt[1]); });
    }

    function renderizarMapa() {
        layerContexto.clearLayers();
        layerQuadra.clearLayers();
        layerPontos.clearLayers();

        // Contexto: território inteiro, esmaecido, pra dar referência
        // visual sem competir com as quadras designadas.
        contextoPolys.forEach(function(q) {
            if (!q.polyString) return;
            var pts = parsePolyPub(q.polyString);
            if (pts.length < 3) return;
            // Vermelho = concluída recente; cinza = disponível
            var estilo = q.concluidaRecente
              ? { color:'#b91c1c', weight:1.5, fillColor:'#dc2626', fillOpacity:0.30 }
              : { color:'#4b5563', weight:1.5, fillColor:'#9ca3af', fillOpacity:0.32 };
            L.polygon(pts, estilo).addTo(layerContexto);
        });

        dadosGerais.forEach(function(q) {
            if (q.polyString) {
                var pts = parsePolyPub(q.polyString);
                if (pts.length >= 3) {
                    L.polygon(pts, {
                        color: '#0d47a1', weight: 2,
                        fillColor: '#1976d2', fillOpacity: 0.45
                    })
                      .bindTooltip(q.id, { permanent: true, direction: "center", className: "label-quadra" })
                      .addTo(layerQuadra);
                }
            }

            q.itens.forEach(function(item) {
                if (item.lat && item.lng) {
                    var vis = getVisualPorTipo(item.tipo);
                    var corFill = item.naoVisitar ? '#dc3545' : vis.color;
                    L.circleMarker([item.lat, item.lng], {
                        radius: 6, color: 'white', weight: 1, fillColor: corFill, fillOpacity: 0.9
                    }).bindPopup(`<b>${item.logradouro}, ${item.numero}</b><br>${item.nome || item.tipo}`).addTo(layerPontos);
                }
            });
        });

        // fitBounds prioriza pontos (endereços designados), depois quadras
        if (layerPontos.getLayers().length > 0) map.fitBounds(layerPontos.getBounds());
        else if (layerQuadra.getBounds && layerQuadra.getBounds().isValid()) map.fitBounds(layerQuadra.getBounds());
    }

    function concluirAdicaoPeloMapa(lat, lng) {
        // Encontrar vizinho para herdar Quadra e Face
        var vizinho = encontrarVizinhoMaisProximo(lat, lng);

            isPickingLocation = false;
            document.getElementById('msg-mapa').style.display = 'none';

        }

        isPickingLocation = false;
        document.getElementById('msg-mapa').style.display = 'none';
        document.getElementById('mapa-topo').classList.remove('picking-location');

        // Prepara Modal Novo
        document.getElementById('editRow').value = ""; // Vazio = Novo
        document.getElementById('editQuadraId').value = vizinho.quadra;
        document.getElementById('editFace').value = vizinho.face;
        document.getElementById('editLat').value = lat;
        document.getElementById('editLng').value = lng;
        document.getElementById('editOrdem').value = (vizinho.ordem || 0) + 1; // Coloca logo depois

        // Preenche com sugestões do vizinho

        document.getElementById('inputNumero').value = "";
        document.getElementById('inputComplemento').value = "";
        document.getElementById('inputNome').value = "";
        document.getElementById('inputNota').value = "";
        document.getElementById('inputTipo').value = "Domicílio particular Casa";
        document.getElementById('checkNaoVisitar').checked = false;

        toggleFormFields();
