    function encontrarVizinhoMaisProximo(lat, lng) {
        var minDst = Infinity;
        var nearest = null;
        
        dadosGerais.forEach(q => {
            q.itens.forEach(item => {
                if(item.lat && item.lng) {
                    var dst = Math.pow(item.lat - lat, 2) + Math.pow(item.lng - lng, 2);
                    if(dst < minDst) {
                        minDst = dst;
                        nearest = item;
                    }
                }
            });
        });
        return nearest;
    }

    // ================= LISTA & AGRUPAMENTO =================
function verificarSeRecente(dataStr) {
        if (!dataStr) return false;
        
        // Formato esperado: dd/MM/yy
        var partes = dataStr.split('/');
        if (partes.length !== 3) return false;
        
        var dia = parseInt(partes[0]);
        var mes = parseInt(partes[1]) - 1; // Meses em JS começam em 0
        var ano = parseInt(partes[2]);
        
        // Ajuste para ano com 2 dígitos (ex: 24 -> 2024)
        if (ano < 100) ano += 2000;
        
        var dataVisita = new Date(ano, mes, dia);
        var hoje = new Date();
        
        // Diferença em milissegundos
        var diffTempo = Math.abs(hoje - dataVisita);
        var diffDias = Math.ceil(diffTempo / (1000 * 60 * 60 * 24)); 
        
        return diffDias <= 15;
    }
function renderizarLista() {
        var container = document.getElementById('lista-territorio');

        if (!dadosGerais || dadosGerais.length === 0) {
          container.innerHTML = '<div class="text-center text-muted py-5"><i class="fa-solid fa-inbox" style="font-size:3rem; opacity:.3"></i><div class="mt-2">Sem endereços disponíveis.</div></div>';
          return;
        }

        // Acumula fragmentos numa array e faz UM ÚNICO innerHTML no final.
        // Antes: innerHTML += html dentro do forEach causa reparse quadrático.
        // Em designações com 20+ quadras isso virava jank visível.
        var fragmentos = [];
        dadosGerais.forEach(function(quadra) {
            // Pacote C: ordena endereços por ângulo em volta do centroide
            // do polígono da quadra → sentido horário/anti-horário.
            // Persistido em localStorage por quadra: 'rota_h_QID' (true/false).
            var horarioFlag = localStorage.getItem('rota_h_' + quadra.id);
            var sentidoHorario = horarioFlag === null ? true : (horarioFlag === 'true');
            if (quadra.polyString && quadra.itens.length > 1) {
              ordenarItensPorAngulo(quadra, sentidoHorario);
            }

            var iconRota = sentidoHorario ? 'fa-rotate-right' : 'fa-rotate-left';
            var html = `
            <div class="quadra-card">
                <div class="quadra-header" onclick="window.toggleQuadraAvancado('${quadra.id}')">
                   <span>Quadra ${quadra.id}</span>
                   <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="quadra-meta">
                   <div>
                       <i class="fa-regular fa-calendar"></i> Última: <b>${quadra.ultimaData}</b><br>
                       <i class="fa-solid fa-hashtag"></i> Total: <b>${quadra.itens.length}</b> end.
                   </div>
                   <div>
                       <button class="btn btn-sm btn-outline-secondary me-1" onclick="inverterSentidoRota('${quadra.id}')" title="Inverter sentido da rota"><i class="fa-solid ${iconRota}"></i></button>
                       <button class="btn btn-sm btn-outline-secondary me-1" onclick="limparSessao('${quadra.id}')" title="Limpar marcados"><i class="fa-solid fa-eraser"></i></button>
                   </div>
                </div>

                <div id="body-${quadra.id}" class="sortable-list" data-quadra="${quadra.id}">`;

            // Agrupa por face IBGE (F1, F2, F3, F4). "—" = sem face cadastrada.
            // Ordem horária ascendente.
            var porFace = {};
            var ordemFaces = [];
            quadra.itens.forEach(function(item){
              var f = _faceKey(item);
              if (!porFace[f]) { porFace[f] = []; ordemFaces.push(f); }
              porFace[f].push(item);
            });
            ordemFaces.sort(function(a, b){
              if (a === '—') return 1;
              if (b === '—') return -1;
              var na = parseInt(String(a).replace(/[^0-9]/g, ''), 10);
              var nb = parseInt(String(b).replace(/[^0-9]/g, ''), 10);
              if (isNaN(na) && isNaN(nb)) return a.localeCompare(b);
              if (isNaN(na)) return 1;
              if (isNaN(nb)) return -1;
              return na - nb;
            });
            var mostrarCabFace = ordemFaces.length > 1;

            ordemFaces.forEach(function(f){
              if (mostrarCabFace) {
                var corF = _corDeFace(f);
                var nomeF = f === '—' ? 'Sem face' : 'Face ' + f;
                // Concatenação simples — evita regex/template aninhado
                html += '<div class="face-divisao" style="border-left:4px solid ' + corF +
                        '; padding:6px 12px; margin:8px 0 4px; font-weight:700; font-size:.85rem; color:' + corF + '">' +
                        escapeHtmlPub(nomeF) + ' <span class="text-muted fw-normal">· ' + porFace[f].length + ' end.</span></div>';
              }
              var grupos = agruparItens(porFace[f]);

              grupos.forEach(function(g) {
                if(g.tipo === 'unico') {
                    html += criarItemHtml(g.item);
                } else {
                    // Grupo (Prédio ou Residências Agrupadas)
                    var vis = getVisualPorTipo(g.itens[0].tipo);
                    // Botão "Editar prédio" só pra grupos que são prédio
                    // de verdade (≥2 aptos com endereço completo).
                    var primeiroG = g.itens[0];
                    var ehPredio = g.itens.length >= 2 && primeiroG.logradouro && primeiroG.numero;
                    var btnEditPr = '';
                    if (ehPredio) {
                      var chavePrAttr = ((primeiroG.logradouro || '').trim().toLowerCase() + '|' + (primeiroG.numero || '').trim().toLowerCase()).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
                      btnEditPr = '<button class="btn btn-sm btn-link p-0 me-2" title="Editar prédio" data-chave-pr="' + chavePrAttr + '" onclick="event.stopPropagation(); window.abrirEdicaoPredio(this.dataset.chavePr)" style="color:#7c3aed"><i class="fa-solid fa-pen-to-square"></i></button>';
                    }

                    html += `
                    <div>
                        <div class="group-header" onclick="toggleDisplay('grp-${g.id}')">
                           <div class="handle me-2"><i class="fa-solid fa-bars"></i></div>

                           <div class="icon-box ${vis.cls}"><i class="fa-solid ${vis.icon}"></i></div>
                           <div class="flex-grow-1">
                               <div class="group-title">${escapeHtmlPub(g.titulo)}</div>
                               <div class="small text-muted">${g.itens.length} unidades</div>
                           </div>
                           ${btnEditPr}
                           <i class="fa-solid fa-chevron-down text-muted"></i>
                        </div>
                        <div id="grp-${g.id}" class="group-body d-none sortable-sublist">
                            ${g.itens.map(i => criarItemHtml(i, true)).join('')}
                        </div>
                    </div>`;
                }
              });
            });

            html += `</div></div>`;
            fragmentos.push(html);
        });

        container.innerHTML = fragmentos.join('');

        if(isReorder) ativarSortable();
        if (typeof aplicarFiltros === 'function') aplicarFiltros();
    }

    // Toggle do quadra-card no avançado: abre/fecha o body E pinta as
    // arestas coloridas por face no mapa topo pra orientar o publicador.
    // Quadras começam FECHADAS por default (UX menos assustadora — só
    // expande o que o publicador escolheu trabalhar).
    window.toggleQuadraAvancado = function(qid) {
      var body = document.getElementById('body-' + qid);
      if (!body) return;
      var card = body.closest('.quadra-card');
      if (!card) return;
      var abrindo = !card.classList.contains('aberta');
      card.classList.toggle('aberta');
      if (abrindo) pintarFacesNoMapaTopo(qid);
      else limparFacesNoMapaTopo();
    };

    var _layerFacesTopo = null;
    function limparFacesNoMapaTopo() {
      if (_layerFacesTopo) _layerFacesTopo.clearLayers();
    }
    function pintarFacesNoMapaTopo(qid) {
      if (typeof map === 'undefined' || !map) return;
      if (!_layerFacesTopo) _layerFacesTopo = L.featureGroup().addTo(map);
      _layerFacesTopo.clearLayers();
      var quadra = (dadosGerais || []).find(function(q){ return q.id === qid; });
      if (!quadra || !quadra.polyString) return;
      var pts = parsePolyPub(quadra.polyString);
      if (pts.length < 3) return;
      // Centroide por face — aresta mais próxima do centroide ganha a cor.
      var centros = {};
      (quadra.itens || []).forEach(function(it){
        if (it.naoVisitar || !it.lat || !it.lng) return;
        var f = _faceKey(it);
        if (f === '—') return;
        if (!centros[f]) centros[f] = { sLat:0, sLng:0, n:0 };
        centros[f].sLat += parseFloat(it.lat);
        centros[f].sLng += parseFloat(it.lng);
        centros[f].n++;
      });
      Object.keys(centros).forEach(function(f){
        var c = centros[f];
        centros[f] = { lat: c.sLat / c.n, lng: c.sLng / c.n };
      });
      if (Object.keys(centros).length === 0) return;
      for (var i = 0; i < pts.length; i++) {
        var a = pts[i], b = pts[(i + 1) % pts.length];
        var midLat = (a[0] + b[0]) / 2, midLng = (a[1] + b[1]) / 2;
        var melhor = null, distMin = Infinity;
        Object.keys(centros).forEach(function(f){
          var dy = centros[f].lat - midLat;
          var dx = centros[f].lng - midLng;
          var d = dy * dy + dx * dx;
          if (d < distMin) { distMin = d; melhor = f; }
        });
        if (!melhor) continue;
        L.polyline([a, b], {
          color: _corDeFace(melhor), weight: 7, opacity: 0.9
        }).bindTooltip('Face ' + melhor, { sticky: true }).addTo(_layerFacesTopo);
      }
      try { map.fitBounds(L.polygon(pts).getBounds(), { padding:[20,20], maxZoom:18 }); } catch(e) {}
    }

    function agruparItens(itens) {
        var map = new Map();
        var resultado = [];

        itens.forEach(item => {
            var t = item.tipo ? item.tipo.toLowerCase() : "";
            // Residencial inclui Casa, Apto, Alojamento, Condominio
            var isResidencial = t.includes('domicílio') || t.includes('casa') || t.includes('apartamento') || t.includes('alojamento');
            
            // Lógica de Chave:
            // 1. Se tem Nome (Col M), agrupa pelo Nome (Prioridade Máxima)
            // 2. Se não tem Nome e é Residencial, agrupa pelo Endereço Limpo
            // 3. Senão, fica sozinho (Comércios isolados)
            
            var key;
            if(item.nome && item.nome.trim() !== "") {
                key = "NAME_" + item.nome.toUpperCase().trim();
            } else if(isResidencial) {
                var addr = (item.logradouro + item.numero).toUpperCase().replace(/[^A-Z0-9]/g, '');
                key = "ADDR_" + addr;
            } else {
                key = "SINGLE_" + item.row;
            }
            
            if(!map.has(key)) map.set(key, []);
            map.get(key).push(item);
        });

        map.forEach((lista, key) => {
            if(key.startsWith("SINGLE_")) {
                resultado.push({ tipo: 'unico', item: lista[0] });
            } else {
                // Título do Grupo
                var primeiro = lista[0];
                // Se tiver nome, usa. Se não, usa endereço.
                var titulo = primeiro.nome ? primeiro.nome : (primeiro.logradouro + ", " + primeiro.numero);
                
                // Cria grupo se tiver mais de 1 item OU se tiver nome definido (para ficar bonito)
                if(lista.length > 1 || primeiro.nome) {
                    // Ordena aptos por complemento alfanumérico (101 antes de 102)
                    var itensOrdenados = lista.slice().sort(function(a,b){
                      return String(a.complemento || '').localeCompare(
                        String(b.complemento || ''),
                        'pt-BR', { numeric: true, sensitivity: 'base' }
                      );
                    });
                    resultado.push({ tipo: 'grupo', id: key, titulo: titulo, itens: itensOrdenados });
                } else {
                    resultado.push({ tipo: 'unico', item: primeiro });
                }
            }
        });
        return resultado;
    }

function criarItemHtml(item, isInsideGroup) {
        var vis = getVisualPorTipo(item.tipo);
        var rowCls = item.naoVisitar ? "nao-visitar-row" : "";
        var badgeNV = item.naoVisitar ? '<span class="nao-visitar-badge">NÃO VISITAR</span>' : '';

        // Desfecho do publicador (Pacote F): 'naoAtendeu' | 'semConversa'
        // | 'conversou' | null. Persiste local; backend é fire-and-forget.
        var desfecho = localStorage.getItem("desf_" + item.row) || '';

        // Compatibilidade com o checkmark antigo: se "v_" existe, isso
        // significa que conversou (em versões anteriores só tinha "v_").
        if (!desfecho && localStorage.getItem("v_" + item.row) === "true") {
          desfecho = 'conversou';
        }

        // "isRecente" só conta como conversou se a coluna ULT_VISITA está
        // populada — pode ter sido marcado por outro publicador.
        var isRecente = verificarSeRecente(item.ultimaVisita);
        var checked = !!desfecho || isRecente;
        var opacidade = checked ? "opacity:0.5" : "";

        var titleRaw, subRaw;
        if(isInsideGroup) {
            titleRaw = item.complemento || "Unidade";
            subRaw = item.tipo;
        } else {
            if(item.nome) {
                titleRaw = item.nome;
                subRaw = item.logradouro + ", " + item.numero + (item.complemento ? " (" + item.complemento + ")" : "");
            } else {
                titleRaw = item.complemento ? item.complemento : (item.logradouro + ", " + item.numero);
                subRaw = item.complemento ? (item.logradouro + ", " + item.numero) : "Residência";
            }
        }
        // Escape contra XSS via nome/complemento/notas vindos do servidor
        var title = escapeHtmlPub(titleRaw);
        var sub = escapeHtmlPub(subRaw);

        // Badge "antes": último desfecho registrado por ALGUÉM. Só mostra
        // se essa sessão ainda não marcou nada — memória do território
        // pro publicador chegar informado.
        var iconePorTipo = { naoAtendeu: '🚪', semConversa: '📞', conversou: '✓', interfone: '📞' };
        var htmlAntes = '';
        if (!desfecho && item.ultimoTipo && item.ultimoDataStr) {
          htmlAntes = `<span class="ms-2 badge-antes" title="Última atividade aqui">
                       <i class="fa-regular fa-clock"></i> ${iconePorTipo[item.ultimoTipo] || '·'} ${item.ultimoDataStr}
                     </span>`;
        } else if (item.ultimaVisita && !desfecho) {
          htmlAntes = `<span class="ms-2 badge bg-light text-secondary border fw-normal" style="font-size:0.7em"><i class="fa-solid fa-clock-rotate-left"></i> ${item.ultimaVisita}</span>`;
        }

        var cartaEntregue = localStorage.getItem("carta_" + item.row) === "true";

        // Endereço em Território Comercial Especial: aviso + opacidade.
        // O endereço continua aqui (publicador pode pregar se houver
        // boa oportunidade), mas é responsabilidade primária de outro
        // publicador comercial.
        var emTCE = item.emTCE;
        var badgeTCE = '';
        var classeTCE = '';
        if (emTCE) {
          classeTCE = ' em-tce';
          var quem = emTCE.publicador ? ' (' + escapeHtmlPub(emTCE.publicador) + ')' : '';
          badgeTCE = `<div class="aviso-tce mt-1">
                        <i class="fa-solid fa-store me-1"></i>
                        <b>Em território comercial${quem}</b>, mas pregue se tiver uma boa oportunidade.
                      </div>`;
        }

        // Botões de desfecho (mutex): 🚪 cinza, 📞 amarelo, ✓ verde
        function btnDesf(tipo, icone, classe) {
          var ativo = desfecho === tipo ? ' ativo' : '';
          return `<button class="btn-desf ${classe}${ativo}" data-tipo="${tipo}" data-row="${item.row}" title="${tipo}">
                    <i class="${icone}"></i>
                  </button>`;
        }

        return `
        <div class="address-item ${rowCls}${classeTCE}" style="${opacidade}" data-row="${item.row}" data-obj='${JSON.stringify(item)}'>
            <div class="handle"><i class="fa-solid fa-bars"></i></div>

            <div class="icon-box ${vis.cls}"><i class="fa-solid ${vis.icon}"></i></div>

            <div class="flex-grow-1" onclick="abrirEdicao(${item.row})" style="cursor:pointer">
                <div class="fw-bold text-dark">
                    ${title} ${badgeNV}
                    ${htmlAntes}
                </div>
                <div class="small text-muted">${sub}</div>
                ${item.nota ? `<div class="small text-primary mt-1"><i class="fa-solid fa-note-sticky"></i> ${escapeHtmlPub(item.nota)}</div>` : ''}
                ${badgeTCE}
            </div>

            <div class="btn-carta ${cartaEntregue ? 'feito' : ''}" onclick="toggleCarta(${item.row}, this)" title="Deixei carta aqui">
                <i class="fa-regular fa-envelope"></i>
            </div>

            <div class="desfechos">
              ${btnDesf('naoAtendeu', 'fa-solid fa-door-closed', 'cinza')}
              ${btnDesf('semConversa', 'fa-solid fa-comment-slash', 'amarelo')}
              ${btnDesf('conversou', 'fa-solid fa-check', 'verde')}
            </div>
        </div>`;
    }

    // Marca "deixei carta aqui" — feedback otimista, persiste local
    // + registra no backend. Reversível com novo toque.
    window.toggleCarta = function(row, el) {
      if (window._tceReadonly) return; // TCE concluído — só leitura
      var chave = "carta_" + row;
      var jaFeito = localStorage.getItem(chave) === "true";
      var novoEstado = !jaFeito;
      localStorage.setItem(chave, novoEstado ? "true" : "false");
      el.classList.toggle('feito', novoEstado);
      atualizarCobertura();
      if (typeof aplicarFiltros === 'function') aplicarFiltros();
      // Sincroniza marcar E desmarcar (undo) com backend, pra reverter
      // também o cartaEntregue em PrediosAptos.
      enfileirarSync('carta', { row: row, undo: !novoEstado });
    };

    // Pacote C — Rota dentro da quadra (sentido horário/anti-horário).
    // Calcula ângulo de cada endereço em relação ao centroide do polígono
    // da quadra e ordena. Endereços do mesmo logradouro+numero ficam
    // agrupados (mesmo ponto, ordem estável). Não persiste a ordem no
    // banco — só reordena a visualização.
    window.ordenarItensPorAngulo = function(quadra, horario) {
      if (!quadra.polyString || quadra.itens.length < 2) return;
      var pts = quadra.polyString.split('|').map(function(p){
        var c = p.trim().split(',');
        return [parseFloat(c[0]), parseFloat(c[1])];
      }).filter(function(pt){ return !isNaN(pt[0]) && !isNaN(pt[1]); });
      if (pts.length < 3) return;
      var clat = 0, clng = 0;
      pts.forEach(function(p){ clat += p[0]; clng += p[1]; });
      clat /= pts.length; clng /= pts.length;

      // Endereços sem coordenada vão pro fim, mantendo ordem original
      var comCoord = [], semCoord = [];
      quadra.itens.forEach(function(it){
        if (typeof it.lat === 'number' && typeof it.lng === 'number') {
          // atan2 negativa pra sentido horário em mapas (lat cresce pra
          // norte = topo; lng cresce pra leste = direita)
          var ang = Math.atan2(it.lng - clng, it.lat - clat);
          comCoord.push({ it: it, ang: ang });
        } else {
          semCoord.push(it);
        }
      });
      comCoord.sort(function(a, b){
        return horario ? a.ang - b.ang : b.ang - a.ang;
      });
      quadra.itens.length = 0;
      comCoord.forEach(function(x){ quadra.itens.push(x.it); });
      semCoord.forEach(function(x){ quadra.itens.push(x); });
    };

    window.inverterSentidoRota = function(quadraId) {
      var chave = 'rota_h_' + quadraId;
      var atual = localStorage.getItem(chave);
      var horario = atual === null ? true : (atual === 'true');
      localStorage.setItem(chave, horario ? 'false' : 'true');
      renderizarLista();
    };

    // Pacote F: marca um desfecho mutex (naoAtendeu / semConversa /
    // conversou). Botão ativo = clique de novo desmarca. Cobertura
    // recalcula sem roundtrip.
    // Fila offline-first: marca local sempre, registra no backend
    // assincronamente. Se a chamada falhar (sem rede, timeout), a
    // ação fica salva em localStorage 'syncQueue' e é tentada de novo
    // quando o usuário volta a ter conexão (event 'online' do navegador).
    function enfileirarSync(tipo, payload) {
      var q;
      try { q = JSON.parse(localStorage.getItem('syncQueue') || '[]'); } catch(e) { q = []; }
      q.push({ tipo: tipo, payload: payload, ts: Date.now() });
      try { localStorage.setItem('syncQueue', JSON.stringify(q)); } catch(e) {}
      processarFilaSync();
      atualizarStatusSync();
    }
    function _executarSync(item, onSuccess, onFail) {
      try {
        if (item.tipo === 'desfecho') {
          google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFail)
            .registrarDesfechoEndereco(item.payload.row, item.payload.tipo);
        } else if (item.tipo === 'carta') {
          google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFail)
            .registrarCartaEndereco(item.payload.row, !!item.payload.undo);
        } else { onSuccess(); /* tipo desconhecido — descarta */ }
      } catch (e) { onFail(e); }
    }
    var _sincronizando = false;
    function processarFilaSync() {
      if (_sincronizando) return;
      var q;
      try { q = JSON.parse(localStorage.getItem('syncQueue') || '[]'); } catch(e) { return; }
      if (q.length === 0) return;
      if (!navigator.onLine) { atualizarStatusSync(); return; }
      _sincronizando = true;
      var item = q[0];
      _executarSync(item, function(){
        // Sucesso: tira da fila
        try {
          var atual = JSON.parse(localStorage.getItem('syncQueue') || '[]');
          atual.shift();
          localStorage.setItem('syncQueue', JSON.stringify(atual));
        } catch(e) {}
        _sincronizando = false;
        atualizarStatusSync();
        setTimeout(processarFilaSync, 50);
      }, function(){
        // Falha: mantém na fila pra próxima tentativa
        _sincronizando = false;
        atualizarStatusSync();
      });
    }
    function atualizarStatusSync() {
      var q;
      try { q = JSON.parse(localStorage.getItem('syncQueue') || '[]'); } catch(e) { q = []; }
      // Banner detalhado dentro do modo avançado
      var el = document.getElementById('statusSync');
      if (el) {
        if (q.length === 0) { el.classList.add('d-none'); }
        else {
          el.classList.remove('d-none');
          el.innerHTML = (!navigator.onLine ? '<i class="fa-solid fa-cloud-arrow-up me-1"></i>' : '<i class="fa-solid fa-rotate me-1 fa-spin"></i>') +
                         q.length + ' marcação(ões) pendente(s) ' +
                         (!navigator.onLine ? '(sem rede)' : '(sincronizando…)');
        }
      }
      // Indicador global no canto superior esquerdo (sempre visível)
      var pill = document.getElementById('indicadorFila');
      if (pill) {
        if (q.length === 0 && navigator.onLine) {
          pill.classList.add('d-none');
        } else {
          pill.classList.remove('d-none');
          if (!navigator.onLine) {
            pill.style.background = '#dc2626';
            pill.style.color = '#fff';
            pill.innerHTML = '<i class="fa-solid fa-wifi-slash me-1"></i>Offline' +
                             (q.length > 0 ? ' · ' + q.length + ' na fila' : '');
          } else {
            pill.style.background = '#f59e0b';
            pill.style.color = '#1a1a1a';
            pill.innerHTML = '<i class="fa-solid fa-rotate me-1 fa-spin"></i>Sincronizando ' + q.length;
          }
        }
      }
    }
    window.addEventListener('online', function(){ atualizarStatusSync(); processarFilaSync(); });
    window.addEventListener('offline', atualizarStatusSync);
    // Tenta sincronizar ao abrir a página + render inicial do indicador
    setTimeout(function(){ atualizarStatusSync(); processarFilaSync(); }, 500);

    window.marcarDesfecho = function(row, tipo) {
      if (window._tceReadonly) return; // TCE concluído — só leitura
      var chave = "desf_" + row;
      var atual = localStorage.getItem(chave) || '';
      var novo = atual === tipo ? '' : tipo;
      if (novo) localStorage.setItem(chave, novo);
      else localStorage.removeItem(chave);
      atualizarBotoesDesfecho(row, novo);
      atualizarCobertura();
      if (typeof aplicarFiltros === 'function') aplicarFiltros();
      // Sincroniza tanto marcação como desmarcação (tipo vazio = undo).
      // Antes o undo só fazia mudança local — backend ficava com estado errado.
      enfileirarSync('desfecho', { row: row, tipo: novo || '' });
    };

    function atualizarBotoesDesfecho(row, desfecho) {
      document.querySelectorAll('.address-item[data-row="' + row + '"] .btn-desf').forEach(function(b){
        b.classList.toggle('ativo', b.getAttribute('data-tipo') === desfecho);
      });
      var item = document.querySelector('.address-item[data-row="' + row + '"]');
      if (item) item.style.opacity = desfecho ? 0.5 : 1;
    }

    // Delegação global de clique nos botões de desfecho
    document.addEventListener('click', function(ev){
      var btn = ev.target.closest('.btn-desf');
      if (!btn) return;
      ev.stopPropagation();
      window.marcarDesfecho(Number(btn.getAttribute('data-row')), btn.getAttribute('data-tipo'));
    });

    // Indicador de cobertura no topo (Pacote F)
    function atualizarCobertura() {
      var box = document.getElementById('boxCobertura');
      if (!box) return;
      var total = 0, alcancados = 0, naoAtend = 0, sem = 0, conv = 0, cartas = 0;
      // Agrupa por prédio (logradouro+numero) pra contar "prédios cobertos":
      // prédio com ≥2 endereços conta como coberto quando 100% dos aptos
      // tiveram algum desfecho. Endereços soltos (1) entram só no total.
      var predios = {};
      (dadosGerais || []).forEach(function(q){
        (q.itens || []).forEach(function(it){
          if (it.naoVisitar) return;
          total++;
          var d = localStorage.getItem("desf_" + it.row) || '';
          if (!d && localStorage.getItem("v_" + it.row) === "true") d = 'conversou';
          var temCarta = localStorage.getItem("carta_" + it.row) === "true";
          if (d || temCarta) alcancados++;
          if (d === 'naoAtendeu') naoAtend++;
          else if (d === 'semConversa') sem++;
          else if (d === 'conversou') conv++;
          if (temCarta) cartas++;
          var k = (it.logradouro || '') + '|' + (it.numero || '');
          if (!predios[k]) predios[k] = { tot: 0, feitos: 0 };
          predios[k].tot++;
          if (d) predios[k].feitos++;
        });
      });
      var predListBig = Object.keys(predios).filter(function(k){ return predios[k].tot >= 2; });
      var predTot = predListBig.length;
      var predFeitos = predListBig.filter(function(k){ return predios[k].feitos === predios[k].tot; }).length;
      var predParciais = predListBig.filter(function(k){
        return predios[k].feitos > 0 && predios[k].feitos < predios[k].tot;
      }).length;

      var pct = total > 0 ? Math.round((alcancados / total) * 100) : 0;
      // Cor focada em prédios completos (cobertura real) — não no % de
      // endereços, que se anima com 1 toque no portão.
      var pctPred = predTot > 0 ? Math.round((predFeitos / predTot) * 100) : pct;
      var corBarra = pctPred >= 70 ? '#16a34a' : pctPred >= 30 ? '#f59e0b' : '#9ca3af';

      var avisoParciais = '';
      if (predParciais > 0) {
        avisoParciais =
          '<div class="small mt-2" style="background:#fef3c7; border-left:3px solid #f59e0b; padding:6px 10px; border-radius:4px; color:#92400e">' +
            '<i class="fa-solid fa-circle-exclamation me-1"></i>' +
            '<b>' + predParciais + '</b> prédio(s) com aptos pulados — vale voltar pra terminar.' +
          '</div>';
      }

      box.innerHTML =
        '<div class="d-flex justify-content-between align-items-baseline mb-1">' +
          '<span class="fw-bold">🏢 ' + predFeitos + ' de ' + predTot + ' prédio(s) cobertos</span>' +
          (predTot > 0 ? '<span class="fw-bold" style="color:' + corBarra + '">' + pctPred + '%</span>' : '') +
        '</div>' +
        '<div class="barra-cobertura"><div style="width:' + pctPred + '%;background:' + corBarra + '"></div></div>' +
        '<div class="small text-muted mt-1">' +
          alcancados + ' de ' + total + ' aptos/casas tocados · ' +
          conv + ' conversas · ' + sem + ' contatos · ' + naoAtend + ' não atenderam · ' + cartas + ' cartas' +
        '</div>' +
        avisoParciais;
    }
    window.atualizarCobertura = atualizarCobertura;

    // ================= AÇÕES =================
    window.abrirEdicao = function(row) {
        if(isReorder) return; 

        var item = null;
        dadosGerais.forEach(q => { var f = q.itens.find(i => i.row == row); if(f) item = f; });
        if(!item) return;

        // Preenche campos ocultos
        document.getElementById('editRow').value = item.row;
        document.getElementById('editQuadraId').value = item.quadra;
        
        // Campos Visíveis
        document.getElementById('inputNome').value = item.nome || ""; // Col M
        document.getElementById('inputNota').value = item.nota || "";
        document.getElementById('inputTipo').value = item.tipo;
        document.getElementById('checkNaoVisitar').checked = item.naoVisitar;
        
        document.getElementById('inputLogradouro').value = item.logradouro;
        document.getElementById('inputNumero').value = item.numero;
        document.getElementById('inputComplemento').value = item.complemento;

        toggleFormFields();
        modalEdicao.show();
    };

    function toggleFormFields() {
        var tipo = document.getElementById('inputTipo').value.toLowerCase();
        // Apto ou Alojamento permite edição em massa
        var isApt = tipo.includes('apartamento') || tipo.includes('coletivo') || tipo.includes('vila');
        var divMassa = document.getElementById('divCheckMassa');

        if(divMassa) {
            divMassa.classList.toggle('d-none', !isApt);
            document.getElementById('checkAplicarMassa').checked = false;
        }

        // "Criar prédio inteiro" só faz sentido em endereço NOVO + tipo Apartamento
        var rowVazio = !document.getElementById('editRow').value;
        var divCriar = document.getElementById('divCriarPredio');
        if (divCriar) {
            divCriar.classList.toggle('d-none', !(rowVazio && isApt));
            var ck = document.getElementById('checkCriarPredio');
            if (ck) ck.checked = false;
            var box = document.getElementById('boxAptosMassa');
            if (box) box.classList.add('d-none');
        }
    }

    // Wire-up: liga/desliga box de andares/aptos e atualiza preview
    document.addEventListener('change', function(ev){
      if (ev.target && ev.target.id === 'checkCriarPredio') {
        document.getElementById('boxAptosMassa').classList.toggle('d-none', !ev.target.checked);
        _atualizarPreviewPredio();
      }
    });
    document.addEventListener('input', function(ev){
      if (ev.target && (ev.target.id === 'inputAndares' || ev.target.id === 'inputAptosPorAndar')) {
        _atualizarPreviewPredio();
      }
    });
    function _atualizarPreviewPredio() {
      var a = parseInt(document.getElementById('inputAndares').value, 10) || 0;
      var p = parseInt(document.getElementById('inputAptosPorAndar').value, 10) || 0;
      var total = a * p;
      var ultimo = a > 0 && p > 0 ? (a * 100 + p) : 0;
      var el = document.getElementById('previewAptos');
      if (el) el.textContent = total > 0
        ? 'Vai criar ' + total + ' apartamentos (101 até ' + ultimo + ').'
        : 'Preencha andares e aptos por andar.';
    }

    function salvarFormulario() {
        var row = document.getElementById('editRow').value; 
        var aplicarMassa = document.getElementById('checkAplicarMassa').checked;
        
        var payload = {
            row: row,
            quadraId: document.getElementById('editQuadraId').value,
            // Campos Extras p/ Novo
            face: document.getElementById('editFace').value,
            lat: document.getElementById('editLat').value,
            lng: document.getElementById('editLng').value,
            ordem: document.getElementById('editOrdem').value,
            
            nome: document.getElementById('inputNome').value, // Col M
            nota: document.getElementById('inputNota').value, // Col N
            tipo: document.getElementById('inputTipo').value, // Col L
            naoVisitar: document.getElementById('checkNaoVisitar').checked,
            
            logradouro: document.getElementById('inputLogradouro').value,
            numero: document.getElementById('inputNumero').value,
            complemento: document.getElementById('inputComplemento').value,
            
            modoMassa: aplicarMassa
        };

        var btn = document.querySelector('#modalEdicao .btn-primary');
        var txtOriginal = btn.innerText;
        btn.innerText = "Salvando...";
        btn.disabled = true;

        // Verifica se o usuário pediu "criar prédio inteiro"
        var criarPredio = !row &&
                          document.getElementById('checkCriarPredio') &&
                          document.getElementById('checkCriarPredio').checked;

        var runner = google.script.run
            .withSuccessHandler(function(r){
                modalEdicao.hide();
                btn.innerText = txtOriginal; btn.disabled = false;
                if (criarPredio && r && r.qtdCriada) {
                    window.toast && window.toast(
                        'Prédio criado: ' + r.qtdCriada + ' aptos', 'success', 4000);
                } else if (!row) {
                    window.toast && window.toast('Endereço adicionado', 'success');
                } else {
                    window.toast && window.toast('Salvo', 'success');
                }
                carregarDados();
            })
            .withFailureHandler(function(e){
                window.toast && window.toast("Erro: " + (e && e.message ? e.message : e), "error", 6000);
                btn.innerText = txtOriginal; btn.disabled = false;
            });

        // Decide qual função chamar
        if (criarPredio) {
            var andares = parseInt(document.getElementById('inputAndares').value, 10) || 0;
            var aptosPorAndar = parseInt(document.getElementById('inputAptosPorAndar').value, 10) || 0;
            if (andares < 1 || aptosPorAndar < 1) {
                window.toast && window.toast('Preencha andares e aptos por andar', 'warn');
                btn.innerText = txtOriginal; btn.disabled = false;
                return;
            }
            runner.criarPredioEmMassa({
                quadraId: payload.quadraId,
                face: payload.face,
                logradouro: payload.logradouro,
                numero: payload.numero,
                lat: payload.lat,
                lng: payload.lng,
                nome: payload.nome,
                andares: andares,
                aptosPorAndar: aptosPorAndar
            });
        } else if(!row) {
            runner.salvarNovoEnderecoPublico(payload);
        } else if(aplicarMassa) {
            runner.salvarNotaEmMassa(payload);
        } else {
            runner.salvarEndereco(payload);
        }
    }
    
    // Demais funções (Reorder, Visita, etc) mantidas do original
    function toggleReorder() {
        isReorder = !isReorder;
        var btn = document.getElementById('btnReorder');
        document.body.classList.toggle('reorder-mode', isReorder);
        if(isReorder) {
            btn.innerHTML = '<i class="fa-solid fa-save"></i>'; btn.style.background = "#ffc107";
            // Sortable é lazy-loaded — primeira vez baixa o JS
            (window.carregarSortableSeNecessario ? window.carregarSortableSeNecessario() : Promise.resolve())
              .then(ativarSortable)
              .catch(function(){ window.toast && window.toast('Erro carregando Sortable', 'error'); });
        } else {
            btn.innerHTML = '<i class="fa-solid fa-sort"></i>'; btn.style.background = "#6c757d"; salvarOrdem();
            sortables.forEach(s => s.destroy());
        }
    }
    function ativarSortable() {
        if (!window.Sortable) return;
        document.querySelectorAll('.sortable-list, .sortable-sublist').forEach(el => {
            sortables.push(new Sortable(el, { handle: '.handle', animation: 150 }));
        });
    }
    function salvarOrdem() {
        var payload = []; var count = 1;
        document.querySelectorAll('.address-item').forEach(el => {
            var r = el.getAttribute('data-row'); if(r) payload.push({ row: r, ordem: count++ });
        });
        google.script.run.salvarOrdemEmMassa(payload);
    }
    function centralizarGPS() {
        navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude], 18); });
    }
    function abrirRotaGoogle() {
        var dest = null;
        for(var i=0; i<dadosGerais.length; i++) {
             if(dadosGerais[i].itens.length > 0 && dadosGerais[i].itens[0].lat) { dest = dadosGerais[i].itens[0].lat + "," + dadosGerais[i].itens[0].lng; break; }
        }
        if(dest) window.open("https://www.google.com/maps/dir/?api=1&destination=" + dest, "_blank");
    }

function toggleVisita(row, el) {
        var key = "v_" + row;
        
        if(el.classList.contains('checked')) {
            // ================= DESMARCAR =================
            // Remove do cache local
            localStorage.removeItem(key);
            
            // Atualiza visual
            el.classList.remove('checked');
            el.closest('.address-item').style.opacity = "1";
            
            // MANDA O SERVIDOR LIMPAR A DATA (false)
            google.script.run.gerenciarVisitaEndereco(row, false);

            // (Opcional) Remove o badge de data da tela imediatamente se existir
            var itemDiv = el.closest('.address-item');
            var badgeData = itemDiv.querySelector('.badge.bg-light'); // A classe do reloginho
            if(badgeData) badgeData.remove();

        } else {
            // ================= MARCAR =================
            // Salva no cache local
            localStorage.setItem(key, "true");
            
            // Atualiza visual
            el.classList.add('checked');
            el.closest('.address-item').style.opacity = "0.5";
            
            // MANDA O SERVIDOR SALVAR A DATA (true)
            google.script.run.gerenciarVisitaEndereco(row, true);
        }
        if (typeof aplicarFiltros === 'function') aplicarFiltros();
    }

    function mudarStatusQuadra(qId, status) {
        var icon = status === 'Iniciado' ? '▶️' : '✅';
        if(!confirm(icon + " Marcar quadra " + qId + " como " + status.toUpperCase() + "?")) return;
        // Feedback só depois do save bem-sucedido — antes era um alert
        // que mentia (vinha ANTES do roundtrip).
        google.script.run
          .withSuccessHandler(function(){
            if (window.toast) window.toast("Status atualizado: " + status, "success");
            else if (window.toast) window.toast("Status atualizado: " + status, "success");
            if(status === 'Concluído') carregarDados();
          })
          .withFailureHandler(function(e){
            if (window.toast) window.toast("Erro: " + (e && e.message ? e.message : e), "error");
            else if (window.toast) window.toast("Erro ao atualizar status. Tente de novo.", "error");
          })
          .definirStatusQuadra(qId, status);
    }

    // ===== BUSCA + FILTROS =====
    function aplicarFiltros() {
      var q = (document.getElementById('inputBuscaEndereco').value || '').toLowerCase().trim();
      var filtroVisita = (document.querySelector('input[name="filtroVisita"]:checked') || {}).value || 'todos';

      var totalItens = 0;
      var totalFeitos = 0;

      document.querySelectorAll('.address-item').forEach(function(el) {
        var row = el.getAttribute('data-row');
        var obj = null;
        try { obj = JSON.parse(el.getAttribute('data-obj')); } catch(e) { obj = {}; }

        var texto = (
          (obj.logradouro || '') + ' ' +
          (obj.numero || '') + ' ' +
          (obj.nome || '') + ' ' +
          (obj.complemento || '') + ' ' +
          (obj.tipo || '') + ' ' +
          (obj.nota || '')
        ).toLowerCase();

        var bateBusca = !q || texto.indexOf(q) > -1;

        // "Feito" = qualquer desfecho marcado (naoAtendeu / semConversa /
        // conversou) — armazenado em localStorage como desf_<row>. Conta
        // também o legado 'v_<row>' = true pra compat com marcações antigas.
        var row = el.getAttribute('data-row');
        var feito = !!localStorage.getItem('desf_' + row) ||
                    localStorage.getItem('carta_' + row) === 'true' ||
                    localStorage.getItem('v_' + row) === 'true';
        var bateVisita = (filtroVisita === 'todos') ||
                         (filtroVisita === 'feitos' && feito) ||
                         (filtroVisita === 'pendentes' && !feito);

        var visivel = bateBusca && bateVisita;
        el.style.display = visivel ? '' : 'none';

        totalItens++;
        if (feito) totalFeitos++;
      });

      // Esconde grupos sem itens visíveis
      document.querySelectorAll('.group-body').forEach(function(gb) {
        var visiveis = Array.from(gb.querySelectorAll('.address-item')).filter(function(it){ return it.style.display !== 'none'; }).length;
        var grpHeader = gb.previousElementSibling;
        if (grpHeader) grpHeader.style.display = visiveis > 0 ? '' : 'none';
        gb.style.display = visiveis > 0 ? '' : 'none';
      });

      // Esconde quadras sem nada visível. Se há filtro de busca ativo
      // (texto digitado), abre automaticamente as quadras que têm match
      // pra o publicador ver os endereços filtrados sem precisar clicar.
      var temBusca = !!q;
      document.querySelectorAll('.quadra-card').forEach(function(qc) {
        var visiveis = Array.from(qc.querySelectorAll('.address-item')).filter(function(it){ return it.style.display !== 'none'; }).length;
        qc.style.display = visiveis > 0 ? '' : 'none';
        if (temBusca && visiveis > 0) qc.classList.add('aberta');
      });

      // Atualiza progresso global
      var lbl = document.getElementById('lblProgresso');
      if (lbl) lbl.innerText = totalFeitos + '/' + totalItens;
    }

    function limparBusca() {
      document.getElementById('inputBuscaEndereco').value = '';
      aplicarFiltros();
    }

    function toggleDisplay(id) { document.getElementById(id).classList.toggle('d-none'); }
    function limparSessao(qId) {
        if(confirm("Limpar marcações?")) {
            document.querySelectorAll(`[data-quadra="${qId}"] .address-item`).forEach(el => localStorage.removeItem("v_"+el.dataset.row));
            renderizarLista();
        }
    }
    function concluirQuadra(qId) {
        if(!confirm("Concluir Quadra?")) return;
        var hoje = new Date().toISOString().split('T')[0];
        google.script.run
          .withSuccessHandler(function(){
            if (window.toast) window.toast("Registrado!", "success");
            carregarDados();
          })
          .withFailureHandler(function(e){
            if (window.toast) window.toast("Erro ao registrar: " + (e && e.message ? e.message : e), "error");
            else if (window.toast) window.toast("Erro ao registrar. Verifique a conexão e tente de novo.", "error");
          })
          .salvarConclusaoQuadras({ ids: [qId], data: hoje, modo: 'auto' });
    }
  </script>
