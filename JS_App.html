<script>
  // Variáveis Globais 
  var mapGeral, mapPoligonos, mapRegistro;
  var layerGroupQuadras, layerGroupTerritorios;
  var layerGroupFacesRes, layerGroupFacesCom;
  var layerGroupRegistro, layerGroupRegistroIcons, layerGroupRegistroLabels;
  var cacheQuadrasRegistro = []; // Guarda os dados locais das quadras
  var cacheOpsRegistro = new Set(); // Guarda quais territórios são opcionais
  var mapCampanha, lgCampanhaQuadras;
  var configCampanhaGlobal = { nome: "", data: "" };

  var facesSelecionadas = new Map();
  var registroSelecionados = new Set();
  var shareSelecionados = new Set(); 
  var selectedQuadras = []; 
  
  var dadosFacesGlobal = null;
  var dadosTerritoriosCache = [];
  
  var isSelectionMode = false;
  var isEditingTerritory = false; 
  
  var modalEdicao, modalNovoTerritorio, modalNomear, modalEditarTerritorio, modalConflitoData, modalLinkPublico;
  
  var currentEditLayer = null; 
  var editingTerritoryData = null; 
  var divisionMarkers = []; var divisionIndices = [];

  // toast, confirmar e runApp estão em JS_Core.html (incluído antes deste arquivo)

 window.onload = function() {
    try {
       // Limpa chaves obsoletas de versões anteriores do motor offline
       try {
         localStorage.removeItem('app_dados_completos');
         localStorage.removeItem('data_sync_app');
         localStorage.removeItem('app_mapa_offline');
       } catch(e){}

       modalEdicao = new bootstrap.Modal(document.getElementById('modalEdicao'));
       modalNovoTerritorio = new bootstrap.Modal(document.getElementById('modalNovoTerritorio'));
       modalNomear = new bootstrap.Modal(document.getElementById('modalNomear'));
       modalEditarTerritorio = new bootstrap.Modal(document.getElementById('modalEditarTerritorio'));
       modalConflitoData = new bootstrap.Modal(document.getElementById('modalConflitoData'));
       modalLinkPublico = new bootstrap.Modal(document.getElementById('modalLinkPublico'));
       
       var di = document.getElementById('dataRegistro'); if(di) di.valueAsDate = new Date();

       // Carrega configuração da campanha (objetivo, meta, etc.) — sem UI por enquanto, só popula configCampanhaGlobal
       if (typeof window.carregarConfigCampanhaInicial === "function") {
           window.carregarConfigCampanhaInicial();
       }

       window.iniciarApp();
    } catch(e) { console.error("Erro Init:", e); }
  };

  window.iniciarApp = function() { window.carregarMapaGeral(); };

  window.showLoading = function(show, txt) { var l=document.getElementById('loading'); if(l) l.style.display=show?'flex':'none'; if(txt) document.getElementById('loadingText').innerText=txt; };

window.mudarAba = function(aba) {
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active')); 
    document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
    
    var btn = document.getElementById('btnAba' + aba.charAt(0).toUpperCase() + aba.slice(1)); 
    if(btn) btn.classList.add('active');
    
    var tela = document.getElementById(aba === 'poligonos' ? 'telaPoligonos' : 'tela' + aba.charAt(0).toUpperCase() + aba.slice(1)); 
    if(tela) tela.classList.add('active');
    
    if(aba === 'geral') setTimeout(() => { if(mapGeral) mapGeral.invalidateSize(); }, 100);
    
    if(aba === 'poligonos') { 
        if(!mapPoligonos) window.iniciarMapaPoligonos(); 
        else { mapPoligonos.invalidateSize(); window.mudarVisualizacao(document.getElementById('editorViewSelect').value); } 
    }
    
    if(aba === 'registro') { 
        window.carregarDadosRegistro(); 
        setTimeout(() => { if(mapRegistro) mapRegistro.invalidateSize(); }, 200); 
    }
    
    // Rota dos Prédios
    if(aba === 'predios') {
        window.carregarPredios();
    }

    // Rota da Campanha
    if(aba === 'campanha') {
        window.carregarDadosCampanha();
        window.carregarObjetivosCampanha();
        setTimeout(() => { if(mapCampanha) mapCampanha.invalidateSize(); }, 200);
    }
  };


 

  window.atualizarBarraShare = function() { var bar = document.getElementById('barraCompartilhar'); var cnt = document.getElementById('countShare'); if(cnt) cnt.innerText = shareSelecionados.size; if(bar) { if(shareSelecionados.size > 0) bar.classList.remove('d-none'); else bar.classList.add('d-none'); } };
  window._abrirModalLinkPublico = function(view, labelHeader) {
    if(shareSelecionados.size === 0) return;
    var ids = Array.from(shareSelecionados);

    // Coleta territórios para mostrar como label (apenas informativo)
    var terrs = new Set();
    lgGeralQuadras.eachLayer(function(l) {
      if(shareSelecionados.has(l.metaData.id) && l.metaData.territory) {
        terrs.add(l.metaData.territory);
      }
    });
    var labelTerritorio = (terrs.size === 1)
      ? Array.from(terrs)[0]
      : ids.length + " quadra(s)" + (terrs.size > 1 ? " (" + terrs.size + " territórios)" : "");

    // Guarda os ids no escopo do modal pro fluxo de Território Pessoal
    window._idsCompartilharCorrente = ids;
    window._designacaoCriadaParaIds = null; // reseta — modal foi reaberto

    // Pré-popula prazo default = hoje + 30d (limpa nome)
    var inpNome = document.getElementById('adminInputPubNome');
    var inpPrazo = document.getElementById('adminInputPubPrazo');
    var cardTerritorioPessoal = document.getElementById('cardTerritorioPessoal');
    if (inpNome) inpNome.value = '';
    if (inpPrazo) {
      var d30 = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
      inpPrazo.value = d30.toISOString().slice(0, 10);
    }
    // Território Pessoal só faz sentido no link de Publicador
    if (cardTerritorioPessoal) {
      cardTerritorioPessoal.style.display = (view === 'publico') ? '' : 'none';
    }

    var doGenerate = function() {
      google.script.run
        .withSuccessHandler(function(url) {
          showLoading(false);
          var baseUrl = url || window.location.href.split('?')[0];
          var finalUrl = baseUrl + "?v=" + view + "&ids=" + ids.join(",");
          document.getElementById('inputLinkPublico').value = finalUrl;
          document.getElementById('lblTerritorioShare').innerText = labelTerritorio;
          var titulo = document.querySelector('#modalLinkPublico .modal-title');
          if (titulo) titulo.innerText = labelHeader;
          modalLinkPublico.show();
        })
        .withFailureHandler(function(e){ showLoading(false); alert(e); })
        .getScriptUrl();
    };

    showLoading(true);
    // Se é designação (dirigente), marca as quadras como Pendente antes
    if (view === 'dirigente') {
      google.script.run
        .withSuccessHandler(function(){ window.invalidarCacheMapa(); doGenerate(); })
        .withFailureHandler(function(e){ showLoading(false); window.toast("Erro ao designar: " + (e && e.message ? e.message : e), "error", 6000); })
        .designarQuadras(ids);
    } else {
      doGenerate();
    }
  };
  window.gerarLinkPublico = function() { window._abrirModalLinkPublico('publico', 'Link para Publicador'); };
  window.gerarLinkDirigente = function() { window._abrirModalLinkPublico('dirigente', 'Link para Dirigente — Designar'); };

  // Cria a designação pessoal ANTES de qualquer ação de compartilhar,
  // se o nome do publicador estiver preenchido. Idempotente por id de
  // sessão — sem nome, não faz nada.
  function comDesignacaoAdmin(acao) {
    var nomeEl = document.getElementById('adminInputPubNome');
    var nome = nomeEl ? nomeEl.value.trim() : '';
    if (!nome || !window._idsCompartilharCorrente) { acao(); return; }
    if (window._designacaoCriadaParaIds === window._idsCompartilharCorrente) {
      // Já criou pra essa seleção — não duplica
      acao(); return;
    }
    var prazo = (document.getElementById('adminInputPubPrazo') || {}).value || '';
    google.script.run
      .withSuccessHandler(function(r){
        if (!r || !r.ok) {
          if (!confirm('Não criou a designação: ' + ((r && r.erro) || '?') + '\n\nEnviar mesmo assim?')) return;
        } else {
          window._designacaoCriadaParaIds = window._idsCompartilharCorrente;
          if (r.conflitos && r.conflitos.length) {
            console.warn('Quadras já em outra designação:', r.conflitos);
          }
          window.atualizarDesignacoesNoMapa && window.atualizarDesignacoesNoMapa();
        }
        acao();
      })
      .withFailureHandler(function(e){
        if (!confirm('Não criou a designação: ' + (e && e.message || e) + '\n\nEnviar mesmo assim?')) return;
        acao();
      })
      .criarDesignacao({
        ids: window._idsCompartilharCorrente,
        publicador: nome,
        prazo: prazo
      });
  }

  window.compartilharWhatsApp = function() {
    var link = document.getElementById('inputLinkPublico').value;
    if (!link) return;
    comDesignacaoAdmin(function(){
      var msg = encodeURIComponent('Olá! Segue o link das quadras designadas:\n\n' + link);
      window.open('https://wa.me/?text=' + msg, '_blank');
    });
  };

  window.compartilharNativo = function() {
    var link = document.getElementById('inputLinkPublico').value;
    if (!link) return;
    comDesignacaoAdmin(function(){
      if (navigator.share) {
        navigator.share({ title: 'Quadras designadas', text: 'Quadras para hoje', url: link })
          .catch(function(){ /* user cancelou */ });
      } else {
        window.copiarLinkGerado();
        window.toast('Compartilhamento nativo indisponível — link copiado.', 'info');
      }
    });
  };

  window.copiarLinkGerado = function() {
    var inp = document.getElementById('inputLinkPublico');
    if (!inp || !inp.value) return;
    comDesignacaoAdmin(function(){
      var fallback = function(){ inp.select(); try { document.execCommand('copy'); } catch(e){} };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(inp.value)
          .then(function(){ window.toast('Link copiado!', 'success'); })
          .catch(function(){ fallback(); window.toast('Link copiado!', 'success'); });
      } else { fallback(); window.toast('Link copiado!', 'success'); }
    });
  };

  window.enviarLinkPorEmail = function() {
    var email = (document.getElementById('inputEmailDestino').value || '').trim();
    var nome = (document.getElementById('inputNomeDestino').value || '').trim();
    var link = document.getElementById('inputLinkPublico').value;

    if (!email) { window.toast('Informe o email do destinatário.', 'warn'); return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { window.toast('Email inválido.', 'warn'); return; }
    if (!link) { window.toast('Sem link para enviar.', 'warn'); return; }

    // Total = número de ids no link (?ids=...)
    var match = link.match(/[?&]ids=([^&]+)/);
    var total = match ? match[1].split(',').length : 0;

    showLoading(true, 'Enviando email...');
    google.script.run
      .withSuccessHandler(function(r) {
        showLoading(false);
        if (r && r.status === 'SUCESSO') {
          window.toast('Email enviado para ' + email, 'success');
        } else {
          window.toast('Falha ao enviar: ' + (r && r.msg ? r.msg : 'erro desconhecido'), 'error', 6000);
        }
      })
      .withFailureHandler(function(e){
        showLoading(false);
        window.toast('Erro: ' + (e && e.message ? e.message : e), 'error', 6000);
      })
      .enviarEmailDesignacao(email, nome, link, total);
  };
  window.toggleCamadasGeral = function() { var q = document.getElementById('checkGeralQuadras').checked; var t = document.getElementById('checkGeralTerritorios').checked; if(q) mapGeral.addLayer(lgGeralQuadras); else mapGeral.removeLayer(lgGeralQuadras); if(t) { mapGeral.addLayer(lgGeralTerritorios); mapGeral.addLayer(lgGeralLabels); } else { mapGeral.removeLayer(lgGeralTerritorios); mapGeral.removeLayer(lgGeralLabels); } };

  // Coloração das quadras no Visão Geral: por território (cor da planilha)
  // ou por status (verde recente / amarelo > 30d / vermelho > 90d / cinza pendente).
  window.atualizarColoracaoGeral = function() {
    if (!lgGeralQuadras) return;
    var modo = (document.getElementById('coloracaoGeral') || {}).value || 'territorio';
    var hoje = new Date();

    lgGeralQuadras.eachLayer(function(l) {
      if (!l.metaData) return;
      var d = l.metaData;
      var cor;
      if (modo === 'status') {
        if (d.dataConclusao) {
          var p = d.dataConclusao.split('-');
          var dt = new Date(parseInt(p[0],10), parseInt(p[1],10) - 1, parseInt(p[2],10));
          var dias = Math.ceil((hoje - dt) / (864e5));
          if (dias <= 30) cor = '#198754';      // verde — feito recente
          else if (dias <= 90) cor = '#ffc107'; // amarelo
          else cor = '#dc3545';                  // vermelho
        } else {
          cor = '#9ca3af'; // cinza — nunca feita
        }
      } else {
        cor = d.color || '#3388ff';
      }
      // Preserva destaque de seleção/busca
      if (shareSelecionados.has(d.id)) {
        l.setStyle({ fillColor: cor, color: 'blue', weight: 4, fillOpacity: 0.6 });
      } else {
        l.setStyle({ fillColor: cor, color: '#666', weight: 1, fillOpacity: 0.6 });
      }
    });
  };

  // Busca de quadra no Visão Geral — destaca e dá zoom no match.
  window.buscarQuadraGeral = function(termo) {
    if (!lgGeralQuadras) return;
    var q = (termo || '').toLowerCase().trim();
    var matchLayer = null;
    var matchBounds = null;

    lgGeralQuadras.eachLayer(function(l) {
      if (!l.metaData) return;
      var id = String(l.metaData.id || '').toLowerCase();
      var terr = String(l.metaData.territory || '').toLowerCase();
      var bate = q && (id.indexOf(q) > -1 || terr.indexOf(q) > -1);
      if (bate) {
        l.setStyle({ color: '#ff8800', weight: 3, opacity: 1, fillOpacity: 0.8 });
        var b = l.getBounds();
        if (!matchBounds) matchBounds = b;
        else matchBounds.extend(b);
        if (!matchLayer) matchLayer = l;
      } else {
        // restaura estilo padrão (a menos que esteja selecionada para share)
        if (shareSelecionados.has(l.metaData.id)) {
          l.setStyle({ color: 'blue', weight: 4 });
        } else {
          l.setStyle({ color: '#666', weight: 1, opacity: 1, fillOpacity: 0.6 });
        }
      }
    });

    if (matchBounds && matchBounds.isValid()) {
      mapGeral.fitBounds(matchBounds, { padding: [40, 40], maxZoom: 17 });
    }
  };

  window.limparBuscaGeral = function() {
    var inp = document.getElementById('inputBuscaQuadra');
    if (inp) inp.value = '';
    window.buscarQuadraGeral('');
  };


  // =================================================================
  // EDITOR
  // =================================================================
window.iniciarMapaPoligonos = function() {
    try {
      if(!mapPoligonos) {
        mapPoligonos = L.map('mapPoligonos').setView([-7.115, -34.863], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapPoligonos);
        if (mapPoligonos.pm && mapPoligonos.pm.setGlobalOptions) {
          mapPoligonos.pm.setGlobalOptions({ allowSelfIntersection: false });
        }

        layerGroupQuadras = L.featureGroup().addTo(mapPoligonos);
        layerGroupTerritorios = L.featureGroup().addTo(mapPoligonos);
        layerGroupFacesRes = L.featureGroup().addTo(mapPoligonos);
        layerGroupFacesCom = L.featureGroup().addTo(mapPoligonos);

        // div pode ter sido criado oculto — recalcula tamanho
        setTimeout(function(){ if(mapPoligonos) mapPoligonos.invalidateSize(); }, 80);
      }
      window.carregarEditorDados();
    } catch(e) {
      console.error("Falha iniciarMapaPoligonos:", e);
      showLoading(false);
      window.toast("Falha ao iniciar o editor: " + (e && e.message ? e.message : e), "error", 6000);
    }
  };

window.carregarEditorDados = function() {
      showLoading(true, "Carregando editor...");
      layerGroupQuadras.clearLayers();

      var pendentes = 3;
      var falhou = false;
      function fim() {
          pendentes--;
          if (pendentes <= 0) showLoading(false);
      }
      function erro(e) {
          if (falhou) return;
          falhou = true;
          showLoading(false);
          window.toast("Erro ao carregar editor: " + (e && e.message ? e.message : e), "error", 6000);
      }

      google.script.run
        .withSuccessHandler(function(dados) {
          (dados || []).forEach(function(d) {
             var pts = window.stringParaLatLng(d.polyString); if(pts.length<3) return;
             var poly = L.polygon(pts, {color: '#666', weight: 1, fillColor: d.color, fillOpacity: 0.3});
             poly.metaData = d;
             poly.bindTooltip(d.id, {permanent: true, direction: "center", className: "label-quadra"});
             poly.on('click', function(e) {
                 if(divisionMarkers.length > 0) return;
                 // Modo renomear: cliques atribuem letras em ordem
                 if (window._modoRenomearAtivo) {
                   L.DomEvent.stopPropagation(e);
                   window.toggleQuadraNaOrdemRenomear(this);
                   return;
                 }
                 if(facesSelecionadas.size > 0) { L.DomEvent.stopPropagation(e); window.confirmarAssociacao(this); return; }
                 if(isEditingTerritory) { window.toggleSelecaoQuadra(this); return; }
                 if(isSelectionMode) { window.toggleSelecaoQuadra(this); return; }
                 L.DomEvent.stopPropagation(e); window.abrirModalEdicao(this);
             });
             layerGroupQuadras.addLayer(poly);
          });
          // Após carregar quadras, garante que o mapa renderiza no tamanho certo
          // e centraliza nos polígonos (só na primeira carga)
          if (mapPoligonos) {
            mapPoligonos.invalidateSize();
            if (!window._editorFocado && layerGroupQuadras.getLayers().length > 0) {
              try {
                var b = layerGroupQuadras.getBounds();
                if (b.isValid()) { mapPoligonos.fitBounds(b, { padding: [30, 30] }); window._editorFocado = true; }
              } catch(e){}
            }
          }
          fim();
        })
        .withFailureHandler(erro)
        .getPoligonosQuadras();

      google.script.run
        .withSuccessHandler(function(terrs){
            dadosTerritoriosCache = terrs || [];
            window.atualizarLabelsTerritorioEditor();
            fim();
        })
        .withFailureHandler(erro)
        .getDadosTerritorios();

      google.script.run
        .withSuccessHandler(function(f){
            dadosFacesGlobal = f || { residencial: [], comercial: [] };
            window.renderizarFaces();
            fim();
        })
        .withFailureHandler(erro)
        .getDadosFaces();
  };
  
 // Função chamada pelo Checkbox do HTML
  window.toggleNumerosTerritorios = function() {
      window.atualizarLabelsTerritorioEditor();
  };

 window.atualizarLabelsTerritorioEditor = function() {
      if(!layerGroupTerritorios) return;
      
      layerGroupTerritorios.clearLayers();
      
      var checkbox = document.getElementById('toggleNumbers');
      var showOpt = checkbox ? checkbox.checked : false;
      var currentView = document.getElementById('editorViewSelect').value;
      
      // Se a visão for "quadras", não desenhamos os territórios para não poluir/bloquear
      if(currentView === 'quadras') {
           window.mudarVisualizacao(currentView);
           return;
      }
      
      dadosTerritoriosCache.forEach(function(t) {
         var pts = window.stringParaLatLng(t.polyString); 
         if(pts.length < 3) return;
         
         // 1. Polígono do Território
         var pt = L.polygon(pts, {
             color: t.color, 
             weight: 3, 
             fillOpacity: 0.15, 
             dashArray: '10,5', 
             interactive: true
         });
         pt.metaData = t;
         
         // Evento de Clique no Polígono
         pt.on('click', function(e) { 
             // Bloqueios de segurança:
             if(divisionMarkers.length > 0) return; // Se estiver cortando, ignora
             if(isSelectionMode) return; // Se estiver selecionando quadras para criar novo, ignora
             if(facesSelecionadas.size > 0) return; // Se estiver associando faces, ignora
             
             // Se estiver no modo "Alterar Quadras" (isEditingTerritory), o clique no polígono não deve fazer nada
             // ou deve sair do modo? Geralmente não faz nada, pois o foco é clicar nas quadras.
             if(isEditingTerritory) return;

             L.DomEvent.stopPropagation(e); 
             window.abrirModalEditarTerritorio(this.metaData, this); 
         });
         
         layerGroupTerritorios.addLayer(pt);
         
         // 2. Rótulo (Marcador de Texto)
         var rawType = String(t.labelType || 'visible');
         var type = rawType.toLowerCase().trim(); 
         var deveMostrar = (type === 'visible') || (type === 'optional' && showOpt);
         
         if(deveMostrar) {
             var c = pt.getBounds().getCenter();
             if(t.labelPos && t.labelPos.includes(',')) { 
                 var s = t.labelPos.split(','); 
                 c = [parseFloat(s[0]), parseFloat(s[1])]; 
             }
             
             var badge = '<div class="territory-badge" style="border-color:'+t.color+'; cursor:pointer;">'+t.name+'</div>';
             
             // Draggable se estiver editando ESTE território
             var isDraggable = (isEditingTerritory && editingTerritoryData && editingTerritoryData.data.name === t.name);
             
             var marker = L.marker(c, {
                 icon: L.divIcon({html: badge}), 
                 draggable: isDraggable,
                 interactive: true // Rótulo sempre clicável também
             });
             
             marker.metaData = t; // Vincula dados ao marcador
             
             // Evento de Drag (Arrastar)
             if(isDraggable) {
                 marker.setZIndexOffset(1000); 
                 marker.on('dragend', function(e) { 
                     var np = e.target.getLatLng(); 
                     if(editingTerritoryData) editingTerritoryData.data.labelPos = np.lat + "," + np.lng;
                 });
             }
             
             // Evento de Clique no Rótulo (Abre o modal igual ao poligono)
             marker.on('click', function(e) {
                 if(divisionMarkers.length > 0 || isSelectionMode || facesSelecionadas.size > 0 || isEditingTerritory) return;
                 
                 L.DomEvent.stopPropagation(e);
                 // Precisamos passar o polígono associado, não o marker, para a função de edição funcionar 100%
                 // Como pt está no escopo, usamos ele.
                 window.abrirModalEditarTerritorio(t, pt); 
             });
             
             layerGroupTerritorios.addLayer(marker);
         }
      });
      
      window.mudarVisualizacao(currentView);
  };
  
  window.mudarVisualizacao = function(val) {
      if(!mapPoligonos) return;
      if(mapPoligonos.hasLayer(layerGroupQuadras)) mapPoligonos.removeLayer(layerGroupQuadras);
      if(mapPoligonos.hasLayer(layerGroupTerritorios)) mapPoligonos.removeLayer(layerGroupTerritorios);
      if(val === 'quadras') { mapPoligonos.addLayer(layerGroupQuadras); } 
      else if (val === 'territorios') { mapPoligonos.addLayer(layerGroupTerritorios); } 
      else { mapPoligonos.addLayer(layerGroupTerritorios); mapPoligonos.addLayer(layerGroupQuadras); }
  };

  // =================================================================
  // FUNÇÕES DE TERRITÓRIO (MODAL E SALVAMENTO CORRIGIDOS)
  // =================================================================
  
  // 1. Abrir Modal (Popula dados)
  window.abrirModalEditarTerritorio = function(data, layer) {
      editingTerritoryData = { data: data, layer: layer };
      
      // IDs correspondem ao HTML do modal
      document.getElementById('editTerrOriginalName').value = data.name; // IMPORTANTE
      document.getElementById('editTerrName').value = data.name;
      document.getElementById('editTerrColor').value = data.color;
      document.getElementById('editTerrLabelType').value = data.labelType || 'visible';
      
      modalEditarTerritorio.show();
  };
  
  // 2. Salvar Edição Simples (Nome, Cor, Tipo)
  window.salvarTerritorioExistente = function() {
       // 1. Pega os valores dos inputs do Modal
       var nomeOriginal = document.getElementById('editTerrOriginalName').value;
       var novoNome = document.getElementById('editTerrName').value;
       var novaCor = document.getElementById('editTerrColor').value;

  window.iniciarDivisaoPorVertices = function() {
      if(!currentEditLayer) return;
      modalEdicao.hide();
      window.toast("Clique em DOIS vértices (bolinhas azuis) para dividir.", "info", 5000);
      var latlngs = currentEditLayer.getLatLngs()[0];
      divisionMarkers = []; divisionIndices = [];
      latlngs.forEach(function(ll, idx) {
          var m = L.circleMarker(ll, {radius: 7, color: 'blue', fillColor: 'white', fillOpacity: 1}).addTo(mapPoligonos);
          m.vertexIndex = idx; 
          m.on('click', function(e) {

              this.setStyle({color: 'red', fillColor: 'red'});
              divisionIndices.push(this.vertexIndex);
              if(divisionIndices.length === 2) { window.executarCorteArray(latlngs); }
          });
          divisionMarkers.push(m);
      });
  };
  
  window.executarCorteArray = function(allPoints) {
      divisionMarkers.forEach(m => mapPoligonos.removeLayer(m)); divisionMarkers = [];
      try {
          var idx1 = divisionIndices[0]; var idx2 = divisionIndices[1];
          if(idx1 === idx2) throw "Mesmo vértice.";
          var start = Math.min(idx1, idx2); var end = Math.max(idx1, idx2);
          var pointsA = allPoints.slice(start, end + 1);
          var pointsB = allPoints.slice(end).concat(allPoints.slice(0, start + 1));
          if(pointsA.length < 3 || pointsB.length < 3) throw "Corte inválido.";
          
          var idA = prompt("ID Parte 1:", currentEditLayer.metaData.id); if(!idA) { window.carregarEditorDados(); return; }
          var idB = prompt("ID Parte 2:", currentEditLayer.metaData.id + "-B");
          var polyStrA = window.latLngsToString(pointsA); var polyStrB = window.latLngsToString(pointsB);
          
          showLoading(true);
          google.script.run.withSuccessHandler(() => { window.toast("Quadra dividida!", "success"); (window.invalidarCacheMapa(), window.carregarEditorDados()); }).salvarNovaQuadraDividida({ idA: currentEditLayer.metaData.id, polyA: polyStrA, idB: idB, polyB: polyStrB });

window.converterGeoJsonParaString = function(geometry) {
    if (!geometry || !geometry.coordinates) return "";
    
    var coords = [];
    
    // Resolve o problema de MultiPolygon (ilhas) pegando o polígono principal
    if (geometry.type === 'MultiPolygon') {
        if(geometry.coordinates[0] && geometry.coordinates[0][0]) {
            coords = geometry.coordinates[0][0];
        }
    } 
    // Polígono simples
    else if (geometry.type === 'Polygon') {
        if(geometry.coordinates[0]) {
            coords = geometry.coordinates[0];
        }
    }
    
    if (!coords || coords.length === 0) return "";

    // INVERTE E FORMATA: [Lng, Lat] viram "Lat,Lng" separados por " | "
    return coords.map(function(p) {
        return p[1] + "," + p[0]; 
    }).join(" | ");
};

window.iniciarMapaRegistro = function(qs, ops) {
      if (!mapRegistro) {
          mapRegistro = L.map('mapRegistro', {
              preferCanvas: true
          }).setView([-7.115, -34.863], 15);

          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRegistro);

          layerGroupRegistro = L.featureGroup().addTo(mapRegistro);
          layerGroupRegistroIcons = L.featureGroup().addTo(mapRegistro);
          layerGroupRegistroLabels = L.featureGroup().addTo(mapRegistro);
          // Overlay de Território Pessoal — cadeado nas quadras designadas
          layerGroupRegistroDesignacoes = L.featureGroup().addTo(mapRegistro);
      }

      layerGroupRegistro.clearLayers();
      layerGroupRegistroIcons.clearLayers();
      layerGroupRegistroLabels.clearLayers();
      if (typeof layerGroupRegistroDesignacoes !== 'undefined' && layerGroupRegistroDesignacoes) {
        layerGroupRegistroDesignacoes.clearLayers();
      }
      
      var hoje = new Date();
      
      qs.forEach(function(q) {
          var pts = window.stringParaLatLng(q.polyString);
          if (pts.length < 3) return;
          
          var isOpt = ops.has(q.territory);
          var cor = isOpt ? '#eeeeee' : q.color;
          var op = isOpt ? 0.1 : 0.5;
          
          var poly = L.polygon(pts, {
              color: cor,
              weight: 1,
              fillOpacity: op
          });
          poly.metaData = q; // necessário pro overlay de designações

          if (!isOpt) {
              var dataFormatada = q.dataConclusao ? window.formatarDataBR(q.dataConclusao) : "Nunca feita";
              var territorioNome = q.territory || "Sem Território";
              
              var conteudoTooltip = '<div style="text-align: center;">' +
                                    '<b>Quadra ' + q.id + '</b><br>' +
                                    '<span style="font-size: 0.9em;">' + territorioNome + '</span><br>' +
                                    '<span style="font-size: 0.85em; color: #444;">Última: ' + dataFormatada + '</span>' +
                                    '</div>';

              poly.bindTooltip(conteudoTooltip, { 
                  sticky: true, direction: 'top', opacity: 0.95 
              });

              poly.on('click', function() {
                  var id = q.id;
                  var jaSelecionada = registroSelecionados.has(id);
                  // Avisa se está prestes a marcar/selecionar uma quadra
                  // com designação aberta — evita o servo concluir/redesignar
                  // por engano em cima do trabalho do publicador.
                  if (!jaSelecionada) {
                    var ja = window._quadrasDesignadasCache || {};
                    if (ja[id]) {
                      var info = ja[id];
                      var prazoStr = info.prazo ? new Date(info.prazo).toLocaleDateString('pt-BR') : '—';
                      if (!confirm('Quadra ' + id + ' está designada para '
                          + (info.publicador || '?') + ' (até ' + prazoStr + ').\n\n'
                          + 'Continuar mesmo assim?')) return;
                    }
                  }
                  if (jaSelecionada) {
                      registroSelecionados.delete(id);
                      this.setStyle({ color: q.color, weight: 1 });
                  } else {
                      registroSelecionados.add(id);
                      this.setStyle({ color: 'red', weight: 4 });
                  }
                  window.atualizarBarraSelecaoRegistro();
              });

              // --- LONG-PRESS / CONTEXT-MENU = abre histórico ---
              poly.on('contextmenu', function(e) {
                  L.DomEvent.stopPropagation(e);
                  window.abrirHistoricoQuadra(q.id);
              });
              var lpTimer = null;
              poly.on('mousedown touchstart', function(e) {
                  if (lpTimer) clearTimeout(lpTimer);
                  var alvoId = q.id;
                  lpTimer = setTimeout(function() { window.abrirHistoricoQuadra(alvoId); lpTimer = null; }, 700);
              });
              poly.on('mouseup mouseout touchend touchcancel touchmove', function() {
                  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
              });
              
              var iconCls = "status-alert";
              var iconHtml = '<i class="fa-solid fa-triangle-exclamation"></i>';

              if (q.dataConclusao) {
                  var p = q.dataConclusao.split('-');
                  var dt = new Date(p[0], p[1] - 1, p[2]);
                  var diff = Math.ceil(Math.abs(hoje - dt) / (864e5));
                  iconHtml = '<i class="fa-solid fa-circle-check"></i>';

                  if (diff <= 15) {
                      iconCls = "status-15d";
                  } else if (diff <= 30) {
                      iconCls = "status-30d";
                  } else if (diff <= 60) {
                      iconCls = "status-60d";
                  } else if (diff <= 90) {
                      iconCls = "status-90d";
                  } else {
                      iconCls = "status-alert";
                      iconHtml = '<i class="fa-solid fa-triangle-exclamation"></i>';
                  }
              }
              
              // Adiciona o Marcador no Mapa
              layerGroupRegistroIcons.addLayer(L.marker(poly.getBounds().getCenter(), {
                  icon: L.divIcon({
                      className: 'status-marker-icon ' + iconCls,
                      html: iconHtml,
                      iconSize: [20, 20]
                  }),
                  interactive: false
              }));

          } else {
              poly.setStyle({ interactive: false });
          }
          
          layerGroupRegistro.addLayer(poly);
      });

      if(window.renderizarLabelsRegistro) window.renderizarLabelsRegistro();
      if(window.ativarGPS) window.ativarGPS('registro');
      // Overlay de Território Pessoal (cadeados) no mapa do Registro,
      // pra evitar que o servo marque/redesigne uma quadra travada.
      if (window.atualizarDesignacoesNoMapaRegistro) window.atualizarDesignacoesNoMapaRegistro();
  };

window.abrirHistoricoQuadra = function(id) {

    conteudo.innerHTML = '<div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div></div>';

    if (!window._modalHistoricoQuadra) {
      window._modalHistoricoQuadra = new bootstrap.Modal(document.getElementById('modalHistoricoQuadra'));
    }
    window._modalHistoricoQuadra.show();

    google.script.run
      .withSuccessHandler(function(eventos) {

          conteudo.innerHTML = '<div class="text-center text-muted py-4"><i class="fa-solid fa-inbox" style="font-size:2rem; opacity:.4"></i><div class="mt-2">Sem histórico ainda.</div></div>';
          return;
        }
        var iconePorTipo = function(tipo) {
          var t = (tipo || '').toLowerCase();
          if (t.indexOf('conclu') > -1) return { ico: 'fa-circle-check', cor: 'text-success' };
          if (t.indexOf('iniciado') > -1) return { ico: 'fa-circle-play', cor: 'text-primary' };
          if (t.indexOf('design') > -1) return { ico: 'fa-user-tie', cor: 'text-info' };
          if (t.indexOf('historico') > -1 || t.indexOf('apenas') > -1) return { ico: 'fa-clock-rotate-left', cor: 'text-muted' };
          return { ico: 'fa-circle-dot', cor: 'text-secondary' };
        };
        var html = '<div class="list-group list-group-flush">';
        eventos.forEach(function(ev) {
          var ic = iconePorTipo(ev.tipo);
          var dataExibida = ev.data ? window.formatarDataBR(ev.data) : '';

                    '<i class="fa-solid ' + ic.ico + ' ' + ic.cor + '" style="font-size:1.3rem"></i>' +
                    '<div class="flex-grow-1">' +
                      '<div class="fw-bold">' + (ev.tipo || 'Evento') + '</div>' +
                      '<div class="small text-muted">' + dataExibida + ' • registrado em ' + ev.timestamp + '</div>' +
                    '</div>' +
                  '</div>';
        });
        html += '</div>';
        conteudo.innerHTML = html;
      })
      .withFailureHandler(function(e) {
        conteudo.innerHTML = '<div class="alert alert-danger">Erro ao carregar histórico: ' + (e && e.message ? e.message : e) + '</div>';
      })
      .getHistoricoQuadra(id);
};

  window.renderizarFaces = function() {
      // Limpa camadas anteriores para não duplicar
      layerGroupFacesRes.clearLayers();
      layerGroupFacesCom.clearLayers();

      var showRes = document.getElementById('toggleFacesRes').checked;
      var showCom = document.getElementById('toggleFacesCom').checked;
      // Filtros novos por vínculo com quadra. Default = ambos true,
      // mantendo compat com comportamento antigo.
      var vincEl = document.getElementById('toggleFacesVinc');
      var naoVincEl = document.getElementById('toggleFacesNaoVinc');
      var showVinc = !vincEl || vincEl.checked;
      var showNaoVinc = !naoVincEl || naoVincEl.checked;

      if (!dadosFacesGlobal) return;

      function passaFiltroVinc(f) {
        return f.isAssigned ? showVinc : showNaoVinc;
      }

      // Residenciais (Azul)
      if (showRes && dadosFacesGlobal.residencial) {
          dadosFacesGlobal.residencial.forEach(function(f) {
              if (!passaFiltroVinc(f)) return;
              var m = window.criarMarkerFace(f, '#0d6efd');
              layerGroupFacesRes.addLayer(m);
          });
      }

      // Comerciais (Laranja)
      if (showCom && dadosFacesGlobal.comercial) {
          dadosFacesGlobal.comercial.forEach(function(f) {
              if (!passaFiltroVinc(f)) return;
              var m = window.criarMarkerFace(f, '#fd7e14');
              layerGroupFacesCom.addLayer(m);
          });
      }
  };

// Quando há faces selecionadas, reduz a opacidade do polígono pra
// destacar os pontos — MAS mantém pointerEvents ativos. O markerPane
// fica acima do overlayPane no Leaflet por padrão, então os pontos
// capturam o clique primeiro; clicar em área livre vai pro polígono
// (que dispara confirmarAssociacao). Desabilitar pointerEvents aqui
// quebrava EXATAMENTE o fluxo de vincular.
window.atualizarModoVinculo = function() {
    if (!layerGroupQuadras) return;
    var ativo = facesSelecionadas.size > 0;
    layerGroupQuadras.eachLayer(function(layer) {
        if (ativo) {
            layer.setStyle({ fillOpacity: 0.05, opacity: 0.3 });
        } else {
            var d = layer.metaData;
            layer.setStyle({ fillColor: (d && d.color) || '#3388ff', fillOpacity: 0.3, color: '#666', opacity: 1 });
        }
    });
    // Tooltips das quadras (labels) — esconde durante o modo
    if (layerGroupQuadras.getLayers().length > 0) {
        layerGroupQuadras.eachLayer(function(layer) {
            var tt = layer.getTooltip && layer.getTooltip();
            if (!tt) return;
            var el = tt.getElement && tt.getElement();
            if (el) el.style.opacity = ativo ? '0.2' : '1';
        });
    }
};

window.criarMarkerFace = function(f, corBase) {
      // Pontos mais visíveis (raio 8 vs antigo 5) e com borda branca sempre.
      // Borda mais clara nos não-atribuídos para ficar fácil de clicar mesmo
      // com polígono atrás.
      var opacidade = f.isAssigned ? 1.0 : 0.7;
      var borda = 'white';
      var pesoBorda = f.isAssigned ? 1.5 : 1;

      var m = L.circleMarker([f.lat, f.lng], {
          radius: 8,
          fillColor: corBase,
          color: borda,
          weight: pesoBorda,
          fillOpacity: opacidade,
          interactive: true,
          pane: 'markerPane' // garante que fica acima dos polígonos
      });
      
      // Guarda dados no próprio objeto do marcador para facilitar
      m.corOriginal = corBase;
      m.opacidadeOriginal = opacidade;
      m.bordaOriginal = borda;
      m.pesoBordaOriginal = pesoBorda;

      // Tooltip (Mouseover)
      m.bindTooltip('<b>' + f.label + '</b><br>' + f.total + ' endereços' + (f.isAssigned ? '<br>(Vinculada)' : ''), {
          direction: 'top',
          offset: [0, -5]
      });
      
      m.on('click', function(e) {
          L.DomEvent.stopPropagation(e);

          if(facesSelecionadas.has(f.key)) {
              facesSelecionadas.delete(f.key);
              this.setStyle({
                  fillColor: m.corOriginal,
                  color: m.bordaOriginal,
                  weight: m.pesoBordaOriginal,
                  radius: 8,
                  fillOpacity: m.opacidadeOriginal
              });
          } else {
              facesSelecionadas.set(f.key, f);
              this.setStyle({
                  fillColor: 'red',
                  color: 'yellow',
                  weight: 3,
                  radius: 11,
                  fillOpacity: 1
              });
          }

          // Atualiza o modo foco — quando há seleção, "abaixa" os polígonos
          if (typeof window.atualizarModoVinculo === 'function') {
              window.atualizarModoVinculo();
          }
      });
      
      return m;
  };

window.confirmarAssociacao = function(layerQuadra) {
      var quadraId = layerQuadra.metaData.id;
      var qtdFaces = facesSelecionadas.size;
      if(qtdFaces === 0) return;

      var totalEnderecos = 0;
      var todasLinhas = [];
      facesSelecionadas.forEach(function(faceObj) {
          totalEnderecos += faceObj.total;
          if(faceObj.rows && Array.isArray(faceObj.rows)) {
              todasLinhas = todasLinhas.concat(faceObj.rows);
          }
      });

      window.confirmar({
        titulo: 'Vincular endereços',
        mensagem: 'Vincular ' + qtdFaces + ' face(s) (' + totalEnderecos + ' endereços) à quadra ' + quadraId + '?',
        okLabel: 'Vincular'
      }).then(function(ok) {
          if (!ok) return;
          showLoading(true, "Vinculando " + totalEnderecos + " endereços...");
          google.script.run
              .withSuccessHandler(function() {
                  window.toast("Endereços vinculados!", "success");
                  facesSelecionadas.clear();
                  window.atualizarModoVinculo();
                  window.invalidarCacheMapa();
                  window.carregarEditorDados();
              })
              .withFailureHandler(function(e){
                  showLoading(false);
                  window.toast("Erro ao vincular: " + (e && e.message ? e.message : e), "error", 6000);
              })
              .salvarAssociacaoFaces({ quadraId: quadraId, linhas: todasLinhas });
      });
  };

  // =================================================================
  // MOTOR OFFLINE — Stale-While-Revalidate com invalidação manual
  // =================================================================
  // Mostra cache local IMEDIATAMENTE (se existir) e busca dados frescos em
  // background. Quando o fresco chega, se for diferente, re-renderiza.
  // Saves chamam window.invalidarCacheMapa() para forçar busca fresca.
  window.CHAVE_CACHE_MAPA = 'th_cache_mapa_v3';
  window._cacheMapaInvalido = false;

  window.invalidarCacheMapa = function() {
    window._cacheMapaInvalido = true;
    try { localStorage.removeItem(window.CHAVE_CACHE_MAPA); } catch(e) {}
  };

  window.obterDadosOfflineFirst = function(callbackRenderizacao) {
    var cached = null;
    var cachedStr = null;
    try { cachedStr = localStorage.getItem(window.CHAVE_CACHE_MAPA); } catch(e) {}

    var temCache = false;
    if (cachedStr && !window._cacheMapaInvalido) {
      try {
        cached = JSON.parse(cachedStr);
        if (cached && cached.quadras) {
          callbackRenderizacao(cached);
          temCache = true;
        }
      } catch(e) {}
    }

    if (!temCache) window.showLoading(true, "Carregando dados...");

    google.script.run
      .withSuccessHandler(function(novo) {
        window._cacheMapaInvalido = false;
        if (!novo) { window.showLoading(false); return; }
        var novoStr = JSON.stringify(novo);
        try { localStorage.setItem(window.CHAVE_CACHE_MAPA, novoStr); } catch(e) {}
        // Re-renderiza só se o pacote mudou (evita flicker quando cache estava ok)
        if (!temCache || novoStr !== cachedStr) {
          callbackRenderizacao(novo);
        }
        window.showLoading(false);
      })
      .withFailureHandler(function(erro) {
        window.showLoading(false);
        if (!temCache) {
          alert("Falha ao carregar dados: " + (erro && erro.message ? erro.message : erro));
        }
      })
      .getDadosIniciaisMaster();
  };

  window.renderizarMapaGeralExtraido = function(pacote) {
      lgGeralTerritorios.clearLayers(); lgGeralLabels.clearLayers(); lgGeralQuadras.clearLayers();
      if (typeof lgGeralDesignacoes !== 'undefined' && lgGeralDesignacoes) lgGeralDesignacoes.clearLayers();
      if(pacote.territorios) {
          pacote.territorios.forEach(function(t) {
              var pts = window.stringParaLatLng(t.polyString);
              if(pts.length >= 3) {
                  var pt = L.polygon(pts, {color: t.color, weight: 3, fillOpacity: 0.1, dashArray: '5,5'});
                  pt.bindPopup("<b>Território: "+t.name+"</b>");
                  lgGeralTerritorios.addLayer(pt);
                  var c = pt.getBounds().getCenter();
                  var badge = '<div class="territory-badge" style="border-color:'+t.color+'">'+t.name+'</div>';
                  lgGeralLabels.addLayer(L.marker(c, {icon: L.divIcon({html: badge}), interactive: false}));
              }
          });
          lgGeralTerritorios.bringToBack();
      }
      if(pacote.quadras) {
          pacote.quadras.forEach(function(d) {
             var pts = window.stringParaLatLng(d.polyString);
             if(pts.length >= 3) {
                var poly = L.polygon(pts, {color: '#666', fillColor: d.color, weight: 1, fillOpacity: 0.6});
                poly.metaData = d; // necessário para gerar link público/dirigente
                poly.on('click', function(e) {
                   var id = d.id;
                   var jaSelecionada = shareSelecionados.has(id);
                   // Avisa se está prestes a SELECIONAR uma quadra que já
                   // tem designação pessoal aberta — evita redesignar
                   // sobre o trabalho de outro publicador.
                   if (!jaSelecionada) {
                     var ja = window._quadrasDesignadasCache || {};
                     if (ja[id]) {
                       var info = ja[id];
                       var prazoStr = info.prazo ? new Date(info.prazo).toLocaleDateString('pt-BR') : '—';
                       var msg = 'Quadra ' + id + ' já está designada para '
                               + (info.publicador || '?') + ' (até ' + prazoStr + ').\n\n'
                               + 'Selecionar mesmo assim?';
                       if (!confirm(msg)) return;
                     }
                   }
                   if (jaSelecionada) { shareSelecionados.delete(id); this.setStyle({color: '#666', weight: 1}); }
                   else { shareSelecionados.add(id); this.setStyle({color: 'blue', weight: 4}); }
                   window.atualizarBarraShare();
                });
                var c = poly.getBounds().getCenter();
                var linkMaps = 'http://maps.google.com/?q=' + c.lat + ',' + c.lng;
                poly.bindPopup('<div class="text-center" style="min-width:100px"><b>'+d.id+'</b><br><a href="'+linkMaps+'" target="_blank" class="btn btn-sm btn-success w-100 mb-1 text-white text-decoration-none">Rota</a></div>');
                lgGeralQuadras.addLayer(poly);
             }
          });
      }
      // Aplica coloração escolhida (se for por status)
      window.atualizarColoracaoGeral();
      // Overlay de Território Pessoal (quadras designadas a alguém)
      window.atualizarDesignacoesNoMapa();
  };

  // Util compartilhado de escape HTML (definido depois) — usamos via
  // window.escapeHtmlGeral pra evitar TDZ entre módulos.
  function _escHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  // Overlay no mapa geral: pra cada quadra com designação pessoal aberta,
  // desenha um ícone de cadeado no centro + tooltip com publicador e
  // prazo. Quadras vencidas ficam em vermelho.
  // IMPORTANTE: antes de aplicar estilos override, restauramos o estilo
  // base de cada poly. Sem isso, designação cancelada/concluída deixaria
  // a borda azul "fantasma" no mapa até o usuário trocar de aba.
  window.atualizarDesignacoesNoMapa = function() {
    if (typeof lgGeralDesignacoes === 'undefined' || !lgGeralDesignacoes) return;
    lgGeralDesignacoes.clearLayers();

    // Restaura estilo base de TODAS as quadras (a coloração por status
    // é re-aplicada por atualizarColoracaoGeral abaixo).
    lgGeralQuadras.eachLayer(function(poly){
      poly.setStyle({ color: '#666', weight: 1 });
    });
    // Reaplica coloração corrente (status / cor de quadra) se disponível
    if (typeof window.atualizarColoracaoGeral === 'function') {
      try { window.atualizarColoracaoGeral(); } catch(e) {}
    }

    google.script.run
      .withSuccessHandler(function(mapa){
        // Cache global — usado por outras camadas pra avisar o user
        window._quadrasDesignadasCache = mapa || {};
        if (!mapa) return;
        lgGeralQuadras.eachLayer(function(poly){
          var d = poly.metaData;
          if (!d || !mapa[d.id]) return;
          var info = mapa[d.id];
          var prazoStr = info.prazo ? new Date(info.prazo).toLocaleDateString('pt-BR') : '—';
          var cor = info.vencida ? '#dc2626' : '#1d4ed8';
          // Borda destacada na quadra designada
          poly.setStyle({ color: cor, weight: 3 });
          // Ícone de cadeado no centro
          var c = poly.getBounds().getCenter();
          var html = '<div style="background:' + cor + ';color:#fff;border-radius:50%;'
                   + 'width:24px;height:24px;display:flex;align-items:center;'
                   + 'justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.3)">'
                   + '<i class="fa-solid fa-lock" style="font-size:11px"></i></div>';
          var icone = L.marker(c, {
            icon: L.divIcon({ html: html, className: '', iconSize: [24,24], iconAnchor: [12,12] }),
            interactive: true
          });
          // bindTooltip aceita HTML — escapamos publicador (vem do user)
          icone.bindTooltip(
            '<b>' + _escHtml(d.id) + '</b><br>' +
            (info.vencida ? '⚠️ Vencida<br>' : '') +
            'Com: ' + _escHtml(info.publicador || '?') + '<br>' +
            'Até: ' + _escHtml(prazoStr),
            { direction: 'top' }
          );
          lgGeralDesignacoes.addLayer(icone);
        });
      })
      .withFailureHandler(function(){})
      .getQuadrasDesignadas();
  };

  window.carregarDadosCampanha = function() {
    if(!mapCampanha) {
      mapCampanha = L.map('mapCampanha');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapCampanha);
      lgCampanhaQuadras = L.featureGroup().addTo(mapCampanha);
    }

    document.getElementById('labelNomeCampanhaTela').innerText = configCampanhaGlobal.nome || "Campanha";
    document.getElementById('objetivoCampanhaTela').innerText = configCampanhaGlobal.objetivo || "";

    let dataInicio = configCampanhaGlobal.data ? new Date(configCampanhaGlobal.data + "T00:00:00") : null;
    let dataFim = configCampanhaGlobal.dataFim ? new Date(configCampanhaGlobal.dataFim + "T00:00:00") : null;
    let hoje = new Date();
    let seteDiasAtras = new Date(hoje.getTime() - 7*24*60*60*1000);

    window.obterDadosOfflineFirst(function(pacote) {
      lgCampanhaQuadras.clearLayers();
      let countCompletas = 0; let countCinza = 0; let completasSemana = 0;

      if(pacote.quadras) {
        pacote.quadras.forEach(function(d) {
          let pts = window.stringParaLatLng(d.polyString);
          if(pts.length < 3) return;

          let estado = 'restante';
          if (d.dataConclusao && dataInicio) {
            let dataConc = new Date(d.dataConclusao + "T00:00:00");
            if (dataConc >= dataInicio) {
              estado = 'completa'; countCompletas++;
              if (dataConc >= seteDiasAtras) completasSemana++;
            } else {
              countCinza++;
            }
          } else {
            countCinza++;
          }

          let corMapa = (estado === 'completa') ? '#28a745' : '#6c757d';
          let poly = L.polygon(pts, {color: 'white', fillColor: corMapa, weight: 2, fillOpacity: 0.8});
          lgCampanhaQuadras.addLayer(poly);
        });
      }

      let total = countCompletas + countCinza;
      let porcentagem = total > 0 ? Math.round((countCompletas / total) * 100) : 0;
      // Espelha pro compartilhamento da imagem
      window.dadosDashCampanha = {
        completas: countCompletas, restantes: countCinza,
        totalQuadras: total, porcentagem: porcentagem
      };

      document.getElementById('campanhaCompletas').innerText = countCompletas;
      document.getElementById('campanhaCinza').innerText = countCinza;
      document.getElementById('campanhaPorcentagem').innerText = porcentagem + "%";
      document.getElementById('campanhaTextoProgresso').innerText = countCompletas + " de " + total + " quadras";
      document.getElementById('barraProgressoCampanha').style.width = porcentagem + "%";

      // Meta info (datas e ritmo necessário)
      var metaInfoEl = document.getElementById('metaInfoCampanha');
      var partes = [];
      if (dataInicio) partes.push('<span>Início: <b>' + formatarDataBR(configCampanhaGlobal.data) + '</b></span>');
      if (dataFim) {
        partes.push('<span>Alvo: <b>' + formatarDataBR(configCampanhaGlobal.dataFim) + '</b></span>');
        var diasRestantes = Math.ceil((dataFim - hoje) / (1000*60*60*24));
        if (diasRestantes > 0 && total > 0) {
          var semanasRestantes = Math.max(1, diasRestantes / 7);
          var ritmoNecessario = Math.ceil(countCinza / semanasRestantes);
          partes.push('<span class="text-success fw-bold">Ritmo: ' + ritmoNecessario + '/sem</span>');
        }
      }
      metaInfoEl.innerHTML = partes.join('');

      // Meta semanal
      var meta = configCampanhaGlobal.metaSemanal || 0;
      var pctSem = meta > 0 ? Math.min(100, Math.round((completasSemana / meta) * 100)) : 0;
      document.getElementById('campanhaSemanaFeitas').innerText = completasSemana;
      document.getElementById('campanhaSemanaMeta').innerText = meta > 0 ? meta : '—';
      document.getElementById('barraSemanaCampanha').style.width = pctSem + "%";

      var ritmoTxt = '';
      if (meta > 0) {
        if (completasSemana >= meta) ritmoTxt = '🎯 Meta da semana batida!';
        else ritmoTxt = 'Faltam ' + (meta - completasSemana) + ' para bater a meta da semana.';
      } else {
        ritmoTxt = 'Defina uma meta semanal em "Editar".';
      }
      document.getElementById('campanhaSemanaRitmo').innerText = ritmoTxt;

      window.focarMapaInteligente(mapCampanha, lgCampanhaQuadras);
    });

    // Dashboard (KPIs, gráfico semanal, ranking) — em paralelo
    window.carregarDashboardCampanha();
  };

  // Copia resumo da campanha em texto para colar no WhatsApp/reunião
  window.copiarResumoCampanha = function() {
    var nome = configCampanhaGlobal.nome || 'Campanha';
    var completas = parseInt(document.getElementById('campanhaCompletas').innerText || '0', 10);
    var restantes = parseInt(document.getElementById('campanhaCinza').innerText || '0', 10);
    var pct = document.getElementById('campanhaPorcentagem').innerText || '0%';
    var media = document.getElementById('kpiMedia4Sem').innerText || '0';

    var texto =
      '📊 *' + nome + '*\n\n' +
      '✅ Concluídas: ' + completas + '\n' +
      '⏳ Restantes: ' + restantes + '\n' +
      '📈 Progresso: ' + pct + '\n' +
      '⚡ Esta semana: ' + feitasSemana + (metaSemana !== '—' ? ' / ' + metaSemana : '') + '\n' +
      '🎯 Média últimas 4 semanas: ' + media + ' quadras/semana';

    if (navigator.clipboard) {
      navigator.clipboard.writeText(texto).then(function(){

      });
    } else {

      document.body.appendChild(ta);
      ta.select();

      ta.remove();

  window.carregarDashboardCampanha = function() {
    google.script.run
      .withSuccessHandler(function(d) {
        if (!d) return;
        // Espelha no global pra reaproveitar no compartilhamento da imagem
        window.dadosDashCampanha = d;
        try {
          // Média semanal
          var medEl = document.getElementById('kpiMedia4Sem');
          if (medEl) medEl.innerText = d.kpis.mediaSemana4 || 0;

          // Gráfico de barras das últimas 12 semanas
          var g = document.getElementById('graficoSemanal');
          if (g && d.porSemana) {
            var max = Math.max.apply(null, d.porSemana.map(function(x){ return x.completas; }).concat([1]));
            g.innerHTML = d.porSemana.map(function(x){
              var pct = max > 0 ? Math.round((x.completas / max) * 100) : 0;
              return '<div class="bar-col">' +
                       '<div class="bar" style="height:' + pct + '%" data-v="' + x.completas + '"></div>' +
                       '<div class="label">' + x.label + '</div>' +
                     '</div>';
            }).join('');
          }

          // Ranking de territórios
          var r = document.getElementById('rankingTerritorios');
          if (r && d.ranking) {
            if (d.ranking.length === 0) {
              r.innerHTML = '<div class="text-muted small text-center py-2">Sem territórios cadastrados.</div>';
            } else {
              r.innerHTML = d.ranking.map(function(t, i){
                return '<div class="rank-row">' +
                         '<div class="rank-pos">' + (i+1) + '</div>' +
                         '<div class="rank-nome">' + _escHtml(t.nome) + '</div>' +
                         '<div class="rank-bar-wrap"><div class="rank-bar" style="width:' + (Number(t.porcentagem) || 0) + '%"></div></div>' +
                         '<div class="rank-num"><b>' + (Number(t.completas) || 0) + '</b>/' + (Number(t.total) || 0) + ' (' + (Number(t.porcentagem) || 0) + '%)</div>' +
                       '</div>';
              }).join('');
            }
          }
        } catch(e) { console.error('Erro ao renderizar dashboard:', e); }
      })
      .withFailureHandler(function(e){ console.error('Erro dashboard:', e); })
      .getDadosDashboard();

    return ymd;
  }

  window.stringParaLatLng = function(str) { if(!str) return []; var p=str.replace(/\r\n|\n|\r/g,"|").split("|"); var r=[]; p.forEach(function(x){var c=x.trim().split(","); if(c.length>=2) r.push([parseFloat(c[0]), parseFloat(c[1])])}); return r; };
  window.formatarDataBR = function(ymd) { if(!ymd) return ""; var p = ymd.split('-'); if(p.length === 3) return p[2]+'/'+p[1]+'/'+p[0]; return ymd; };
  window.ativarGPS=function(t){if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){var m=(t==='geral'?mapGeral:t==='registro'?mapRegistro:mapPoligonos); if(m){L.circleMarker([p.coords.latitude,p.coords.longitude],{radius:6,color:'blue'}).addTo(m);m.setView([p.coords.latitude,p.coords.longitude],17)}})};
  window.latLngsToString = function(ll) { var arr = Array.isArray(ll[0]) ? ll[0] : ll; return arr.map(function(p){return p.lat+","+p.lng}).join(" | "); };

  ];

  function _labelModalidade(key) {

  window.carregarObjetivosCampanha = function() {
    google.script.run
      .withSuccessHandler(function(lista){
        _objetivos = lista || [];
        renderObjetivos();
      })
      .withFailureHandler(function(e){
        document.getElementById('listaObjetivos').innerHTML =
          '<div class="text-danger small">Erro: ' + (e && e.message ? e.message : e) + '</div>';
      })
      .listarObjetivosCampanha();

  function renderObjetivos() {
    var cont = document.getElementById('listaObjetivos');
    var filtro = _objetivos.filter(function(o){ return (o.tipo || 'geral') === _objTipoAtivo; });
    if (filtro.length === 0) {
      cont.innerHTML = '<div class="text-muted text-center py-3 small">Nenhum objetivo cadastrado nesse tipo. Toque em <b>Adicionar</b>.</div>';
      return;
    }
    // Agrupa por modalidade
    var grupos = {};
    filtro.forEach(function(o){
      var k = o.modalidade || 'outros';
      if (!grupos[k]) grupos[k] = [];
      grupos[k].push(o);
    });

    var html = '';
    MODALIDADES.concat([{ key: 'outros', label: 'Outros', icone: 'fa-list' }]).forEach(function(m){
      if (!grupos[m.key]) return;
      html += '<div class="mb-3">' +
                '<div class="fw-bold text-success mb-1"><i class="fa-solid ' + m.icone + ' me-1"></i>' + m.label + '</div>';
      grupos[m.key].forEach(function(o){
        var icones = [];
        var hrefLink = safeUrl(o.link);
        var hrefAnexo = safeUrl(o.anexoUrl);
        if (hrefLink) icones.push('<a href="' + escapeHtml(hrefLink) + '" target="_blank" rel="noopener" class="text-decoration-none text-primary me-2" title="Abrir link"><i class="fa-solid fa-link"></i></a>');
        if (hrefAnexo) icones.push('<a href="' + escapeHtml(hrefAnexo) + '" target="_blank" rel="noopener" class="text-decoration-none text-primary me-2" title="' + escapeHtml(o.anexoNome || 'Anexo') + '"><i class="fa-solid fa-paperclip"></i></a>');
        var olho = o.publico
          ? '<button class="btn btn-sm btn-link p-0 ms-1" onclick="window.alternarPublicoObjetivo(\'' + o.id + '\', false)" title="Visível — clique pra esconder"><i class="fa-regular fa-eye text-success"></i></button>'
          : '<button class="btn btn-sm btn-link p-0 ms-1" onclick="window.alternarPublicoObjetivo(\'' + o.id + '\', true)" title="Escondido — clique pra mostrar"><i class="fa-regular fa-eye-slash text-muted"></i></button>';
        html += '<div class="d-flex align-items-start gap-2 py-2 px-2 mb-1 rounded" style="background:#fff;border:1px solid #e5e7eb">' +
                  '<div class="flex-grow-1" onclick="window.abrirModalObjetivo(\'' + o.id + '\')" style="cursor:pointer">' +
                    '<div class="fw-semibold">' + escapeHtml(o.titulo || '(sem título)') + '</div>' +
                    (o.descricao ? '<div class="text-muted small">' + escapeHtml(o.descricao) + '</div>' : '') +
                  '</div>' +
                  '<div class="d-flex align-items-center gap-1">' +
                    icones.join('') + olho +
                  '</div>' +
                '</div>';
      });
      html += '</div>';
    });
    cont.innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  // Bloqueia esquemas perigosos em URLs vindas do usuário. Defesa em
  // profundidade — o backend já filtra, mas se dado antigo (pré-fix)
  // ainda existir na planilha, evita XSS via href="javascript:..."
  function safeUrl(s) {
    var u = String(s || '').trim();
    if (!u) return '';
    return (/^https?:\/\//i.test(u) || /^mailto:/i.test(u)) ? u : '';
  }

  window.abrirModalObjetivo = function(id) {
    popularSelectModalidades();
    _objEditandoId = id || null;
    var obj = id ? _objetivos.find(function(o){ return o.id === id; }) : null;

    document.getElementById('lblTituloModalObjetivo').innerText = obj ? 'Editar objetivo' : 'Novo objetivo';
    document.getElementById('objInputId').value = id || '';
    document.querySelector('input[name="objInputTipo"][value="' + (obj ? obj.tipo : _objTipoAtivo) + '"]').checked = true;
    document.getElementById('objInputModalidade').value = obj ? (obj.modalidade || 'casa') : 'casa';
    document.getElementById('objInputTitulo').value = obj ? obj.titulo : '';
    document.getElementById('objInputDescricao').value = obj ? obj.descricao : '';
    document.getElementById('objInputLink').value = obj ? obj.link : '';
    document.getElementById('objInputArquivo').value = '';
    var anexoHrefModal = obj ? safeUrl(obj.anexoUrl) : '';
    document.getElementById('objAnexoAtual').innerHTML = (obj && obj.anexoNome && anexoHrefModal)
      ? 'Anexo atual: <a href="' + escapeHtml(anexoHrefModal) + '" target="_blank" rel="noopener">' + escapeHtml(obj.anexoNome) + '</a>'
      : (obj && obj.anexoNome ? 'Anexo atual: ' + escapeHtml(obj.anexoNome) + ' (link inválido)' : 'Nenhum anexo enviado');
    // Novo objetivo já vem marcado como público — esse é o caso comum.
    // Pra esconder do painel, basta desmarcar.
    document.getElementById('objInputPublico').checked = obj ? !!obj.publico : true;
    document.getElementById('btnRemoverObjetivo').style.display = id ? '' : 'none';

    // getOrCreateInstance reaproveita o backdrop/listeners — sem isso,
    // cada abertura criava uma instância nova com handlers próprios.
    bootstrap.Modal.getOrCreateInstance(document.getElementById('modalObjetivo')).show();
  };

  window.salvarObjetivoAtual = function() {
    var id = document.getElementById('objInputId').value || null;
    var titulo = document.getElementById('objInputTitulo').value.trim();
    if (!titulo) { alert('Dá um título pro objetivo.'); return; }

    var dados = {
      tipo: document.querySelector('input[name="objInputTipo"]:checked').value,
      modalidade: document.getElementById('objInputModalidade').value,
      titulo: titulo,
      descricao: document.getElementById('objInputDescricao').value.trim(),
      link: document.getElementById('objInputLink').value.trim(),
      publico: document.getElementById('objInputPublico').checked
    };

    var arquivoEl = document.getElementById('objInputArquivo');
    var arquivo = arquivoEl.files && arquivoEl.files[0];

    function persistir() {
      var fn = id
        ? function(cb){ google.script.run.withSuccessHandler(cb).withFailureHandler(onErro).atualizarObjetivoCampanha(id, dados); }
        : function(cb){ google.script.run.withSuccessHandler(cb).withFailureHandler(onErro).criarObjetivoCampanha(dados); };
      fn(function(r){
        if (r && r.ok) {
          bootstrap.Modal.getInstance(document.getElementById('modalObjetivo')).hide();
          window.carregarObjetivosCampanha();
        } else {
          alert('Erro: ' + (r && r.erro ? r.erro : 'desconhecido'));
        }
      });
    }
    function onErro(e) { alert('Erro: ' + (e && e.message ? e.message : e)); }

    if (arquivo) {
      // Limite prudente — Apps Script aceita até ~50MB mas o roundtrip
      // base64 fica pesado. 10MB cobre PDFs e planilhas normais.
      if (arquivo.size > 10 * 1024 * 1024) {
        alert('Arquivo muito grande (máx 10 MB). Use o campo de link.');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(ev) {
        var base64 = ev.target.result.split(',')[1];
        google.script.run
          .withSuccessHandler(function(r){
            if (!r || !r.ok) { alert('Erro no upload: ' + (r && r.erro ? r.erro : 'desconhecido')); return; }
            dados.anexoNome = r.nome;
            dados.anexoUrl = r.url;
            persistir();
          })
          .withFailureHandler(onErro)
          .uploadAnexoCampanha({ base64: base64, nome: arquivo.name, mime: arquivo.type });
      };
      reader.onerror = function(){
        alert('Não foi possível ler o arquivo selecionado. Tente outro.');
      };
      reader.readAsDataURL(arquivo);
    } else {
      persistir();
    }
  };

  var _togglesEmVoo = {};
  window.alternarPublicoObjetivo = function(id, novoEstado) {
    // Bloqueia clique repetido enquanto o anterior pro mesmo id não voltou
    // — sem isso, respostas chegariam fora de ordem e a UI piscaria.
    if (_togglesEmVoo[id]) return;
    _togglesEmVoo[id] = true;

    var idx = _objetivos.findIndex(function(o){ return o.id === id; });
    if (idx >= 0) { _objetivos[idx].publico = novoEstado; renderObjetivos(); }

    function liberar() { delete _togglesEmVoo[id]; }

    google.script.run
      .withSuccessHandler(function(r){
        liberar();
        if (!r || !r.ok) {
          if (idx >= 0) { _objetivos[idx].publico = !novoEstado; renderObjetivos(); }
          alert('Erro: ' + (r && r.erro ? r.erro : 'desconhecido'));
        }
      })
      .withFailureHandler(function(e){
        liberar();

  // ======================================================
  // COMPARTILHAR CAMPANHA — gera PNG do template oculto e
  // dispara navigator.share com texto "Acompanhe mais detalhes".
  // ======================================================
  window.compartilharImagemCampanha = function() {
    var btn = event && event.currentTarget;
    var textoOrig = btn ? btn.innerHTML : null;
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }

    // Pega URL pública pra mandar no texto da mensagem
    google.script.run.withSuccessHandler(function(baseUrl){
      var linkPub = (baseUrl || window.location.href.split('?')[0]) + '?v=campanha';
      preencherTemplateCampanha();
      var tpl = document.getElementById('cardCampanhaTemplate');
      // Torna opaco momentaneamente pra o dom-to-image pegar o conteúdo
      // renderizado de fato (com opacity:0 alguns navegadores skipam
      // partes do layout no snapshot).
      tpl.style.opacity = '1';

      // 2 RAFs garantem que o browser fez layout + paint do template
      // novo antes da captura, evitando snapshots cortados.
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
      // html2canvas em vez de dom-to-image: o template é 720px mas a
      // viewport mobile é ~390px. O dom-to-image (SVG) corta o que
      // extrapola; html2canvas renderiza tudo respeitando o tamanho
      // declarado do elemento.
      html2canvas(tpl, {
        backgroundColor: '#0f172a',
        scale: 1.5,
        useCORS: true,
        width: 720,
        height: tpl.scrollHeight,
        windowWidth: 720,
        windowHeight: tpl.scrollHeight
      }).then(function(canvas){
        return new Promise(function(res){ canvas.toBlob(res, 'image/png'); });
      })
        .then(function(blob){
          tpl.style.opacity = '0';
          var nomeArq = 'campanha-' + new Date().toISOString().split('T')[0] + '.png';
          var file = new File([blob], nomeArq, { type: 'image/png' });
          var texto = montarMsgCampanha(linkPub);
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({ files: [file], title: 'Campanha', text: texto })
              .catch(function(){})
              .finally(restaurar);
          } else {
            // Fallback desktop: baixa a imagem
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = nomeArq;
            document.body.appendChild(a); a.click();
            setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 500);
            restaurar();
          }
        })
        .catch(function(e){
          tpl.style.opacity = '0';
          alert('Erro: ' + (e && e.message ? e.message : e));
          restaurar();
        });
      })}); // fecha os 2 requestAnimationFrame
    }).withFailureHandler(function(){
      restaurar();
    }).getScriptUrl();

    function restaurar() {
      if (btn && textoOrig != null) { btn.disabled = false; btn.innerHTML = textoOrig; }
    }
  };

  function preencherTemplateCampanha() {
    var cfg = window.configCampanhaGlobal || {};
    var dados = window.dadosDashCampanha || {};

    document.getElementById('tplNome').innerText = cfg.nome || 'Campanha';
    var per = [];
    if (cfg.data) per.push(window.formatarDataBR(cfg.data));
    if (cfg.dataFim) per.push('até ' + window.formatarDataBR(cfg.dataFim));
    document.getElementById('tplPeriodo').innerText = per.join(' ');

    // Countdown
    var cd = document.getElementById('tplCountdown');
    if (cfg.dataFim) {
      var diff = Math.ceil((new Date(cfg.dataFim + 'T23:59:59') - new Date()) / (1000*60*60*24));
      if (diff < 0) cd.innerText = 'Campanha encerrada';
      else if (diff === 0) cd.innerText = 'Último dia!';
      else cd.innerText = 'Faltam ' + diff + ' dia' + (diff === 1 ? '' : 's');
      cd.style.display = '';
    } else {
      cd.style.display = 'none';
    }

    // Progresso
    var pct = Number(dados.porcentagem) || 0;
    document.getElementById('tplPct').innerText = pct + '%';
    document.getElementById('tplCompletas').innerText = dados.completas || 0;
    document.getElementById('tplTotal').innerText = dados.totalQuadras || 0;
    document.getElementById('tplBarra').style.width = pct + '%';

    // Objetivos da semana (públicos)
    var semana = (_objetivos || []).filter(function(o){
      return o.tipo === 'semana' && o.publico;
    });
    var box = document.getElementById('tplObjetivos');
    if (semana.length === 0) {
      box.innerHTML = '<div style="opacity:.55; font-size:14px; padding:10px 0">Sem objetivos da semana definidos.</div>';
      return;
    }
    box.innerHTML = '<div style="font-size:13px; letter-spacing:2px; text-transform:uppercase; opacity:.55; margin-bottom:10px">Esta semana</div>' +
      semana.map(function(o){
        var m = MODALIDADES.find(function(x){ return x.key === o.modalidade; })
              || { label: 'Outros', icone: 'fa-list' };
        return '<div style="background:linear-gradient(135deg,#16a34a,#15803d); padding:14px 18px; border-radius:14px; margin-bottom:10px">' +
                 '<div style="font-size:13px; opacity:.85; margin-bottom:4px"><i class="fa-solid ' + m.icone + '" style="margin-right:6px"></i>' + m.label + '</div>' +
                 '<div style="font-size:18px; font-weight:700">' + escapeHtml(o.titulo) + '</div>' +
               '</div>';
      }).join('');
  }

  // Chamado quando muda território ou prefixo no modal
  window.iniciarRenomearOrdem = function() {
    _renomearTerritorio = document.getElementById('renomearTerritorio').value;
    _renomearPrefixo = document.getElementById('renomearPrefixo').value.trim();
    _renomearOrdem = [];

    // Restaura estilos antes de aplicar novo destaque
    _renomearStylesOriginais.forEach(function(orig, poly){ poly.setStyle(orig); });
    _renomearStylesOriginais.clear();

    window._modoRenomearAtivo = !!(_renomearTerritorio && _renomearPrefixo);
    if (!window._modoRenomearAtivo) {
      _renomearTodasDoTerr = [];
      atualizarUIRenomearOrdem();
      return;
    }

    // Coleta ids do território + destaca no mapa
    _renomearTodasDoTerr = [];
    if (typeof layerGroupQuadras !== 'undefined' && layerGroupQuadras) {
      layerGroupQuadras.eachLayer(function(poly){
        var d = poly.metaData;
        if (!d) return;
        if (String(d.territory || '').trim() === _renomearTerritorio) {
          _renomearTodasDoTerr.push(d.id);
          // Salva estilo original e destaca em laranja claro
          _renomearStylesOriginais.set(poly, {
            color: '#666', weight: 1,
            fillColor: d.color || '#3388ff', fillOpacity: 0.3
          });
          poly.setStyle({ color: '#f59e0b', weight: 2, fillColor: '#fbbf24', fillOpacity: 0.4 });
        }
      });
    }
    atualizarUIRenomearOrdem();
  };

  // Click em quadra dentro do modo — toggle na ordem
  window.toggleQuadraNaOrdemRenomear = function(poly) {
    var d = poly.metaData;
    if (!d) return;
    if (String(d.territory || '').trim() !== _renomearTerritorio) {
      window.toast && window.toast('Quadra não pertence ao território selecionado', 'warn');
      return;
    }
    var idx = _renomearOrdem.indexOf(d.id);
    if (idx >= 0) {
      _renomearOrdem.splice(idx, 1);
    } else {
      _renomearOrdem.push(d.id);
    }
    repintarPolyRenomear(poly, d);
    // Repinta os demais (porque a letra que cada um vai receber pode ter mudado)
    if (typeof layerGroupQuadras !== 'undefined' && layerGroupQuadras) {
      layerGroupQuadras.eachLayer(function(p){
        if (p === poly) return;
        var dd = p.metaData;
        if (!dd) return;
        if (String(dd.territory || '').trim() === _renomearTerritorio) repintarPolyRenomear(p, dd);
      });
    }
    atualizarUIRenomearOrdem();
  };

  function letraDeIndice(idx) {
    var L = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (idx < 26) return L[idx];
    return L[Math.floor(idx/26) - 1] + L[idx % 26];
  }

  function repintarPolyRenomear(poly, d) {
    var idx = _renomearOrdem.indexOf(d.id);
    if (idx >= 0) {
      var novoId = _renomearPrefixo + letraDeIndice(idx);
      poly.setStyle({ color: '#16a34a', weight: 3, fillColor: '#22c55e', fillOpacity: 0.55 });
      // Atualiza tooltip pra mostrar o id NOVO temporariamente
      if (poly.getTooltip()) poly.unbindTooltip();
      poly.bindTooltip(novoId, { permanent: true, direction: 'center', className: 'label-quadra' });
    } else {
      poly.setStyle({ color: '#f59e0b', weight: 2, fillColor: '#fbbf24', fillOpacity: 0.4 });
      if (poly.getTooltip()) poly.unbindTooltip();
      poly.bindTooltip(d.id, { permanent: true, direction: 'center', className: 'label-quadra' });
    }
  }

  function atualizarUIRenomearOrdem() {
    var lista = document.getElementById('renomearOrdemLista');
    var restantes = document.getElementById('renomearRestantes');
    var btn = document.getElementById('btnAplicarRenomear');
    if (_renomearOrdem.length === 0) {
      lista.innerHTML = '<span class="text-muted">Nenhuma escolhida ainda. Toque nas quadras laranjas no mapa.</span>';
    } else {
      lista.innerHTML = _renomearOrdem.map(function(id, idx){
        var novo = _renomearPrefixo + letraDeIndice(idx);
        return '<div><span class="text-success fw-bold">' + escapeHtml(novo) + '</span> ← ' + escapeHtml(id) + '</div>';
      }).join('');
    }
    var pendentes = _renomearTodasDoTerr.filter(function(id){ return _renomearOrdem.indexOf(id) < 0; });
    if (pendentes.length > 0) {
      restantes.innerHTML = '<i class="fa-solid fa-circle-exclamation text-warning"></i> Falta ' + pendentes.length + ': <span style="font-family:monospace">' + pendentes.map(escapeHtml).join(', ') + '</span>';
    } else if (_renomearTodasDoTerr.length > 0) {
      restantes.innerHTML = '<i class="fa-solid fa-circle-check text-success"></i> Todas atribuídas!';
    } else {
      restantes.textContent = '';
    }
    // Só habilita confirmar quando TODAS estão na ordem
    btn.disabled = !(_renomearTodasDoTerr.length > 0
                     && _renomearOrdem.length === _renomearTodasDoTerr.length);
  }

  window.resetarOrdemRenomear = function() {
    _renomearOrdem = [];
    if (typeof layerGroupQuadras !== 'undefined' && layerGroupQuadras) {
      layerGroupQuadras.eachLayer(function(poly){
        var d = poly.metaData;
        if (!d) return;
        if (String(d.territory || '').trim() === _renomearTerritorio) repintarPolyRenomear(poly, d);
      });
    }
    atualizarUIRenomearOrdem();
  };

  window.cancelarRenomearOrdem = function() {
    window._modoRenomearAtivo = false;
    // Restaura todos os estilos originais e tooltips
    _renomearStylesOriginais.forEach(function(orig, poly){
      poly.setStyle(orig);
      var d = poly.metaData;
      if (d) {
        if (poly.getTooltip()) poly.unbindTooltip();
        poly.bindTooltip(d.id, { permanent: true, direction: 'center', className: 'label-quadra' });
      }
    });
    _renomearStylesOriginais.clear();
    _renomearOrdem = [];
    _renomearTodasDoTerr = [];
    bootstrap.Modal.getInstance(document.getElementById('modalRenomear')).hide();
  };

  window.aplicarRenomearOrdem = function() {
    if (!_renomearTerritorio || !_renomearPrefixo) return;
    if (_renomearOrdem.length !== _renomearTodasDoTerr.length) {
      alert('Atribua todas as quadras antes de confirmar.');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Aplicando...';

      .withSuccessHandler(function(r){
        if (!r || !r.ok) {

          btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check"></i> Confirmar';
          return;
        }
        window.toast && window.toast(r.renomeadas + ' quadras renomeadas.', 'success');

        _renomearStylesOriginais.clear();
        _renomearOrdem = [];
