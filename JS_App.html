  window.abrirDesignacoes = function() {
    var box = document.getElementById('listaDesignacoes');
    box.innerHTML = '<div class="text-center text-muted small py-3">Carregando...</div>';
    bootstrap.Modal.getOrCreateInstance(document.getElementById('modalDesignacoes')).show();
    google.script.run
      .withSuccessHandler(function(r){
        var abertas = (r && r.abertas) || [];
        var vencidas = (r && r.vencidas) || [];
        if (abertas.length === 0 && vencidas.length === 0) {
          box.innerHTML = '<div class="text-center text-muted small py-3">Sem designações ativas.<br><small>Crie ao compartilhar quadras com publicador.</small></div>';
          return;
        }
        function card(d, vencida) {
          var prazoStr = d.prazo ? new Date(d.prazo).toLocaleDateString('pt-BR') : '—';
          var cor = vencida ? 'border-danger' : 'border-primary';
          var badge = vencida
            ? '<span class="badge bg-danger">Vencida</span>'
            : '<span class="badge bg-primary">Aberta</span>';
          return '<div class="card mb-2 shadow-sm ' + cor + '" style="border-left-width:4px">' +
                   '<div class="card-body py-2 px-3">' +
                     '<div class="d-flex justify-content-between align-items-start gap-2">' +
                       '<div class="flex-grow-1">' +
                         '<div class="fw-bold">' + escapeHtml(d.publicador) + ' ' + badge + '</div>' +
                         '<div class="small text-muted">' + d.idsQuadras.length + ' quadra(s): ' + escapeHtml(d.idsQuadras.join(', ')) + '</div>' +
                         '<div class="small text-muted"><i class="fa-regular fa-clock"></i> Prazo: ' + escapeHtml(prazoStr) + '</div>' +
                       '</div>' +
                       '<button class="btn btn-sm btn-outline-danger" onclick="window.cancelarDesignacaoUI(\'' + d.id + '\')" title="Cancelar designação"><i class="fa-solid fa-xmark"></i></button>' +
                     '</div>' +
                   '</div>' +
                 '</div>';
        }
        var html = '';
        if (vencidas.length > 0) {
          html += '<div class="small fw-bold text-danger mb-1">Vencidas (' + vencidas.length + ')</div>';
          html += vencidas.map(function(d){ return card(d, true); }).join('');
        }
        if (abertas.length > 0) {
          html += '<div class="small fw-bold text-primary mb-1 mt-2">Em andamento (' + abertas.length + ')</div>';
          html += abertas.map(function(d){ return card(d, false); }).join('');
        }
        box.innerHTML = html;
      })

        box.innerHTML = '<div class="text-danger small">Erro: ' + (e && e.message ? e.message : e) + '</div>';

  var _predios = [];

  window.filtrarPredios = function() {
    var box = document.getElementById('listaPredios');
    var termo = (document.getElementById('prediosBusca').value || '').trim().toLowerCase();
    var soIrmao = document.getElementById('prediosSoIrmao').checked;
    var mostrarNaoPredio = document.getElementById('prediosMostrarNaoPredios').checked;
    var filtro = _predios.filter(function(p){
      if (!mostrarNaoPredio && p.naoEhPredio) return false;
      if (soIrmao && !p.irmaoMora) return false;
      if (!termo) return true;
      var alvo = (p.logradouro + ' ' + p.nome + ' ' + p.numero + ' ' + (p.nomeIrmao || '')).toLowerCase();
      return alvo.indexOf(termo) > -1;
    });
    var totalReal = _predios.filter(function(p){ return !p.naoEhPredio; }).length;
    var resumo = totalReal + ' prédio(s) detectado(s)';
    if (filtro.length !== totalReal) resumo += ' · ' + filtro.length + ' mostrando';
    document.getElementById('prediosResumo').innerText = resumo;

    if (filtro.length === 0) {
      box.innerHTML = '<div class="text-muted text-center py-4 small">Nenhum prédio</div>';
      return;
    }
    box.innerHTML = filtro.map(function(p){
      var badges = [];
      if (p.naoEhPredio) badges.push('<span class="badge bg-secondary"><i class="fa-solid fa-circle-minus me-1"></i>Não é prédio</span>');
      if (p.irmaoMora) {
        var lbl = p.nomeIrmao ? 'Irmão: ' + escapeHtml(p.nomeIrmao) : 'Irmão mora';
        badges.push('<span class="badge bg-warning text-dark"><i class="fa-solid fa-house-user me-1"></i>' + lbl + '</span>');
      }
      if (p.acessoInterfone === 'portaria') badges.push('<span class="badge bg-info text-dark"><i class="fa-solid fa-building-shield me-1"></i>Portaria eletrônica</span>');
      else if (p.acessoInterfone === 'individual') badges.push('<span class="badge bg-success-subtle text-success border border-success"><i class="fa-solid fa-phone me-1"></i>Interfone</span>');
      if (p.ultimaCartaStr) badges.push('<span class="badge bg-success"><i class="fa-solid fa-envelope-circle-check me-1"></i>Entregue ' + escapeHtml(p.ultimaCartaStr) + '</span>');
      var qdrs = p.quadras.length > 0 ? ' · ' + p.quadras.join(', ') : '';
      var opac = p.naoEhPredio ? 'opacity:0.6;' : '';
      return '<div class="card mb-2 shadow-sm predio-card" data-chave="' + escapeHtml(p.chave) + '" style="cursor:pointer;' + opac + '">' +
               '<div class="card-body py-2 px-3">' +
                 '<div class="d-flex justify-content-between align-items-start">' +
                   '<div class="flex-grow-1">' +
                     '<div class="fw-bold">' + escapeHtml(p.nome) + '</div>' +
                     '<div class="small text-muted">' + escapeHtml(p.logradouro) + ', ' + escapeHtml(p.numero) +
                       ' · ' + p.qtdEnderecos + ' apto(s)' + escapeHtml(qdrs) + '</div>' +
                     (badges.length ? '<div class="mt-1 d-flex gap-1 flex-wrap">' + badges.join('') + '</div>' : '') +
                   '</div>' +
                   '<button class="btn btn-sm btn-outline-success ms-2 align-self-center predio-share" data-chave="' + escapeHtml(p.chave) + '" title="Compartilhar prédio">' +
                     '<i class="fa-brands fa-whatsapp"></i>' +
                   '</button>' +
                 '</div>' +
               '</div>' +
             '</div>';
    }).join('');

    // Delegação: 1 listener no container em vez de N inline.
    var box = document.getElementById('listaPredios');
    if (box && !box._bound) {
      box._bound = true;
      box.addEventListener('click', function(ev){
        var share = ev.target.closest('.predio-share');
        if (share) {
          ev.stopPropagation();
          var chShare = share.getAttribute('data-chave');
          if (chShare) window.compartilharPredio(chShare);
          return;
        }
        var card = ev.target.closest('.predio-card');
        if (!card) return;
        var chave = card.getAttribute('data-chave');
        if (chave) window.abrirModalPredio(chave);
      });
    }
  };

  // Compartilha o link público de UM prédio específico (?v=cartas&p=CHAVE)
  window.compartilharPredio = function(chave) {
    var p = _predios.find(function(x){ return x.chave === chave; });
    if (!p) return;
    google.script.run
      .withSuccessHandler(function(baseUrl){
        var url = (baseUrl || window.location.href.split('?')[0])
                + '?v=cartas&p=' + encodeURIComponent(chave);
        var texto = '✉️ Trabalho de cartas — ' + p.nome + '\n\n' +
                    p.qtdEnderecos + ' apto(s) em ' + p.logradouro + ', ' + p.numero + '\n' + url;
        if (navigator.share) {
          navigator.share({ title: p.nome, text: texto }).catch(function(){});
        } else {
          navigator.clipboard.writeText(texto).then(function(){ alert('Link copiado!'); });
        }
      })
      .withFailureHandler(function(e){ alert('Erro: ' + (e && e.message ? e.message : e)); })
      .getScriptUrl();
  };

  // Compartilha o prédio atual no modal aberto
  window.compartilharPredioAtual = function() {
    var chave = document.getElementById('predioChave').value;
    if (chave) window.compartilharPredio(chave);
  };

  window.abrirModalPredio = function(chave) {
    var p = _predios.find(function(x){ return x.chave === chave; });
    if (!p) return;
    document.getElementById('lblPredioTitulo').innerText = p.nome;
    document.getElementById('predioEndereco').innerText = p.logradouro + ', ' + p.numero +
      ' · ' + p.qtdEnderecos + ' apto(s)' + (p.quadras.length ? ' · ' + p.quadras.join(', ') : '');
    document.getElementById('predioChave').value = chave;
    document.getElementById('predioNome').value = p.nomeEditado ? p.nome : '';
    document.getElementById('predioNome').placeholder = p.nome;
    document.getElementById('predioIrmaoMora').checked = !!p.irmaoMora;
    document.getElementById('predioNomeIrmao').value = p.nomeIrmao || '';
    document.getElementById('boxNomeIrmao').style.display = p.irmaoMora ? '' : 'none';
    document.getElementById('predioNotas').value = p.notas || '';
    document.getElementById('predioNaoEhPredio').checked = !!p.naoEhPredio;

    // Acesso (radio group)
    var radios = document.querySelectorAll('input[name="predioAcesso"]');
    radios.forEach(function(r){ r.checked = (r.value === (p.acessoInterfone || '')); });

    document.getElementById('predioUltimaCarta').innerHTML = p.ultimaCartaStr
      ? '<i class="fa-solid fa-envelope-circle-check text-success me-1"></i>Última carta entregue em <b>' + escapeHtml(p.ultimaCartaStr) + '</b>'
      : '<i class="fa-regular fa-envelope-open me-1"></i>Nenhuma carta entregue ainda';

    // Show/hide nome do irmão conforme o switch
    var swIrmao = document.getElementById('predioIrmaoMora');
    if (!swIrmao._bound) {
      swIrmao._bound = true;
      swIrmao.addEventListener('change', function(){
        document.getElementById('boxNomeIrmao').style.display = this.checked ? '' : 'none';
      });
    }

    bootstrap.Modal.getOrCreateInstance(document.getElementById('modalPredio')).show();
  };

  window.salvarPredio = function() {
    var chave = document.getElementById('predioChave').value;
    var acessoSel = document.querySelector('input[name="predioAcesso"]:checked');
    var patch = {
      nome: document.getElementById('predioNome').value.trim(),
      irmaoMora: document.getElementById('predioIrmaoMora').checked,
      nomeIrmao: document.getElementById('predioNomeIrmao').value.trim(),
      acessoInterfone: acessoSel ? acessoSel.value : '',
      naoEhPredio: document.getElementById('predioNaoEhPredio').checked,
      notas: document.getElementById('predioNotas').value.trim()
    };
    google.script.run
      .withSuccessHandler(function(r){
        if (!r || !r.ok) { alert('Erro: ' + (r && r.erro || '?')); return; }
        bootstrap.Modal.getInstance(document.getElementById('modalPredio')).hide();
        window.carregarPredios();
      })
      .withFailureHandler(function(e){ alert('Erro: ' + (e && e.message ? e.message : e)); })
      .atualizarPredio(chave, patch);
  };

  window.compartilharLinkCartas = function() {
    google.script.run
      .withSuccessHandler(function(baseUrl){
        var url = (baseUrl || window.location.href.split('?')[0]) + '?v=cartas';
        var n = _predios.length;
        var texto = '✉️ Trabalho de cartas\n\n' + n + ' prédio(s) pra escrever cartas:\n' + url;
        if (navigator.share) {
          navigator.share({ title: 'Trabalho de Cartas', text: texto })
            .catch(function(){});
        } else {
          navigator.clipboard.writeText(texto).then(function(){ alert('Link copiado!'); });
        }
      })
      .withFailureHandler(function(e){ alert('Erro: ' + (e && e.message ? e.message : e)); })
      .getScriptUrl();
  };

  function montarMsgCampanha(link) {
    var cfg = window.configCampanhaGlobal || {};
    var dados = window.dadosDashCampanha || {};
    var linhas = ['🎯 ' + (cfg.nome || 'Campanha')];
    var pct = Number(dados.porcentagem) || 0;
    linhas.push(pct + '% concluído (' + (dados.completas || 0) + '/' + (dados.totalQuadras || 0) + ' quadras)');
    if (cfg.dataFim) {
      var diff = Math.ceil((new Date(cfg.dataFim + 'T23:59:59') - new Date()) / (1000*60*60*24));
      if (diff > 0) linhas.push('⏳ Faltam ' + diff + ' dia' + (diff === 1 ? '' : 's'));
      else if (diff === 0) linhas.push('⚡ Último dia!');
    }
    linhas.push('');
    linhas.push('Acompanhe mais detalhes:');
    linhas.push(link);
    return linhas.join('\n');
  }
</script>
